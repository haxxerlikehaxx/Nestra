<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Nestra: Ultimate Premium Apple HomeKit Style Smart Home Controller for iPad Air 2">
    
    <!-- Application Identity & iOS Home Screen Iconography -->
    <title>Nestra</title>
    <link rel="icon" href="/home/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/home/apple-touch-icon.png">

    <style>
        /* ==========================================================================
           CUSTOM TYPOGRAPHY INTEGRATION (ENTERPRISE GRADE)
           Mapping exact local files to distinct font families to prevent faux-bolding
           ========================================================================== */

        @font-face {
            font-family: 'SF Pro Light Custom';
            src: url('./SFProLight.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'SF Pro Regular Custom';
            src: url('./SFProRegular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'SF Pro Medium Custom';
            src: url('./SFProMedium.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'SF Pro Semibold Soft Custom';
            src: url('./SF%20Pro%20-%20Semibold%20Soft.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'SF Pro Bold Custom';
            src: url('./SF-Pro-Display-Bold.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* ==========================================================================
           GLOBAL DESIGN TOKENS & VARIABLES
           ========================================================================== */
        :root {
            /* Core Backgrounds */
            --application-background-color: #000000;
            
            /* Glassmorphism System */
            --glass-background-base: rgba(255, 255, 255, 0.08);
            --glass-border-color: rgba(255, 255, 255, 0.12);
            --glass-background-hover: rgba(255, 255, 255, 0.15);
            --glass-backdrop-filter-blur: blur(45px);
            --glass-backdrop-filter-saturate: saturate(180%);
            
            /* Active Device States (ON) - Flawless Solid Colors */
            --card-active-background-color: #FFFFFF; 
            --card-active-text-color: #000000;
            --card-active-subtitle-color: rgba(0, 0, 0, 0.50);
            --icon-active-background-color: #FFCC00; 
            --icon-active-foreground-color: #FFFFFF;
            --icon-active-box-shadow: 0px 6px 16px rgba(255, 204, 0, 0.35);
            
            /* Premium Slider */
            --slider-active-track-color: #F2F2F7; 
            --slider-active-fill-color: #D1D1D6; 
            --slider-active-fill-shadow: inset 0px 1px 1px rgba(255, 255, 255, 0.8), 0px 1px 4px rgba(0, 0, 0, 0.06);

            /* Inactive Device States (OFF) */
            --card-inactive-text-color: #FFFFFF;
            --card-inactive-subtitle-color: rgba(255, 255, 255, 0.55);
            --icon-inactive-background-color: rgba(255, 255, 255, 0.12);
            --icon-inactive-foreground-color: rgba(255, 255, 255, 0.60);
            --slider-inactive-track-color: rgba(0, 0, 0, 0.25);
            --slider-inactive-fill-color: rgba(255, 255, 255, 0.20);
            --slider-inactive-fill-shadow: none;

            /* Link & Success States */
            --link-active-background-color: #0A84FF; 
            --link-active-foreground-color: #FFFFFF;
            --link-active-box-shadow: 0px 4px 16px rgba(10, 132, 255, 0.4);
            --success-color: #32D74B;

            /* Typography Pointers */
            --font-light: 'SF Pro Light Custom', -apple-system, sans-serif;
            --font-regular: 'SF Pro Regular Custom', -apple-system, sans-serif;
            --font-medium: 'SF Pro Medium Custom', -apple-system, sans-serif;
            --font-semibold-soft: 'SF Pro Semibold Soft Custom', -apple-system, sans-serif;
            --font-bold: 'SF Pro Bold Custom', -apple-system, sans-serif;
            
            /* Physics & Animation Curves */
            --animation-spring-curve: cubic-bezier(0.32, 0.72, 0, 1.0);
            --animation-bouncy-curve: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --animation-ease-out-curve: cubic-bezier(0.25, 1.0, 0.5, 1.0);
            --animation-duration-fast: 0.2s;
            --animation-duration-medium: 0.4s;
            --animation-duration-slow: 0.6s;

            /* Layout Constraints */
            --layout-max-width-portrait: 768px;
            --layout-max-width-landscape: 1024px;
            --layout-padding-horizontal-portrait: 32px;
            --layout-padding-horizontal-landscape: 48px;
            --layout-padding-vertical-bottom: 40px;
            
            /* Card Height Mathematics */
            --card-base-height: 200px;
            --grid-gap-portrait: 24px;
            --card-expanded-height-portrait: 424px; 
            --grid-gap-landscape: 32px;
            --card-expanded-height-landscape: 432px; 
        }

        /* ==========================================================================
           CSS RESET & NORMALIZATION
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin-top: 0;
            margin-right: 0;
            margin-bottom: 0;
            margin-left: 0;
            padding-top: 0;
            padding-right: 0;
            padding-bottom: 0;
            padding-left: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-family: var(--font-regular);
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            background-color: var(--application-background-color);
            color: var(--card-inactive-text-color);
            margin-left: auto;
            margin-right: auto;
            min-height: 100vh;
            padding-top: calc(env(safe-area-inset-top, 40px) + 24px);
            padding-right: var(--layout-padding-horizontal-portrait);
            padding-bottom: var(--layout-padding-vertical-bottom);
            padding-left: var(--layout-padding-horizontal-portrait);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
            touch-action: pan-y;
            max-width: var(--layout-max-width-portrait);
            
            transition-property: max-width, padding-right, padding-left;
            transition-duration: var(--animation-duration-medium);
            transition-timing-function: var(--animation-ease-out-curve);
        }

        body.layout-mode-landscape {
            max-width: var(--layout-max-width-landscape);
            padding-right: var(--layout-padding-horizontal-landscape);
            padding-left: var(--layout-padding-horizontal-landscape);
        }

        input, textarea, select {
            user-select: text !important;
            -webkit-user-select: text !important;
            -webkit-touch-callout: default !important;
            font-family: var(--font-regular);
        }

        /* ==========================================================================
           HARDWARE ACCELERATED ANIMATION KEYFRAMES
           ========================================================================== */
        
        @keyframes staggered-spring-up {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes checkmark-pop-animation {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes subtle-pulse-glow {
            0% { box-shadow: 0px 4px 12px rgba(50, 215, 75, 0.2); }
            50% { box-shadow: 0px 4px 24px rgba(50, 215, 75, 0.6); }
            100% { box-shadow: 0px 4px 12px rgba(50, 215, 75, 0.2); }
        }

        @keyframes hourly-item-fade-in {
            0% { opacity: 0; transform: translateX(20px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        /* Initial state for elements waiting to be animated in */
        .awaits-animation {
            opacity: 0;
            transform: translateY(40px) scale(0.95);
        }

        .animate-entry {
            animation-name: staggered-spring-up;
            animation-duration: 0.8s;
            animation-timing-function: var(--animation-spring-curve);
            animation-fill-mode: forwards;
        }

        /* ==========================================================================
           HEADER COMPONENT
           ========================================================================== */
        .application-header {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 36px;
            padding-left: 8px;
            padding-right: 8px;
        }

        .application-title {
            font-family: var(--font-medium);
            font-weight: normal; 
            font-size: 38px;
            letter-spacing: -0.04em; 
            line-height: 1.2;
            color: #FFFFFF;
            font-variant-numeric: proportional-nums;
            font-feature-settings: "pnum" 1, "tnum" 0, "kern" 1;
        }

        .header-controls-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 16px;
        }

        .circular-icon-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--glass-background-base);
            border-top-width: 1px;
            border-right-width: 1px;
            border-bottom-width: 1px;
            border-left-width: 1px;
            border-style: solid;
            border-color: var(--glass-border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            cursor: pointer;
            backdrop-filter: var(--glass-backdrop-filter-blur) var(--glass-backdrop-filter-saturate);
            -webkit-backdrop-filter: var(--glass-backdrop-filter-blur) var(--glass-backdrop-filter-saturate);
            
            transition-property: transform, background-color;
            transition-duration: var(--animation-duration-medium), var(--animation-duration-fast);
            transition-timing-function: var(--animation-spring-curve), var(--animation-ease-out-curve);
            outline: none;
        }

        .circular-icon-button:active {
            transform: scale(0.85);
            background-color: var(--glass-background-hover);
        }

        .circular-icon-button svg {
            width: 20px;
            height: 20px;
        }

        /* ==========================================================================
           WEATHER WIDGET COMPONENT
           ========================================================================== */
        .weather-dashboard-widget {
            background-color: var(--glass-background-base);
            border-top-width: 1px;
            border-right-width: 1px;
            border-bottom-width: 1px;
            border-left-width: 1px;
            border-style: solid;
            border-color: var(--glass-border-color);
            backdrop-filter: var(--glass-backdrop-filter-blur) var(--glass-backdrop-filter-saturate);
            -webkit-backdrop-filter: var(--glass-backdrop-filter-blur) var(--glass-backdrop-filter-saturate);
            border-radius: 32px;
            margin-bottom: 24px; 
            display: flex;
            flex-direction: column;
            box-shadow: 0px 12px 48px rgba(0, 0, 0, 0.4), inset 0px 1px 0px rgba(255, 255, 255, 0.1);
            cursor: pointer;
            
            transform: translate3d(0, 0, 0);
            -webkit-transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            perspective: 1000px;
            -webkit-perspective: 1000px;
            
            transition-property: transform, background-color;
            transition-duration: var(--animation-duration-medium);
            transition-timing-function: var(--animation-spring-curve);
        }

        .weather-dashboard-widget:active {
            transform: scale(0.96) translate3d(0, 0, 0);
            background-color: var(--glass-background-hover);
        }

        .weather-main-row {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding-top: 28px;
            padding-right: 32px;
            padding-bottom: 28px;
            padding-left: 32px;
        }

        .weather-information-left { display: flex; flex-direction: column; gap: 6px; }
        
        .weather-city-label { 
            font-family: var(--font-bold);
            font-weight: normal;
            font-size: 15px; 
            color: var(--card-inactive-subtitle-color); 
            text-transform: uppercase; 
            letter-spacing: 0.06em; 
        }
        
        .weather-temperature-display { 
            font-family: var(--font-light);
            font-weight: normal;
            font-size: 56px; 
            letter-spacing: -0.05em; 
            line-height: 1.0; 
            margin-top: 4px; 
            margin-bottom: 4px; 
            color: #FFFFFF; 
            font-variant-numeric: proportional-nums;
            font-feature-settings: "pnum" 1, "tnum" 0;
        }
        
        .weather-condition-description { 
            font-family: var(--font-regular);
            font-weight: normal;
            font-size: 16px; 
            color: var(--card-inactive-subtitle-color); 
        }
        
        .weather-graphics-right { display: flex; flex-direction: column; align-items: flex-end; gap: 16px; }
        .weather-vector-icon { width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; }
        .weather-vector-icon svg { width: 100%; height: 100%; filter: drop-shadow(0px 6px 16px rgba(255, 255, 255, 0.15)); }
        
        .weather-high-low-range { 
            font-family: var(--font-medium);
            font-weight: normal;
            font-size: 15px; 
            color: var(--card-inactive-subtitle-color); 
        }
        
        .weather-hourly-container {
            max-height: 0px;
            opacity: 0;
            overflow-x: auto;
            overflow-y: hidden;
            display: flex;
            flex-direction: row;
            gap: 24px;
            padding-left: 32px;
            padding-right: 32px;
            padding-top: 0px;
            padding-bottom: 0px;
            border-top-width: 1px;
            border-top-style: solid;
            border-top-color: transparent;
            
            -webkit-overflow-scrolling: touch;
            transform: translate3d(0, 0, 0);
            -webkit-transform: translate3d(0, 0, 0);
            will-change: max-height, opacity, padding-top, padding-bottom;
            
            transition-property: max-height, opacity, padding-top, padding-bottom, border-top-color;
            transition-duration: 0.6s;
            transition-timing-function: var(--animation-spring-curve);
        }

        .weather-hourly-container::-webkit-scrollbar { display: none; }

        .weather-dashboard-widget.is-expanded .weather-hourly-container {
            max-height: 160px;
            opacity: 1;
            padding-top: 24px;
            padding-bottom: 28px;
            border-top-color: rgba(255, 255, 255, 0.1);
        }

        .hourly-item-block { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 10px; 
            min-width: 48px; 
            flex-shrink: 0; 
            opacity: 0; /* Handled by JS staggering */
        }
        
        .weather-dashboard-widget.is-expanded .hourly-item-block {
            animation-name: hourly-item-fade-in;
            animation-duration: 0.5s;
            animation-timing-function: var(--animation-ease-out-curve);
            animation-fill-mode: forwards;
        }

        .hourly-item-time { font-family: var(--font-regular); font-weight: normal; font-size: 14px; color: var(--card-inactive-subtitle-color); }
        .hourly-item-icon { width: 32px; height: 32px; }
        .hourly-item-icon svg { width: 100%; height: 100%; filter: drop-shadow(0px 2px 4px rgba(255,255,255,0.1)); }
        .hourly-item-temp { font-family: var(--font-medium); font-weight: normal; font-size: 17px; color: #FFFFFF; }
        
        /* Skeleton Animation */
        .skeleton { background-color: rgba(255, 255, 255, 0.1); border-radius: 8px; position: relative; overflow: hidden; }
        .skeleton::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; transform: translateX(-100%); background-image: linear-gradient(90deg, rgba(255,255,255,0) 0, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%); animation: shimmer 2s infinite; }
        @keyframes shimmer { 100% { transform: translateX(100%); } }

        /* ==========================================================================
           AGENDA DASHBOARD WIDGET
           ========================================================================== */
        #agenda-dashboard-section {
            display: none; 
        }

        .agenda-dashboard-widget {
            background-color: var(--glass-background-base);
            border-top-width: 1px;
            border-right-width: 1px;
            border-bottom-width: 1px;
            border-left-width: 1px;
            border-style: solid;
            border-color: var(--glass-border-color);
            backdrop-filter: var(--glass-backdrop-filter-blur) var(--glass-backdrop-filter-saturate);
            -webkit-backdrop-filter: var(--glass-backdrop-filter-blur) var(--glass-backdrop-filter-saturate);
            border-radius: 32px;
            padding-top: 24px;
            padding-right: 32px;
            padding-bottom: 32px;
            padding-left: 32px;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            box-shadow: 0px 12px 48px rgba(0, 0, 0, 0.4), inset 0px 1px 0px rgba(255, 255, 255, 0.1);
            
            transform: translate3d(0, 0, 0);
            -webkit-transform: translate3d(0, 0, 0);
        }

        .agenda-header-row {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 24px;
            padding-left: 8px;
        }

        .agenda-title {
            font-family: var(--font-bold);
            font-weight: normal;
            font-size: 22px;
            color: #FFFFFF;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .agenda-time-period-label {
            font-family: var(--font-medium);
            font-weight: normal;
            font-size: 14px;
            color: var(--card-inactive-subtitle-color);
            letter-spacing: 0.04em;
        }

        .agenda-list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .agenda-item-row {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 16px;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 8px;
            padding-right: 8px;
            cursor: pointer;
            border-radius: 16px;
            
            transition-property: opacity, background-color, transform;
            transition-duration: var(--animation-duration-medium), var(--animation-duration-fast), var(--animation-duration-fast);
            transition-timing-function: var(--animation-ease-out-curve), var(--animation-ease-out-curve), var(--animation-spring-curve);
        }

        .agenda-item-row:active {
            background-color: rgba(255,255,255,0.08);
            transform: scale(0.97);
        }

        /* Completed Task Styles with Advanced Animations */
        .agenda-item-row.is-task-completed {
            opacity: 0.5;
        }
        .agenda-item-row.is-task-completed .agenda-item-title {
            text-decoration: line-through;
            color: var(--card-inactive-subtitle-color);
        }

        .agenda-checkbox-container {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border-top-width: 2px;
            border-right-width: 2px;
            border-bottom-width: 2px;
            border-left-width: 2px;
            border-style: solid;
            border-color: rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            
            transition-property: background-color, border-color, box-shadow;
            transition-duration: var(--animation-duration-fast);
            transition-timing-function: var(--animation-ease-out-curve);
        }

        .agenda-item-row.is-task-completed .agenda-checkbox-container {
            background-color: var(--success-color);
            border-color: var(--success-color);
            animation-name: subtle-pulse-glow;
            animation-duration: 2s;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in-out;
        }

        .agenda-checkbox-svg {
            width: 16px;
            height: 16px;
            stroke: #FFFFFF;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            /* Mathematics for drawing animation */
            stroke-dasharray: 24;
            stroke-dashoffset: 24;
            opacity: 0;
        }

        .agenda-item-row.is-task-completed .agenda-checkbox-svg {
            stroke-dashoffset: 0;
            opacity: 1;
            animation-name: checkmark-pop-animation;
            animation-duration: 0.4s;
            animation-timing-function: var(--animation-bouncy-curve);
            animation-fill-mode: forwards;
        }

        .agenda-item-content {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .agenda-item-title {
            font-family: var(--font-medium);
            font-weight: normal;
            font-size: 18px;
            color: #FFFFFF;
            transition-property: color;
            transition-duration: var(--animation-duration-medium);
        }

        .agenda-empty-state {
            font-family: var(--font-regular);
            font-size: 15px;
            color: var(--card-inactive-subtitle-color);
            text-align: center;
            padding-top: 12px;
            padding-bottom: 12px;
        }

        /* ==========================================================================
           DEVICE GRID LAYOUT & GLOBAL LINK COMPONENT
           ========================================================================== */
        
        .device-grid-wrapper {
            position: relative;
            width: 100%;
        }

        .section-heading-title {
            font-family: var(--font-bold);
            font-weight: normal;
            font-size: 22px;
            margin-bottom: 20px;
            padding-left: 8px;
            letter-spacing: -0.02em;
            color: #FFFFFF;
        }

        /* The Global Sync / Link Button - PERFECTLY REPOSITIONED */
        .global-link-synchronization-button {
            position: absolute;
            left: 50%;
            top: -26px; 
            transform: translateX(-50%);
            width: 38px;
            height: 38px;
            border-radius: 19px;
            background-color: var(--glass-background-base);
            border-top-width: 1px;
            border-right-width: 1px;
            border-bottom-width: 1px;
            border-left-width: 1px;
            border-style: solid;
            border-color: var(--glass-border-color);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            cursor: pointer;
            
            transition-property: background-color, color, border-color, box-shadow, transform;
            transition-duration: var(--animation-duration-medium);
            transition-timing-function: var(--animation-spring-curve);
        }

        .global-link-synchronization-button:active {
            transform: translateX(-50%) scale(0.85);
        }

        .global-link-synchronization-button.is-devices-linked {
            background-color: var(--link-active-background-color);
            color: var(--link-active-foreground-color);
            border-color: var(--link-active-background-color);
            box-shadow: var(--link-active-box-shadow);
        }

        .global-link-synchronization-button svg {
            width: 18px;
            height: 18px;
        }

        .device-grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-auto-rows: minmax(var(--card-base-height), auto);
            column-gap: var(--grid-gap-portrait);
            row-gap: var(--grid-gap-portrait);
            
            transition-property: grid-template-columns, column-gap, row-gap;
            transition-duration: var(--animation-duration-medium);
            transition-timing-function: var(--animation-ease-out-curve);
        }

        body.layout-mode-landscape .device-grid-container {
            grid-template-columns: repeat(2, 1fr);
            column-gap: var(--grid-gap-landscape);
            row-gap: var(--grid-gap-landscape);
        }

        /* ==========================================================================
           SMART DEVICE CARD COMPONENT
           ========================================================================== */
        .smart-device-card {
            background-color: var(--glass-background-base);

        class ToastManager {

                this.toastElement = document.getElementById('system-toast-notification');

            show(message) {
                if (!this.toastElement) return;
                if (this.timeoutReference !== null) clearTimeout(this.timeoutReference);
                this.toastElement.innerText = message;
                this.toastElement.classList.add('is-toast-visible');
                this.timeoutReference = setTimeout(() => {
                    this.toastElement.classList.remove('is-toast-visible');

        class RealTimeClockManager {

        /* ==========================================================================

        class AgendaManager {
            constructor() {
                this.routines = [];
                this.loadFromStorage();
                this.enforceDailyReset();
            }

            generateUUID() {
                return 'uuid-' + Math.random().toString(36).substr(2, 9) + '-' + Date.now().toString(36);
            }

            loadFromStorage() {
                const storedData = localStorage.getItem(STORAGE_KEYS.AGENDA_ROUTINES);
                if (storedData) {
                    try {
                        this.routines = JSON.parse(storedData);
                    } catch (e) {
                        this.routines = [];
                    }
                } else {
                    this.routines = [
                        {
                            id: this.generateUUID(),
                            title: "Morning Routine",
                            startTime: "06:00",
                            endTime: "09:00",
                            order: 0,
                            tasks: [
                                { id: this.generateUUID(), title: "Make Coffee", completed: false, order: 0 },
                                { id: this.generateUUID(), title: "Check Emails", completed: false, order: 1 }
                            ]
                        }
                    ];
                    this.saveToStorage();
                }
            }

            saveToStorage() {
                this.routines.sort((a,b) => a.order - b.order).forEach((routine, rIndex) => {
                    routine.order = rIndex;
                    routine.tasks.sort((a,b) => a.order - b.order).forEach((task, tIndex) => {
                        task.order = tIndex;
                    });
                });
                localStorage.setItem(STORAGE_KEYS.AGENDA_ROUTINES, JSON.stringify(this.routines));
            }

            enforceDailyReset() {
                const currentLocalDateString = new Date().toDateString();
                const lastRecordedResetDate = localStorage.getItem(STORAGE_KEYS.AGENDA_LAST_RESET);

                if (lastRecordedResetDate !== currentLocalDateString) {
                    this.routines.forEach(routine => {
                        routine.tasks.forEach(task => task.completed = false);
                    });
                    this.saveToStorage();
                    localStorage.setItem(STORAGE_KEYS.AGENDA_LAST_RESET, currentLocalDateString);
                }
            }

            getActiveRoutine() {
                const now = new Date();
                const currentAbsoluteMinutes = (now.getHours() * 60) + now.getMinutes();

                for (let i = 0; i < this.routines.length; i++) {
                    const routine = this.routines[i];
                    const [startH, startM] = routine.startTime.split(':').map(Number);
                    const startAbsoluteMinutes = (startH * 60) + startM;
                    const [endH, endM] = routine.endTime.split(':').map(Number);
                    const endAbsoluteMinutes = (endH * 60) + endM;

                    if (startAbsoluteMinutes <= endAbsoluteMinutes) {
                        if (currentAbsoluteMinutes >= startAbsoluteMinutes && currentAbsoluteMinutes <= endAbsoluteMinutes) return routine;
                    } else {
                        if (currentAbsoluteMinutes >= startAbsoluteMinutes || currentAbsoluteMinutes <= endAbsoluteMinutes) return routine;
                    }
                }
                return null; 
            }

            addRoutine(title, startTime, endTime) {
                this.routines.push({
                    id: this.generateUUID(),
                    title: title.trim() || "New Routine",
                    startTime: startTime,
                    endTime: endTime,
                    order: this.routines.length,
                    tasks: []
                });
                this.saveToStorage();
            }

            deleteRoutine(routineId) {
                this.routines = this.routines.filter(r => r.id !== routineId);
                this.saveToStorage();
            }

            addTaskToRoutine(routineId, taskTitle) {
                const routine = this.routines.find(r => r.id === routineId);
                if (routine && taskTitle.trim() !== '') {
                    routine.tasks.push({ id: this.generateUUID(), title: taskTitle.trim(), completed: false, order: routine.tasks.length });
                    this.saveToStorage();
                }
            }

            deleteTask(routineId, taskId) {
                const routine = this.routines.find(r => r.id === routineId);
                if (routine) {
                    routine.tasks = routine.tasks.filter(t => t.id !== taskId);
                    this.saveToStorage();
                }
            }

            toggleTaskCompletion(routineId, taskId) {
                const routine = this.routines.find(r => r.id === routineId);
                if (routine) {
                    const task = routine.tasks.find(t => t.id === taskId);
                    if (task) {
                        task.completed = !task.completed;
                        this.saveToStorage();
                    }
                }
            }

            moveTaskUp(routineId, taskId) {
                const routine = this.routines.find(r => r.id === routineId);
                if (!routine) return;
                const index = routine.tasks.findIndex(t => t.id === taskId);
                if (index > 0) {
                    const temp = routine.tasks[index];
                    routine.tasks[index] = routine.tasks[index - 1];
                    routine.tasks[index - 1] = temp;
                    this.saveToStorage();
                }
            }

            moveTaskDown(routineId, taskId) {
                const routine = this.routines.find(r => r.id === routineId);
                if (!routine) return;
                const index = routine.tasks.findIndex(t => t.id === taskId);
                if (index > -1 && index < routine.tasks.length - 1) {
                    const temp = routine.tasks[index];
                    routine.tasks[index] = routine.tasks[index + 1];
                    routine.tasks[index + 1] = temp;
                    this.saveToStorage();
                }
            }
        }

        class WeatherService {
            constructor() {
                this.latitudeCoordinateForApi = 59.38; // Spånga
                this.longitudeCoordinateForApi = 17.90; // Spånga
                this.apiUrl = `https://api.open-meteo.com/v1/forecast?latitude=${this.latitudeCoordinateForApi}&longitude=${this.longitudeCoordinateForApi}&current=temperature_2m,weather_code&hourly=temperature_2m,precipitation,weather_code&daily=temperature_2m_max,temperature_2m_min&timezone=auto`;
                this.mainRowElement = document.getElementById('weather-main-row-container');
                this.hourlyContainerElement = document.getElementById('weather-hourly-container');

            renderLoadingState() {
                if (!this.mainRowElement) return;
                this.mainRowElement.innerHTML = `
                    <div class="weather-information-left">
                        <span class="weather-city-label">Spånga</span>
                        <h2 class="weather-temperature-display"><div class="skeleton" style="width: 80px; height: 50px;"></div></h2>

                    </div>
                    <div class="weather-graphics-right">

                        <span class="weather-high-low-range"><div class="skeleton" style="width: 100px; height: 18px;"></div></span>
                    </div>
                `;
            }
            
            renderErrorState(errorMessage) {
                if (!this.mainRowElement) return;
                this.mainRowElement.innerHTML = `
                    <div class="weather-information-left">
                        <span class="weather-city-label">Spånga</span>
                        <h2 class="weather-temperature-display">--</h2>
                        <span class="weather-condition-description" style="color: #FF453A;">${errorMessage}</span>
                    </div>
                `;
            }

            parseWmoWeatherCode(code) {
                if (code === 0 || code === 1) return { text: "Clear Sky", icon: SVG_ASSETS.WEATHER_SUN };
                if (code === 2) return { text: "Partly Cloudy", icon: SVG_ASSETS.WEATHER_CLOUD };
                if (code === 3) return { text: "Overcast", icon: SVG_ASSETS.WEATHER_CLOUD };
                if (code >= 51 && code <= 67) return { text: "Rain", icon: SVG_ASSETS.WEATHER_RAIN };
                if (code >= 71 && code <= 77) return { text: "Snowfall", icon: SVG_ASSETS.WEATHER_SNOW };
                if (code >= 80 && code <= 82) return { text: "Rain Showers", icon: SVG_ASSETS.WEATHER_RAIN };
                if (code >= 85 && code <= 86) return { text: "Snow Showers", icon: SVG_ASSETS.WEATHER_SNOW };
                if (code >= 95) return { text: "Thunderstorm", icon: SVG_ASSETS.WEATHER_RAIN };
                return { text: "Cloudy", icon: SVG_ASSETS.WEATHER_CLOUD };
            }

            renderSuccessState(data) {
                if (!this.mainRowElement) return;
                this.mainRowElement.innerHTML = `
                    <div class="weather-information-left">
                        <span class="weather-city-label">Spånga</span>
                        <h2 class="weather-temperature-display">${data.current.temp}°</h2>
                        <span class="weather-condition-description">${data.current.text}</span>
                    </div>
                    <div class="weather-graphics-right">
                        <div class="weather-vector-icon">${data.current.icon}</div>
                        <span class="weather-high-low-range">H:${data.current.high}° L:${data.current.low}°</span>
                    </div>
                `;

                if (this.hourlyContainerElement && data.hourly && data.hourly.length > 0) {
                    this.hourlyContainerElement.innerHTML = data.hourly.map((hourBlock, index) => `
                        <div class="hourly-item-block" style="animation-delay: ${index * 50}ms;">
                            <span class="hourly-item-time">${hourBlock.time}</span>
                            <div class="hourly-item-icon">${hourBlock.icon}</div>
                            <span class="hourly-item-temp">${hourBlock.temp}°</span>
                        </div>
                    `).join('');
                }
            }

            async fetchAndRender() {
                const cachedPayload = sessionStorage.getItem(STORAGE_KEYS.WEATHER_CACHE);
                if (cachedPayload) {
                    try {
                        this.renderSuccessState(JSON.parse(cachedPayload));
                    } catch (e) {
                        this.renderLoadingState(); 
                    }
                } else {
                    this.renderLoadingState();
                }

                try {
                    const rawData = await NetworkService.get(this.apiUrl);
                    if (!rawData || !rawData.current || !rawData.daily || !rawData.hourly) throw new Error("API Failure");

                    const currentCondition = this.parseWmoWeatherCode(rawData.current.weather_code);
                    const compiledWeatherData = {
                        current: {
                            temp: Math.round(rawData.current.temperature_2m),
                            text: currentCondition.text,
                            icon: currentCondition.icon,
                            high: Math.round(rawData.daily.temperature_2m_max[0]),
                            low: Math.round(rawData.daily.temperature_2m_min[0])
                        },
                        hourly: []
                    };

                    let startIndex = 0;
                    const nowTime = new Date().getTime();
                    for (let i = 0; i < rawData.hourly.time.length; i++) {
                        if (new Date(rawData.hourly.time[i]).getTime() >= nowTime - 1800000) { 
                            startIndex = i; break;
                        }
                    }

                    for (let i = startIndex; i < startIndex + 24 && i < rawData.hourly.time.length; i++) {
                        const dateObj = new Date(rawData.hourly.time[i]);
                        const hoursStr = String(dateObj.getHours()).padStart(2, '0') + ":00";
                        const hCondition = this.parseWmoWeatherCode(rawData.hourly.weather_code[i]);
                        compiledWeatherData.hourly.push({
                            time: i === startIndex ? "Now" : hoursStr,
                            temp: Math.round(rawData.hourly.temperature_2m[i]),
                            icon: hCondition.icon
                        });
                    }

                    this.renderSuccessState(compiledWeatherData);
                    sessionStorage.setItem(STORAGE_KEYS.WEATHER_CACHE, JSON.stringify(compiledWeatherData));

                } catch (error) {
                    if (!cachedPayload) this.renderErrorState("Data Unavailable");
                }
            }
        }

        /* ==========================================================================
           NETWORK SERVICE LAYER
           ========================================================================== */

        class NetworkManager {
            constructor() {
                this.defaultTimeoutMs = 12000; 
            }
            async get(url) {
                const abortController = new AbortController();
                const timeoutId = setTimeout(() => abortController.abort(), this.defaultTimeoutMs);
                try {
                    const response = await fetch(url, { signal: abortController.signal });
                    clearTimeout(timeoutId);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return await response.json();
                } catch (error) {
                    clearTimeout(timeoutId);
                    throw error;
                }
            }
            async post(url, body) {
                const abortController = new AbortController();
                const timeoutId = setTimeout(() => abortController.abort(), this.defaultTimeoutMs);
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body),
                        signal: abortController.signal
                    });
                    clearTimeout(timeoutId);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return await response.json();
                } catch (error) {
                    clearTimeout(timeoutId);
                    throw error;
                }
            }
        }
        const NetworkService = new NetworkManager();
        
        /* ==========================================================================
           COLOR WHEEL LOGIC (HTML5 CANVAS WITH MATHEMATICAL SNAP)
           ========================================================================== */
           
        class ColorWheelManager {
            constructor(deviceId, canvasElement, indicatorElement) {
                this.deviceId = deviceId;
                this.canvas = canvasElement;
                this.indicator = indicatorElement;
                this.isDragging = false;
                this.fixedCanvasDimension = 200;
                this.fixedCenterPoint = this.fixedCanvasDimension / 2; 
                this.bindEvents();
            }

            bindEvents() {
                const handleStart = (e) => { this.isDragging = true; this.processInteraction(e); if(e.cancelable) e.preventDefault(); };
                const handleMove = (e) => { if (!this.isDragging) return; this.processInteraction(e); if(e.cancelable) e.preventDefault(); };
                const handleEnd = (e) => { if(this.isDragging) { this.isDragging = false; this.dispatchFinalColorCommand(); }};

                this.canvas.addEventListener('mousedown', handleStart, {passive: false});
                this.canvas.addEventListener('mousemove', handleMove, {passive: false});
                window.addEventListener('mouseup', handleEnd);
                this.canvas.addEventListener('touchstart', handleStart, {passive: false});
                this.canvas.addEventListener('touchmove', handleMove, {passive: false});
                window.addEventListener('touchend', handleEnd);
            }

            processInteraction(event) {
                const rect = this.canvas.getBoundingClientRect();
                let clientX = event.clientX;
                let clientY = event.clientY;
                if (event.touches && event.touches.length > 0) {
                    clientX = event.touches[0].clientX;
                    clientY = event.touches[0].clientY;
                }

                const centerX = rect.width / 2; 
                const centerY = rect.height / 2;
                
                const xOffset = clientX - rect.left - centerX;
                const yOffset = clientY - rect.top - centerY;

                const rawAngleRadians = Math.atan2(yOffset, xOffset);
                const rawDistance = Math.sqrt(xOffset * xOffset + yOffset * yOffset);
                
                let clampedDistance = Math.min(rawDistance, this.fixedCenterPoint);
                const SNAP_RADIUS = 18;
                if (clampedDistance <= SNAP_RADIUS) clampedDistance = 0;
                
                const saturationRatio = clampedDistance / this.fixedCenterPoint;

                const visualThumbX = this.fixedCenterPoint + Math.cos(rawAngleRadians) * clampedDistance;
                const visualThumbY = this.fixedCenterPoint + Math.sin(rawAngleRadians) * clampedDistance;
                
                this.indicator.style.left = `${visualThumbX}px`;
                this.indicator.style.top = `${visualThumbY}px`;
                
                let hueDegrees = (rawAngleRadians * 180 / Math.PI) + 90; 
                if (hueDegrees < 0) hueDegrees += 360;
                if (hueDegrees >= 360) hueDegrees -= 360;
                
                const lightnessPct = 100 - (saturationRatio * 50);
                this.indicator.style.backgroundColor = `hsl(${hueDegrees}, 100%, ${lightnessPct}%)`;

                DeviceManager.devicesState[this.deviceId].hue = Math.round(hueDegrees);
                DeviceManager.devicesState[this.deviceId].saturation = Math.round(saturationRatio * 1000);
                
                if (ApplicationUI.isDevicesLinked) {
                    TUYA_DEVICES.forEach(deviceData => {
                        if (deviceData.id !== this.deviceId) {
                            DeviceManager.devicesState[deviceData.id].hue = Math.round(hueDegrees);
                            DeviceManager.devicesState[deviceData.id].saturation = Math.round(saturationRatio * 1000);
                            if (DeviceManager.colorWheelControllers[deviceData.id]) {
                                DeviceManager.colorWheelControllers[deviceData.id].updateIndicatorFromState();
                            }
                        }
                    });
                }
            }

            dispatchFinalColorCommand() {
                const targetIds = ApplicationUI.isDevicesLinked ? TUYA_DEVICES.map(d=>d.id) : [this.deviceId];
                targetIds.forEach(id => DeviceManager.executeColorCommand(id));
            }
            
            updateIndicatorFromState() {
                const state = DeviceManager.devicesState[this.deviceId];
                
                if(state.hue === undefined || state.saturation === undefined || (state.hue === 0 && state.saturation === 0)) {
                    this.indicator.style.left = `100px`; 
                    this.indicator.style.top = `100px`;
                    this.indicator.style.backgroundColor = `#FFFFFF`;
                    return;
                }
                
                const angleRadians = (state.hue - 90) * (Math.PI / 180);
                const distanceRatio = state.saturation / 1000;
                const absoluteDistance = distanceRatio * this.fixedCenterPoint;
                
                const visualThumbX = this.fixedCenterPoint + Math.cos(angleRadians) * absoluteDistance;
                const visualThumbY = this.fixedCenterPoint + Math.sin(angleRadians) * absoluteDistance;
                
                this.indicator.style.left = `${visualThumbX}px`;
                this.indicator.style.top = `${visualThumbY}px`;
                
                const lightnessPct = 100 - (distanceRatio * 50);
                this.indicator.style.backgroundColor = `hsl(${state.hue}, 100%, ${lightnessPct}%)`;
            }
        }

        /* ==========================================================================
           STATE & API MANAGEMENT FOR SMART DEVICES
           ========================================================================== */

        class TuyaSmartDeviceManager {
            constructor() {
                this.workerApiUrl = localStorage.getItem(STORAGE_KEYS.WORKER_URL) || '';
                this.devicesState = {};
                this.colorWheelControllers = {};
                
                for (let i = 0; i < TUYA_DEVICES.length; i++) {
                    const device = TUYA_DEVICES[i];
                    this.devicesState[device.id] = { on: false, brightness: 100, hue: 0, saturation: 0 };
                }
                this.debounceTimers = {};
            }

            buildEndpointUrl(path) { return this.workerApiUrl.replace(/\/$/, '') + path; }
            setApiUrl(newUrl) { this.workerApiUrl = newUrl.trim(); localStorage.setItem(STORAGE_KEYS.WORKER_URL, this.workerApiUrl); }
            isConfigured() { return this.workerApiUrl !== null && this.workerApiUrl !== ''; }

            async synchronizeAllDevices() {
                if (!this.isConfigured()) return;
                for (let i = 0; i < TUYA_DEVICES.length; i++) {
                    const device = TUYA_DEVICES[i];
                    ApplicationUI.setDeviceConnectingState(device.id, true);
                    try {
                        const jsonPayload = await NetworkService.get(this.buildEndpointUrl(`/status?device=${device.id}`));
                        if (jsonPayload.success && jsonPayload.result) this.parseAndApplyTuyaStatusPayload(device.id, jsonPayload.result);
                    } catch (error) {
                    } finally {
                        ApplicationUI.setDeviceConnectingState(device.id, false);
                        ApplicationUI.updateDeviceCardRender(device.id);
                        if(this.colorWheelControllers[device.id]) this.colorWheelControllers[device.id].updateIndicatorFromState();
                    }
                }
            }

            parseAndApplyTuyaStatusPayload(deviceId, statusArray) {
                const powerInstruction = statusArray.find(instruction => instruction.code === 'switch_led');
                if (powerInstruction !== undefined) this.devicesState[deviceId].on = powerInstruction.value;
                
                const colorInstruction = statusArray.find(instruction => instruction.code === 'colour_data_v2' || instruction.code === 'colour_data');
                if (colorInstruction !== undefined) {
                    try {
                        const parsedValueObject = typeof colorInstruction.value === 'string' ? JSON.parse(colorInstruction.value) : colorInstruction.value;
                        if (parsedValueObject) {
                            if (parsedValueObject.v !== undefined) this.devicesState[deviceId].brightness = Math.max(1, Math.min(100, Math.round(parsedValueObject.v / 10)));
                            if (parsedValueObject.h !== undefined) this.devicesState[deviceId].hue = parsedValueObject.h;
                            if (parsedValueObject.s !== undefined) this.devicesState[deviceId].saturation = parsedValueObject.s;
                        }
                    } catch (parseError) {}
                }
            }

            async toggleDevicePower(deviceId) {
                if (!this.isConfigured()) return ApplicationUI.openSettingsModal();

                const targetState = !this.devicesState[deviceId].on;
                const targetDeviceIds = ApplicationUI.isDevicesLinked ? TUYA_DEVICES.map(d => d.id) : [deviceId];

                targetDeviceIds.forEach(id => {
                    this.devicesState[id].on = targetState;
                    ApplicationUI.setDeviceConnectingState(id, true);
                    ApplicationUI.updateDeviceCardRender(id);
                });

                try {
                    const url = this.buildEndpointUrl('/command');
                    await Promise.all(targetDeviceIds.map(id => NetworkService.post(url, { device: id, commands: [{ code: 'switch_led', value: targetState }] })));
                } catch (error) {
                    GlobalToast.show("Network Error. Reverting.");
                    targetDeviceIds.forEach(id => {
                        this.devicesState[id].on = !targetState;
                        ApplicationUI.updateDeviceCardRender(id);
                    });
                } finally {
                    targetDeviceIds.forEach(id => ApplicationUI.setDeviceConnectingState(id, false));
                }
            }

            handleBrightnessChangeIntent(deviceId, newBrightnessPercentage) {
                if (!this.isConfigured()) return;
                if (this.debounceTimers[deviceId]) clearTimeout(this.debounceTimers[deviceId]);
                this.debounceTimers[deviceId] = setTimeout(() => this.executeBrightnessCommand(deviceId, newBrightnessPercentage), 400);
            }

            async executeBrightnessCommand(deviceId, newBrightnessPercentage) {
                const targetDeviceIds = ApplicationUI.isDevicesLinked ? TUYA_DEVICES.map(d => d.id) : [deviceId];
                const tuyaFormatBrightness = parseInt(newBrightnessPercentage, 10) * 10;
                
                let dispatchNeeded = false;
                targetDeviceIds.forEach(id => {
                    if (this.devicesState[id].on === true) { dispatchNeeded = true; ApplicationUI.setDeviceConnectingState(id, true); }
                });
                if(!dispatchNeeded) return;

                try {
                    const url = this.buildEndpointUrl('/command');
                    await Promise.all(targetDeviceIds.map(id => {
                        if (this.devicesState[id].on === false) return Promise.resolve();
                        return NetworkService.post(url, { device: id, commands: [ { code: 'work_mode', value: 'colour' }, { code: 'colour_data', value: JSON.stringify({ h: this.devicesState[id].hue || 0, s: this.devicesState[id].saturation || 0, v: tuyaFormatBrightness }) } ] });
                    }));
                } catch (error) {
                    GlobalToast.show("Network Error.");
                } finally {
                    targetDeviceIds.forEach(id => ApplicationUI.setDeviceConnectingState(id, false));
                }
            }
            
            async executeColorCommand(deviceId) {
                if (!this.isConfigured()) return;
                
                const targetDeviceIds = ApplicationUI.isDevicesLinked ? TUYA_DEVICES.map(d => d.id) : [deviceId];
                
                targetDeviceIds.forEach(id => {
                    if (this.devicesState[id].on === false) {
                        this.devicesState[id].on = true;
                        ApplicationUI.updateDeviceCardRender(id);
                    }
                    ApplicationUI.setDeviceConnectingState(id, true);
                });

                try {
                    const url = this.buildEndpointUrl('/command');
                    await Promise.all(targetDeviceIds.map(id => {
                        return NetworkService.post(url, { device: id, commands: [ { code: 'work_mode', value: 'colour' }, { code: 'colour_data', value: JSON.stringify({ h: this.devicesState[id].hue, s: this.devicesState[id].saturation, v: this.devicesState[id].brightness * 10 }) } ] });
                    }));
                } catch (error) {
                    GlobalToast.show("Failed to apply color configuration.");
                } finally {
                    targetDeviceIds.forEach(id => ApplicationUI.setDeviceConnectingState(id, false));
                }
            }
        }
        const DeviceManager = new TuyaSmartDeviceManager();

        class UserInterfaceController {
            constructor() {
                this.layoutMode = localStorage.getItem(STORAGE_KEYS.LAYOUT_MODE) || 'portrait';
                this.isDevicesLinked = localStorage.getItem(STORAGE_KEYS.DEVICES_LINKED) === 'true';
                
                this.deviceGridContainer = document.getElementById('main-device-grid');
                this.settingsModalBackdrop = document.getElementById('modal-backdrop-settings');
                this.inputWorkerUrl = document.getElementById('input-field-worker-url');
                
                this.handleSettingsSave = this.handleSettingsSave.bind(this);
                this.handleSettingsCancel = this.handleSettingsCancel.bind(this);
            }

            initialize() {
                this.applyLayoutModeToBody();
                this.applyGlobalLinkStateToButton();
                this.constructDeviceGrid();
                this.attachStaticEventListeners();
                this.evaluateAndRenderActiveRoutine();
            }

            applyLayoutModeToBody() {
                if (this.layoutMode === 'landscape') document.body.classList.add('layout-mode-landscape');
                else document.body.classList.remove('layout-mode-landscape');

                const btnPortrait = document.getElementById('segment-btn-portrait');
                const btnLandscape = document.getElementById('segment-btn-landscape');
                
                if (btnPortrait && btnLandscape) {
                    if (this.layoutMode === 'portrait') {
                        btnPortrait.classList.add('is-segment-active');
                        btnPortrait.setAttribute('aria-checked', 'true');
                        btnLandscape.classList.remove('is-segment-active');
                        btnLandscape.setAttribute('aria-checked', 'false');
                    } else {
                        btnLandscape.classList.add('is-segment-active');
                        btnLandscape.setAttribute('aria-checked', 'true');
                        btnPortrait.classList.remove('is-segment-active');
                        btnPortrait.setAttribute('aria-checked', 'false');
                    }
                }
            }

            setLayoutMode(mode) {
                if (mode === 'portrait' || mode === 'landscape') {
                    this.layoutMode = mode;
                    this.applyLayoutModeToBody();
                }
            }
            
            applyGlobalLinkStateToButton() {
                const btn = document.getElementById('global-link-synchronization-button');
                if (!btn) return;
                
                if (this.isDevicesLinked) {
                    btn.classList.add('is-devices-linked');
                    btn.setAttribute('aria-pressed', 'true');
                } else {
                    btn.classList.remove('is-devices-linked');
                    btn.setAttribute('aria-pressed', 'false');
                }
            }
            
            toggleGlobalLinkState() {
                this.isDevicesLinked = !this.isDevicesLinked;
                localStorage.setItem(STORAGE_KEYS.DEVICES_LINKED, this.isDevicesLinked);
                this.applyGlobalLinkStateToButton();
                
                if (this.isDevicesLinked) GlobalToast.show("Devices Synced");
                else GlobalToast.show("Devices Unlinked");
            }

            attachStaticEventListeners() {
                document.getElementById('header-btn-refresh').addEventListener('click', () => {
                    if (!DeviceManager.isConfigured()) return this.openSettingsModal();
                    GlobalToast.show("Synchronizing...");
                    DeviceManager.synchronizeAllDevices();
                });

                document.getElementById('header-btn-settings').addEventListener('click', () => this.openSettingsModal());
                document.getElementById('segment-btn-portrait').addEventListener('click', () => this.setLayoutMode('portrait'));
                document.getElementById('segment-btn-landscape').addEventListener('click', () => this.setLayoutMode('landscape'));
                document.getElementById('modal-btn-save').addEventListener('click', this.handleSettingsSave);
                document.getElementById('modal-btn-cancel').addEventListener('click', this.handleSettingsCancel);
                document.getElementById('global-link-synchronization-button').addEventListener('click', () => this.toggleGlobalLinkState());

            toggleWeatherExpansion() {
                const widget = document.getElementById('weather-dashboard-widget');
                if(widget) widget.classList.toggle('is-expanded');
            }

            // ================== AGENDA UI METHODS ==================

            evaluateAndRenderActiveRoutine() {
                const activeRoutine = AgendaSystem.getActiveRoutine();
                const sectionContainer = document.getElementById('agenda-dashboard-section');
                const timeLabel = document.getElementById('agenda-active-time-label');
                const listContainer = document.getElementById('agenda-main-list-container');

                if (!sectionContainer || !timeLabel || !listContainer) return;

                if (!activeRoutine) {
                    sectionContainer.style.display = 'none';
                    return;
                }

                sectionContainer.style.display = 'block';
                timeLabel.innerText = `${activeRoutine.startTime} - ${activeRoutine.endTime}`;
                
                const sortedTasks = [...activeRoutine.tasks].sort((a, b) => a.order - b.order);

                if (sortedTasks.length === 0) {
                    listContainer.innerHTML = `<div class="agenda-empty-state">No tasks scheduled for this period.</div>`;
                } else {
                    listContainer.innerHTML = sortedTasks.map(task => `
                        <div class="agenda-item-row ${task.completed ? 'is-task-completed' : ''}" onclick="ApplicationUI.handleDashboardTaskToggle('${activeRoutine.id}', '${task.id}')">
                            <div class="agenda-checkbox-container">
                                <svg class="agenda-checkbox-svg" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            <div class="agenda-item-content">
                                <span class="agenda-item-title">${task.title}</span>
                            </div>
                        </div>
                    `).join('');
                }
            }

            handleDashboardTaskToggle(routineId, taskId) {
                AgendaSystem.toggleTaskCompletion(routineId, taskId);
                this.evaluateAndRenderActiveRoutine();
            }

            renderAgendaEditorSettings() {
                const container = document.getElementById('settings-agenda-editor-container');
                if (!container) return;

                const sortedRoutines = [...AgendaSystem.routines].sort((a, b) => a.order - b.order);

                if (sortedRoutines.length === 0) {
                    container.innerHTML = `<div class="agenda-empty-state" style="margin-bottom:24px;">No routines created yet.</div>`;
                    return;
                }

                const upIcon = SVG_ASSETS.UP_CHEVRON;
                const downIcon = SVG_ASSETS.DOWN_CHEVRON;
                const trashIcon = SVG_ASSETS.TRASH_CAN;
                const plusIcon = SVG_ASSETS.PLUS_ICON;

                let editorHtml = '';

                sortedRoutines.forEach(routine => {
                    const sortedTasks = [...routine.tasks].sort((a, b) => a.order - b.order);
                    
                    let tasksHtml = '';
                    if (sortedTasks.length === 0) {
                        tasksHtml = `<div class="agenda-empty-state" style="font-size:13px; padding:4px;">No tasks. Add one below.</div>`;
                    } else {
                        tasksHtml = sortedTasks.map((task, tIndex) => `
                            <div class="agenda-task-edit-item">
                                <span class="agenda-task-edit-title">${task.title}</span>
                                <div class="agenda-task-edit-controls">
                                    <button class="agenda-edit-action-btn" onclick="AgendaSystem.moveTaskUp('${routine.id}', '${task.id}'); ApplicationUI.renderAgendaEditorSettings();" ${tIndex === 0 ? 'disabled style="opacity:0.3"' : ''}>${upIcon}</button>
                                    <button class="agenda-edit-action-btn" onclick="AgendaSystem.moveTaskDown('${routine.id}', '${task.id}'); ApplicationUI.renderAgendaEditorSettings();" ${tIndex === sortedTasks.length - 1 ? 'disabled style="opacity:0.3"' : ''}>${downIcon}</button>
                                    <button class="agenda-edit-action-btn delete" onclick="AgendaSystem.deleteTask('${routine.id}', '${task.id}'); ApplicationUI.renderAgendaEditorSettings();">${trashIcon}</button>
                                </div>
                            </div>
                        `).join('');
                    }

                    editorHtml += `
                        <div class="agenda-routine-block">
                            <div class="agenda-routine-header">
                                <div class="agenda-routine-title-info">
                                    <span class="agenda-routine-title-text">${routine.title}</span>
                                    <span class="agenda-routine-time-text">${routine.startTime} - ${routine.endTime}</span>
                                </div>
                                <button class="agenda-edit-action-btn delete" onclick="AgendaSystem.deleteRoutine('${routine.id}'); ApplicationUI.renderAgendaEditorSettings();" title="Delete Routine">${trashIcon}</button>
                            </div>
                            <div style="display:flex; flex-direction:column; gap:8px;">${tasksHtml}</div>
                            <div class="agenda-add-task-form">
                                <input type="text" class="settings-text-input-field" style="margin-bottom:0; padding:12px; font-size:14px; border-radius:12px;" id="add-task-input-${routine.id}" placeholder="New task..." autocomplete="off">
                                <button class="settings-action-button-primary" style="margin:0; width:auto; padding:12px 16px; border-radius:12px;" onclick="ApplicationUI.handleAddNewTaskToRoutine('${routine.id}')">${plusIcon}</button>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = editorHtml;
            }

            handleAddNewTaskToRoutine(routineId) {
                const inputElement = document.getElementById(`add-task-input-${routineId}`);
                if (inputElement && inputElement.value.trim() !== '') {
                    AgendaSystem.addTaskToRoutine(routineId, inputElement.value);
                    this.renderAgendaEditorSettings(); 
                    this.evaluateAndRenderActiveRoutine(); 
                }
            }

            // ================== END AGENDA UI METHODS ==================

                    this.deviceGridContainer.removeChild(this.deviceGridContainer.firstChild);
                }

                for (let i = 0; i < TUYA_DEVICES.length; i++) {
                    const deviceData = TUYA_DEVICES[i];
                    const currentState = DeviceManager.devicesState[deviceData.id];
                    const activeClassString = currentState.on ? 'state-is-on' : '';

                    const cardElement = document.createElement('article');
                    cardElement.className = `smart-device-card ${activeClassString}`;
                    cardElement.id = `device-card-wrapper-${deviceData.id}`;
                    cardElement.setAttribute('aria-label', `Control for ${deviceData.name}`);

                    cardElement.innerHTML = `
                        <div class="card-base-content">

                                <div class="device-toggle-icon-container"

                                     role="button" 
                                     aria-pressed="${currentState.on ? 'true' : 'false'}" 
                                     aria-label="Toggle Power for ${deviceData.name}">
                                    ${SVG_ASSETS.LIGHTBULB}
                                </div>
                            </div>
                            
                            <div class="device-text-information-block">
                                <div class="device-display-name">${deviceData.name}</div>

                            </div>

                            <div class="device-brightness-slider-container">
                                <div class="brightness-slider-visual-fill" 
                                     id="slider-fill-layer-${deviceData.id}" 
                                     style="--current-fill-percentage: ${currentState.brightness}%">
                                </div>
                                <input type="range" 
                                       class="brightness-native-range-input" 
                                       id="native-slider-input-${deviceData.id}"
                                       min="1" 
                                       max="100" 
                                       step="1" 
                                       value="${currentState.brightness}"
                                       aria-label="Brightness Control for ${deviceData.name}"
                                       aria-valuemin="1"
                                       aria-valuemax="100"
                                       aria-valuenow="${currentState.brightness}"
                                       aria-valuetext="${currentState.brightness} percent"
                                       ${currentState.on ? '' : 'disabled'}>
