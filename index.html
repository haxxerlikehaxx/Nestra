<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Nestra: Ultimate Premium Apple HomeKit Style Smart Home Controller for iPad Air 2">
    
    <!-- Application Identity & iOS Home Screen Iconography -->
    <title>Nestra</title>
    <link rel="icon" href="/home/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/home/apple-touch-icon.png">

    <style>
        /* ==========================================================================
           CUSTOM TYPOGRAPHY INTEGRATION (ENTERPRISE GRADE)
           Mapping exact local files to distinct font families to prevent faux-bolding
           ========================================================================== */

        @font-face {
            font-family: 'SF Pro Light Custom';
            src: url('./SFProLight.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'SF Pro Regular Custom';
            src: url('./SFProRegular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'SF Pro Medium Custom';
            src: url('./SFProMedium.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'SF Pro Semibold Soft Custom';
            /* URL encoded spaces for maximum browser compatibility */
            src: url('./SF%20Pro%20-%20Semibold%20Soft.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'SF Pro Bold Custom';
            src: url('./SF-Pro-Display-Bold.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* ==========================================================================
           GLOBAL DESIGN TOKENS & VARIABLES
           ========================================================================== */
        :root {
            /* Core Backgrounds */
            --application-background-color: #000000;
            
            /* Glassmorphism System */
            --glass-background-base: rgba(255, 255, 255, 0.08);
            --glass-border-color: rgba(255, 255, 255, 0.12);
            --glass-background-hover: rgba(255, 255, 255, 0.15);
            --glass-backdrop-filter-blur: blur(45px);
            --glass-backdrop-filter-saturate: saturate(180%);
            
            /* Active Device States (ON) - Flawless Solid Colors */
            --card-active-background-color: #FFFFFF; /* Pure Apple White */
            --card-active-text-color: #000000;
            --card-active-subtitle-color: rgba(0, 0, 0, 0.50);
            --icon-active-background-color: #FFCC00; /* Apple System Yellow */
            --icon-active-foreground-color: #FFFFFF;
            --icon-active-box-shadow: 0px 6px 16px rgba(255, 204, 0, 0.35);
            
            /* Premium Slider */
            --slider-active-track-color: #F2F2F7; /* Apple Grouped Background Grey */
            --slider-active-fill-color: #D1D1D6; /* Apple System Gray 4 - Beautiful Silver */
            --slider-active-fill-shadow: inset 0px 1px 1px rgba(255, 255, 255, 0.8), 0px 1px 4px rgba(0, 0, 0, 0.06);

            /* Inactive Device States (OFF) */
            --card-inactive-text-color: #FFFFFF;
            --card-inactive-subtitle-color: rgba(255, 255, 255, 0.55);
            --icon-inactive-background-color: rgba(255, 255, 255, 0.12);
            --icon-inactive-foreground-color: rgba(255, 255, 255, 0.60);
            --slider-inactive-track-color: rgba(0, 0, 0, 0.25);
            --slider-inactive-fill-color: rgba(255, 255, 255, 0.20);
            --slider-inactive-fill-shadow: none;

            /* Link Device Active State */
            --link-active-background-color: #0A84FF; /* Apple System Blue */
            --link-active-foreground-color: #FFFFFF;
            --link-active-box-shadow: 0px 4px 16px rgba(10, 132, 255, 0.4);

            /* Typography Pointers */
            --font-light: 'SF Pro Light Custom', -apple-system, sans-serif;
            --font-regular: 'SF Pro Regular Custom', -apple-system, sans-serif;
            --font-medium: 'SF Pro Medium Custom', -apple-system, sans-serif;
            --font-semibold-soft: 'SF Pro Semibold Soft Custom', -apple-system, sans-serif;
            --font-bold: 'SF Pro Bold Custom', -apple-system, sans-serif;
            
            /* Physics & Animation Curves */
            --animation-spring-curve: cubic-bezier(0.32, 0.72, 0, 1.0);
            --animation-ease-out-curve: cubic-bezier(0.25, 1.0, 0.5, 1.0);
            --animation-duration-fast: 0.2s;
            --animation-duration-medium: 0.4s;
            --animation-duration-slow: 0.6s;

            /* Layout Constraints & Mathematical Animation Bounds */
            --layout-max-width-portrait: 768px;
            --layout-max-width-landscape: 1024px;
            --layout-padding-horizontal-portrait: 32px;
            --layout-padding-horizontal-landscape: 48px;
            --layout-padding-vertical-bottom: 40px;
            
            /* Card Height Mathematics (Critical for smooth expansion animation) */
            --card-base-height: 200px;
            --grid-gap-portrait: 24px;
            --card-expanded-height-portrait: 424px; /* 200 + 200 + 24 */
            
            --grid-gap-landscape: 32px;
            --card-expanded-height-landscape: 432px; /* 200 + 200 + 32 */
        }

        /* ==========================================================================
           CSS RESET & NORMALIZATION
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin-top: 0;
            margin-right: 0;
            margin-bottom: 0;
            margin-left: 0;
            padding-top: 0;
            padding-right: 0;
            padding-bottom: 0;
            padding-left: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            /* Set a baseline to inherit from, but explicit components will use specific variables */
            font-family: var(--font-regular);
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            background-color: var(--application-background-color);
            color: var(--card-inactive-text-color);
            margin-left: auto;
            margin-right: auto;
            min-height: 100vh;
            padding-top: calc(env(safe-area-inset-top, 40px) + 24px);
            padding-right: var(--layout-padding-horizontal-portrait);
            padding-bottom: var(--layout-padding-vertical-bottom);
            padding-left: var(--layout-padding-horizontal-portrait);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
            touch-action: pan-y;
            max-width: var(--layout-max-width-portrait);
            
            transition-property: max-width, padding-right, padding-left;
            transition-duration: var(--animation-duration-medium);
            transition-timing-function: var(--animation-ease-out-curve);
        }

        /* Responsive Landscape Injection */
        body.layout-mode-landscape {
            max-width: var(--layout-max-width-landscape);
            padding-right: var(--layout-padding-horizontal-landscape);
            padding-left: var(--layout-padding-horizontal-landscape);
        }

        /* Allow typing explicitly in input fields */
        input, textarea, select {
            user-select: text !important;
            -webkit-user-select: text !important;
            -webkit-touch-callout: default !important;
            font-family: var(--font-regular);
        }

        /* ==========================================================================
           HEADER COMPONENT
           ========================================================================== */
        .application-header {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 36px;
            padding-left: 8px;
            padding-right: 8px;
        }

        /* CRITICAL TYPOGRAPHY FIX: Proportional Numbers for perfectly kerned Clock Digits */
        .application-title {
            font-family: var(--font-medium);
            font-weight: normal; /* Let the custom font file dictate the physical weight */
            font-size: 38px;
            letter-spacing: -0.04em; /* Tight, native Apple kerning */
            line-height: 1.2;
            color: #FFFFFF;
            
            /* Replaced tabular-nums with proportional-nums to fix the massive gap around the digit '1' */
            font-variant-numeric: proportional-nums;
            
            /* Low-level OpenType feature explicit enforcement for WebKit rendering accuracy */
            font-feature-settings: "pnum" 1, "tnum" 0, "kern" 1;
        }

        .header-controls-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 16px;
        }

        .circular-icon-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--glass-background-base);
            border-top-width: 1px;
            border-right-width: 1px;
            border-bottom-width: 1px;
            border-left-width: 1px;
            border-style: solid;
            border-color: var(--glass-border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            cursor: pointer;
            backdrop-filter: var(--glass-backdrop-filter-blur) var(--glass-backdrop-filter-saturate);
            -webkit-backdrop-filter: var(--glass-backdrop-filter-blur) var(--glass-backdrop-filter-saturate);
            
            transition-property: transform, background-color;
            transition-duration: var(--animation-duration-medium), var(--animation-duration-fast);
            transition-timing-function: var(--animation-spring-curve), var(--animation-ease-out-curve);
            
            outline: none;
        }

        .circular-icon-button:active {
            transform: scale(0.88);
            background-color: var(--glass-background-hover);
        }

        .circular-icon-button svg {
            width: 20px;
            height: 20px;
        }

        /* ==========================================================================
           WEATHER WIDGET COMPONENT (EXPANDABLE & HARDWARE ACCELERATED)
           ========================================================================== */
        .weather-dashboard-widget {
            background-color: var(--glass-background-base);
            border-top-width: 1px;
            border-right-width: 1px;
            border-bottom-width: 1px;
            border-left-width: 1px;
            border-style: solid;
            border-color: var(--glass-border-color);
            backdrop-filter: var(--glass-backdrop-filter-blur) var(--glass-backdrop-filter-saturate);
            -webkit-backdrop-filter: var(--glass-backdrop-filter-blur) var(--glass-backdrop-filter-saturate);
            border-radius: 32px;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            box-shadow: 0px 12px 48px rgba(0, 0, 0, 0.4), inset 0px 1px 0px rgba(255, 255, 255, 0.1);
            cursor: pointer;
            
            /* Hardware Acceleration for iPad Air 2 Rendering Performance */
            transform: translate3d(0, 0, 0);
            -webkit-transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            perspective: 1000px;
            -webkit-perspective: 1000px;
            
            transition-property: transform, background-color;
            transition-duration: var(--animation-duration-medium);
            transition-timing-function: var(--animation-spring-curve);
        }

        .weather-dashboard-widget:active {
            transform: scale(0.97) translate3d(0, 0, 0);
            background-color: var(--glass-background-hover);
        }

        .weather-main-row {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding-top: 28px;
            padding-right: 32px;
            padding-bottom: 28px;
            padding-left: 32px;
        }

        .weather-information-left { display: flex; flex-direction: column; gap: 6px; }
        
        .weather-city-label { 
            font-family: var(--font-bold);
            font-weight: normal;
            font-size: 15px; 
            color: var(--card-inactive-subtitle-color); 
            text-transform: uppercase; 
            letter-spacing: 0.06em; 
        }
        
        .weather-temperature-display { 
            font-family: var(--font-light);
            font-weight: normal;
            font-size: 56px; 
            letter-spacing: -0.05em; 
            line-height: 1.0; 
            margin-top: 4px; 
            margin-bottom: 4px; 
            color: #FFFFFF; 
            font-variant-numeric: proportional-nums;
            font-feature-settings: "pnum" 1, "tnum" 0;
        }
        
        .weather-condition-description { 
            font-family: var(--font-regular);
            font-weight: normal;
            font-size: 16px; 
            color: var(--card-inactive-subtitle-color); 
        }
        
        .weather-graphics-right { display: flex; flex-direction: column; align-items: flex-end; gap: 16px; }
        .weather-vector-icon { width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; }
        .weather-vector-icon svg { width: 100%; height: 100%; filter: drop-shadow(0px 6px 16px rgba(255, 255, 255, 0.15)); }
        
        .weather-high-low-range { 
            font-family: var(--font-medium);
            font-weight: normal;
            font-size: 15px; 
            color: var(--card-inactive-subtitle-color); 
        }
        
        /* Expandable Hourly Section with Hardware Compositing Layers */
        .weather-hourly-container {
            max-height: 0px;
            opacity: 0;
            overflow-x: auto;
            overflow-y: hidden;
            display: flex;
            flex-direction: row;
            gap: 24px;
            padding-left: 32px;
            padding-right: 32px;
            padding-top: 0px;
            padding-bottom: 0px;
            border-top-width: 1px;
            border-top-style: solid;
            border-top-color: transparent;
            
            /* Crucial iOS Native Scrolling and GPU Acceleration bounds */
            -webkit-overflow-scrolling: touch;
            transform: translate3d(0, 0, 0);
            -webkit-transform: translate3d(0, 0, 0);
            will-change: max-height, opacity, padding-top, padding-bottom;
            
            transition-property: max-height, opacity, padding-top, padding-bottom, border-top-color;
            transition-duration: 0.5s;
            transition-timing-function: var(--animation-spring-curve);
        }

        .weather-hourly-container::-webkit-scrollbar {
            display: none;
        }

        .weather-dashboard-widget.is-expanded .weather-hourly-container {
            max-height: 160px;
            opacity: 1;
            padding-top: 24px;
            padding-bottom: 28px;
            border-top-color: rgba(255, 255, 255, 0.1);
        }

        .hourly-item-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            min-width: 48px;
            flex-shrink: 0;
        }

        .hourly-item-time { 
            font-family: var(--font-regular);
            font-weight: normal;
            font-size: 14px; 
            color: var(--card-inactive-subtitle-color); 
        }
        
        .hourly-item-icon { width: 32px; height: 32px; }
        .hourly-item-icon svg { width: 100%; height: 100%; }
        
        .hourly-item-temp { 
            font-family: var(--font-medium);
            font-weight: normal;
            font-size: 17px; 
            color: #FFFFFF; 
        }
        
        /* Skeleton Animation */
        .skeleton { background-color: rgba(255, 255, 255, 0.1); border-radius: 8px; position: relative; overflow: hidden; }
        .skeleton::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; transform: translateX(-100%); background-image: linear-gradient(90deg, rgba(255,255,255,0) 0, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%); animation: shimmer 2s infinite; }
        @keyframes shimmer { 100% { transform: translateX(100%); } }

        /* ==========================================================================
           DEVICE GRID LAYOUT & GLOBAL LINK COMPONENT
           ========================================================================== */
        
        /* Wrapper to facilitate absolute positioning of the Sync/Link button */
        .device-grid-wrapper {
            position: relative;
            width: 100%;
        }

        .section-heading-title {
            font-family: var(--font-bold);
            font-weight: normal;
            font-size: 22px;
            margin-bottom: 20px;
            padding-left: 8px;
            letter-spacing: -0.02em;
            color: #FFFFFF;
        }

        /* The Global Sync / Link Button - PERFECTLY REPOSITIONED */
        .global-link-synchronization-button {
            position: absolute;
            /* Perfectly centered mathematically between the two columns */
            left: 50%;
            /* Shifted up to sit elegantly exactly in the empty space between the title and the cards */
            top: -26px; 
            transform: translateX(-50%);
            width: 36px;
            height: 36px;
            border-radius: 18px;
            background-color: var(--glass-background-base);
            border-top-width: 1px;
            border-right-width: 1px;
            border-bottom-width: 1px;
            border-left-width: 1px;
            border-style: solid;
            border-color: var(--glass-border-color);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            cursor: pointer;
            
            transition-property: background-color, color, border-color, box-shadow, transform;
            transition-duration: var(--animation-duration-medium);
            transition-timing-function: var(--animation-spring-curve);
        }

        .global-link-synchronization-button:active {
            transform: translateX(-50%) scale(0.85);
        }

        .global-link-synchronization-button.is-devices-linked {
            background-color: var(--link-active-background-color);
            color: var(--link-active-foreground-color);
            border-color: var(--link-active-background-color);
            box-shadow: var(--link-active-box-shadow);
        }

        .global-link-synchronization-button svg {
            width: 18px;
            height: 18px;
        }

        .device-grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-auto-rows: minmax(var(--card-base-height), auto);
            column-gap: var(--grid-gap-portrait);
            row-gap: var(--grid-gap-portrait);
            
            transition-property: grid-template-columns, column-gap, row-gap;
            transition-duration: var(--animation-duration-medium);
            transition-timing-function: var(--animation-ease-out-curve);
        }

        body.layout-mode-landscape .device-grid-container {
            grid-template-columns: repeat(2, 1fr);
            column-gap: var(--grid-gap-landscape);
            row-gap: var(--grid-gap-landscape);
        }

        /* ==========================================================================
           SMART DEVICE CARD COMPONENT (EXPANDABLE & ACCELERATED)
           ========================================================================== */
        .smart-device-card {
            background-color: var(--glass-background-base);
            border-top-width: 1px;
            border-right-width: 1px;
            border-bottom-width: 1px;
            border-left-width: 1px;
            border-style: solid;
            border-color: var(--glass-border-color);
            backdrop-filter: blur(35px) saturate(160%);
            -webkit-backdrop-filter: blur(35px) saturate(160%);
            border-radius: 32px;
            padding-top: 24px;
            padding-right: 24px;
            padding-bottom: 24px;
            padding-left: 24px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            
            /* Explicit Initial Height enabling pure CSS mathematical interpolation */
            height: var(--card-base-height); 
            
            box-shadow: 0px 12px 36px rgba(0, 0, 0, 0.25), inset 0px 1px 0px rgba(255, 255, 255, 0.05);
            position: relative;
            cursor: pointer;
            
            /* Hardware Acceleration */
            transform: translate3d(0, 0, 0);
            -webkit-transform: translate3d(0, 0, 0);
            will-change: height, background-color, transform;
            
            /* The holy grail of smooth expansion: animating explicit height variables */
            transition-property: height, background-color, color, transform, box-shadow, border-color;
            transition-duration: 0.5s, var(--animation-duration-medium), var(--animation-duration-medium), var(--animation-duration-medium), var(--animation-duration-medium), var(--animation-duration-medium);
            transition-timing-function: var(--animation-spring-curve), var(--animation-ease-out-curve), var(--animation-ease-out-curve), var(--animation-spring-curve), var(--animation-ease-out-curve), var(--animation-ease-out-curve);
        }

        /* Expanded State: Explicitly dictates pixel height to perfectly bridge 2 tracks */
        .smart-device-card.is-expanded {
            grid-row-end: span 2;
            height: var(--card-expanded-height-portrait);
        }
        
        body.layout-mode-landscape .smart-device-card.is-expanded {
            height: var(--card-expanded-height-landscape);
        }

        /* State: Device is ON - Eliminated opacity drops for flawless pure color */
        .smart-device-card.state-is-on {
            background-color: var(--card-active-background-color) !important;
            color: var(--card-active-text-color);
            box-shadow: 0px 16px 40px rgba(0, 0, 0, 0.1), inset 0px 1px 0px rgba(255, 255, 255, 1.0);
            border-color: transparent;
        }

        /* Base Content Wrapper isolates the non-expanding elements */
        .card-base-content {
            display: flex;
            flex-direction: column;
            height: 152px; /* 200px container - 48px padding = 152px locked internal space */
            justify-content: space-between;
        }

        .device-card-header-row {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: flex-start;
        }

        .device-toggle-icon-container {
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background-color: var(--icon-inactive-background-color);
            color: var(--icon-inactive-foreground-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            
            transition-property: background-color, color, transform, box-shadow;
            transition-duration: var(--animation-duration-medium);
            transition-timing-function: var(--animation-ease-out-curve);
        }

        .smart-device-card.state-is-on .device-toggle-icon-container {
            background-color: var(--icon-active-background-color);
            color: var(--icon-active-foreground-color);
            box-shadow: var(--icon-active-box-shadow);
        }
        
        .smart-device-card.is-connecting .device-toggle-icon-container {
            animation-name: pulse-connecting-indicator;
            animation-duration: 1.2s;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in-out;
        }
        
        @keyframes pulse-connecting-indicator {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); box-shadow: 0px 0px 20px rgba(255,204,0,0.6); }
            100% { transform: scale(1); }
        }

        .device-toggle-icon-container svg { width: 26px; height: 26px; }

        .device-text-information-block {
            display: flex;
            flex-direction: column;
            pointer-events: none;
            margin-bottom: 20px;
        }

        .device-display-name { 
            font-family: var(--font-semibold-soft);
            font-weight: normal;
            font-size: 17px; 
            letter-spacing: -0.015em; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
        
        .device-current-status-label { 
            font-family: var(--font-medium);
            font-weight: normal;
            font-size: 15px; 
            color: var(--card-inactive-subtitle-color); 
            margin-top: 4px; 
            transition-property: color; 
            transition-duration: var(--animation-duration-medium); 
            transition-timing-function: var(--animation-ease-out-curve); 
        }
        
        .smart-device-card.state-is-on .device-current-status-label { color: var(--card-active-subtitle-color); }

        /* Bottom Area: Slider Control */
        .device-brightness-slider-container {
            width: 100%;
            height: 40px;
            border-radius: 20px;
            background-color: var(--slider-inactive-track-color);
            position: relative;
            overflow: hidden;
            -webkit-mask-image: -webkit-linear-gradient(white, white);
            -webkit-mask-repeat: no-repeat;
            -webkit-backface-visibility: hidden;
            -moz-backface-visibility: hidden;
            transform: translate3d(0, 0, 0);
            box-shadow: inset 0px 2px 6px rgba(0, 0, 0, 0.2);
            transition-property: background-color, box-shadow, opacity;
            transition-duration: var(--animation-duration-medium);
            transition-timing-function: var(--animation-ease-out-curve);
        }

        .smart-device-card:not(.state-is-on) .device-brightness-slider-container {
            pointer-events: none;
            opacity: 0.5; /* Visual indicator that slider is locked */
        }

        .smart-device-card.state-is-on .device-brightness-slider-container {

    <!-- ==========================================================================
         APPLICATION JAVASCRIPT LOGIC
         ========================================================================== -->
    <script>
        /**
         * @fileoverview Enterprise-grade architecture for Tuya Smart Home Control via Cloudflare Workers.
         * Encompasses state management, UI rendering, debounced network requests, external API integrations,
         * advanced HTML5 Canvas color picking with polar coordinate mathematics, responsive forecasting,
         * real-time clock rendering, and synchronized device dispatch.
         */

        "use strict";

        /* ==========================================================================
           CONSTANTS & STATIC DATA
           ========================================================================== */
        
        const TUYA_DEVICES = [
            { id: 'bf8b0e945d8c5f9861fjzy', name: 'Led Lights Tak' },
            { id: 'bf1cf6aca13749cf898g3p', name: 'Led Lights Skrivbord' }
        ];

        const STORAGE_KEYS = {
            WORKER_URL: 'enterprise_tuya_worker_url_v15',
            LAYOUT_MODE: 'enterprise_tuya_layout_mode_v15',
            WEATHER_CACHE: 'enterprise_weather_cache_v15',
            DEVICES_LINKED: 'enterprise_devices_linked_v15'
        };

        const SVG_ASSETS = {
            WEATHER_SUN: `<svg viewBox="0 0 24 24" fill="none" stroke="#FFB340" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`,
            WEATHER_CLOUD: `<svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>`,
            WEATHER_RAIN: `<svg viewBox="0 0 24 24" fill="none" stroke="#0A84FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.4 14.5a6 6 0 1 0-10.8-2.5A5.5 5.5 0 1 0 7.5 22h9a5 5 0 1 0-.1-10Z"/><path d="M12 22v-4"/><path d="M8 22v-4"/><path d="M16 22v-4"/></svg>`,
            WEATHER_SNOW: `<svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/><path d="M8 23v-2"/><path d="M12 23v-2"/><path d="M16 23v-2"/></svg>`,
            LIGHTBULB: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7zm2.85 11.1l-.85.6V16h-4v-2.3l-.85-.6A4.997 4.997 0 0 1 7 9c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.63-.8 3.16-2.15 4.1z"/><path d="M14 20h-4c-.55 0-1 .45-1 1s.45 1 1 1h4c.55 0 1-.45 1-1s-.45-1-1-1z"/></svg>`
        };

        /* ==========================================================================
           UTILITY CLASSES
           ========================================================================== */
        
        class ToastManager {
            constructor() {
                this.toastElement = document.getElementById('system-toast-notification');
                this.timeoutReference = null;
                this.displayDurationMs = 3500;
            }
            show(message) {
                if (!this.toastElement) return;
                if (this.timeoutReference !== null) clearTimeout(this.timeoutReference);
                this.toastElement.innerText = message;
                this.toastElement.classList.add('is-toast-visible');
                this.timeoutReference = setTimeout(() => {
                    this.toastElement.classList.remove('is-toast-visible');
                    this.timeoutReference = null;
                }, this.displayDurationMs);
            }
        }
        const GlobalToast = new ToastManager();

        /**
         * Orchestrates the real-time digital clock in the application header.
         */
        class RealTimeClockManager {
            constructor(elementId) {
                this.clockElement = document.getElementById(elementId);
                this.intervalId = null;
            }
            start() {
                this.updateClock();
                // Tick every 1000ms ensures perfect synchronization
                this.intervalId = setInterval(() => this.updateClock(), 1000);
            }
            updateClock() {
                if(!this.clockElement) return;
                const now = new Date();
                const formattedHours = String(now.getHours()).padStart(2, '0');
                const formattedMinutes = String(now.getMinutes()).padStart(2, '0');
                this.clockElement.innerText = `${formattedHours}:${formattedMinutes}`;
            }
        }
        const LiveClock = new RealTimeClockManager('live-clock-display');

        /* ==========================================================================
           EXTERNAL SERVICE INTEGRATIONS
           ========================================================================== */

        class WeatherService {
            constructor() {
                this.latitudeCoordinateForApi = 59.38; // Spånga
                this.longitudeCoordinateForApi = 17.90; // Spånga
                this.apiUrl = `https://api.open-meteo.com/v1/forecast?latitude=${this.latitudeCoordinateForApi}&longitude=${this.longitudeCoordinateForApi}&current=temperature_2m,weather_code&hourly=temperature_2m,precipitation,weather_code&daily=temperature_2m_max,temperature_2m_min&timezone=auto`;
                this.mainRowElement = document.getElementById('weather-main-row-container');
                this.hourlyContainerElement = document.getElementById('weather-hourly-container');
            }
            
            renderLoadingState() {
                if (!this.mainRowElement) return;
                this.mainRowElement.innerHTML = `
                    <div class="weather-information-left">
                        <span class="weather-city-label">Spånga</span>
                        <h2 class="weather-temperature-display"><div class="skeleton" style="width: 80px; height: 50px;"></div></h2>
                        <span class="weather-condition-description">Fetching Weather...</span>
                    </div>
                    <div class="weather-graphics-right">
                        <div class="weather-vector-icon"><div class="weather-spinner"></div></div>
                        <span class="weather-high-low-range"><div class="skeleton" style="width: 100px; height: 18px;"></div></span>
                    </div>
                `;
            }
            
            renderErrorState(errorMessage) {
                if (!this.mainRowElement) return;
                this.mainRowElement.innerHTML = `
                    <div class="weather-information-left">
                        <span class="weather-city-label">Spånga</span>
                        <h2 class="weather-temperature-display">--</h2>
                        <span class="weather-condition-description" style="color: #FF453A;">${errorMessage}</span>
                    </div>
                `;
            }

            parseWmoWeatherCode(code) {
                if (code === 0 || code === 1) return { text: "Clear Sky", icon: SVG_ASSETS.WEATHER_SUN };
                if (code === 2) return { text: "Partly Cloudy", icon: SVG_ASSETS.WEATHER_CLOUD };
                if (code === 3) return { text: "Overcast", icon: SVG_ASSETS.WEATHER_CLOUD };
                if (code >= 51 && code <= 67) return { text: "Rain", icon: SVG_ASSETS.WEATHER_RAIN };
                if (code >= 71 && code <= 77) return { text: "Snowfall", icon: SVG_ASSETS.WEATHER_SNOW };
                if (code >= 80 && code <= 82) return { text: "Rain Showers", icon: SVG_ASSETS.WEATHER_RAIN };
                if (code >= 85 && code <= 86) return { text: "Snow Showers", icon: SVG_ASSETS.WEATHER_SNOW };
                if (code >= 95) return { text: "Thunderstorm", icon: SVG_ASSETS.WEATHER_RAIN };
                return { text: "Cloudy", icon: SVG_ASSETS.WEATHER_CLOUD };
            }

            renderSuccessState(data) {
                if (!this.mainRowElement) return;
                this.mainRowElement.innerHTML = `
                    <div class="weather-information-left">
                        <span class="weather-city-label">Spånga</span>
                        <h2 class="weather-temperature-display">${data.current.temp}°</h2>
                        <span class="weather-condition-description">${data.current.text}</span>
                    </div>
                    <div class="weather-graphics-right">
                        <div class="weather-vector-icon">${data.current.icon}</div>
                        <span class="weather-high-low-range">H:${data.current.high}° L:${data.current.low}°</span>
                    </div>
                `;

                if (this.hourlyContainerElement && data.hourly && data.hourly.length > 0) {
                    this.hourlyContainerElement.innerHTML = data.hourly.map(hourBlock => `
                        <div class="hourly-item-block">
                            <span class="hourly-item-time">${hourBlock.time}</span>
                            <div class="hourly-item-icon">${hourBlock.icon}</div>
                            <span class="hourly-item-temp">${hourBlock.temp}°</span>
                        </div>
                    `).join('');
                }
            }

            async fetchAndRender() {
                const cachedPayload = sessionStorage.getItem(STORAGE_KEYS.WEATHER_CACHE);
                if (cachedPayload) {
                    try {
                        this.renderSuccessState(JSON.parse(cachedPayload));
                    } catch (e) {
                        this.renderLoadingState(); 
                    }
                } else {
                    this.renderLoadingState();
                }

                try {
                    const rawData = await NetworkService.get(this.apiUrl);
                    if (!rawData || !rawData.current || !rawData.daily || !rawData.hourly) {
                        throw new Error("Invalid data structure from Open-Meteo API.");
                    }

                    const currentCondition = this.parseWmoWeatherCode(rawData.current.weather_code);
                    const compiledWeatherData = {
                        current: {
                            temp: Math.round(rawData.current.temperature_2m),
                            text: currentCondition.text,
                            icon: currentCondition.icon,
                            high: Math.round(rawData.daily.temperature_2m_max[0]),
                            low: Math.round(rawData.daily.temperature_2m_min[0])
                        },
                        hourly: []
                    };

                    let startIndex = 0;
                    const nowTime = new Date().getTime();
                    
                    for (let i = 0; i < rawData.hourly.time.length; i++) {
                        const hourTime = new Date(rawData.hourly.time[i]).getTime();
                        if (hourTime >= nowTime - 1800000) { 
                            startIndex = i;
                            break;
                        }
                    }

                    for (let i = startIndex; i < startIndex + 24 && i < rawData.hourly.time.length; i++) {
                        const dateObj = new Date(rawData.hourly.time[i]);
                        const hoursStr = String(dateObj.getHours()).padStart(2, '0') + ":00";
                        const hCondition = this.parseWmoWeatherCode(rawData.hourly.weather_code[i]);
                        
                        compiledWeatherData.hourly.push({
                            time: i === startIndex ? "Now" : hoursStr,
                            temp: Math.round(rawData.hourly.temperature_2m[i]),
                            icon: hCondition.icon
                        });
                    }

                    this.renderSuccessState(compiledWeatherData);
                    sessionStorage.setItem(STORAGE_KEYS.WEATHER_CACHE, JSON.stringify(compiledWeatherData));

                } catch (error) {
                    let errorMessage = "Data Unavailable";
                    if (error.name === 'AbortError') errorMessage = "Weather API Timeout";
                    if (!cachedPayload) this.renderErrorState(errorMessage);
                }
            }
        }

        /* ==========================================================================
           NETWORK SERVICE LAYER
           ========================================================================== */

        class NetworkManager {
            constructor() {
                this.defaultTimeoutMs = 15000; 
            }
            async get(url) {
                const abortController = new AbortController();
                const timeoutId = setTimeout(() => abortController.abort(), this.defaultTimeoutMs);
                try {
                    const response = await fetch(url, { signal: abortController.signal });
                    clearTimeout(timeoutId);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return await response.json();
                } catch (error) {
                    clearTimeout(timeoutId);
                    throw error;
                }
            }
            async post(url, body) {
                const abortController = new AbortController();
                const timeoutId = setTimeout(() => abortController.abort(), this.defaultTimeoutMs);
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body),
                        signal: abortController.signal
                    });
                    clearTimeout(timeoutId);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return await response.json();
                } catch (error) {
                    clearTimeout(timeoutId);
                    throw error;
                }
            }
        }
        const NetworkService = new NetworkManager();
        
        /* ==========================================================================
           COLOR WHEEL LOGIC (HTML5 CANVAS WITH MATHEMATICAL SNAP)
           ========================================================================== */
           
        /**
         * Handles rendering and complex touch/mouse interaction logic for the HSL Color Wheel.
         * Mathematically decoupled from CSS transitions to guarantee pixel-perfect accuracy.
         */
        class ColorWheelManager {
            constructor(deviceId, canvasElement, indicatorElement) {
                this.deviceId = deviceId;
                this.canvas = canvasElement;
                this.indicator = indicatorElement;
                this.isDragging = false;
                
                // Hardcoded geometrical bounds for absolute calculation safety regardless of CSS animation state
                this.fixedCanvasDimension = 200;
                this.fixedCenterPoint = this.fixedCanvasDimension / 2; // 100
                
                this.bindEvents();
            }

            bindEvents() {
                const handleStart = (e) => {
                    this.isDragging = true;
                    this.processInteraction(e);
                    if(e.cancelable) e.preventDefault(); 
                };

                const handleMove = (e) => {
                    if (!this.isDragging) return;
                    this.processInteraction(e);
                    if(e.cancelable) e.preventDefault();
                };

                const handleEnd = (e) => {
                    if(this.isDragging) {
                        this.isDragging = false;
                        this.dispatchFinalColorCommand();
                    }
                };

                this.canvas.addEventListener('mousedown', handleStart, {passive: false});
                this.canvas.addEventListener('mousemove', handleMove, {passive: false});
                window.addEventListener('mouseup', handleEnd);

                this.canvas.addEventListener('touchstart', handleStart, {passive: false});
                this.canvas.addEventListener('touchmove', handleMove, {passive: false});
                window.addEventListener('touchend', handleEnd);
            }

            processInteraction(event) {
                const rect = this.canvas.getBoundingClientRect();
                
                let clientX = event.clientX;
                let clientY = event.clientY;
                if (event.touches && event.touches.length > 0) {
                    clientX = event.touches[0].clientX;
                    clientY = event.touches[0].clientY;
                }

                // Utilize strict dimensions for calculations to avoid transitional reflow bugs
                const centerX = rect.width / 2; 
                const centerY = rect.height / 2;
                
                // We use dynamic rect left/top for offset, but trust the circle is perfectly round
                const xOffset = clientX - rect.left - centerX;
                const yOffset = clientY - rect.top - centerY;

                // Absolute true radians for pixel-perfect tracking (0 is at 3 o'clock)
                const rawAngleRadians = Math.atan2(yOffset, xOffset);
                const rawDistance = Math.sqrt(xOffset * xOffset + yOffset * yOffset);
                
                let clampedDistance = Math.min(rawDistance, this.fixedCenterPoint);
                
                // Magnetic Snapping Logic: If within 18 pixels of center, snap to absolute dead center (White)
                const SNAP_RADIUS = 18;
                if (clampedDistance <= SNAP_RADIUS) {
                    clampedDistance = 0;
                }
                
                const saturationRatio = clampedDistance / this.fixedCenterPoint;

                // Visual thumb placement strictly follows raw interaction angle, resulting in perfect sync
                // We map this relative to the fixed 200px coordinate space.
                const visualThumbX = this.fixedCenterPoint + Math.cos(rawAngleRadians) * clampedDistance;
                const visualThumbY = this.fixedCenterPoint + Math.sin(rawAngleRadians) * clampedDistance;
                
                this.indicator.style.left = `${visualThumbX}px`;
                this.indicator.style.top = `${visualThumbY}px`;
                
                // Separately map the raw angle to Tuya's specific Hue definition (Where top/12 o'clock is 0/360)
                let hueDegrees = (rawAngleRadians * 180 / Math.PI) + 90; 
                if (hueDegrees < 0) hueDegrees += 360;
                if (hueDegrees >= 360) hueDegrees -= 360;
                
                // Dynamic Lightness computation to ensure the center is pure #FFFFFF white.
                const lightnessPct = 100 - (saturationRatio * 50);
                this.indicator.style.backgroundColor = `hsl(${hueDegrees}, 100%, ${lightnessPct}%)`;

                // Update authoritative state memory locally for THIS device
                DeviceManager.devicesState[this.deviceId].hue = Math.round(hueDegrees);
                DeviceManager.devicesState[this.deviceId].saturation = Math.round(saturationRatio * 1000);
                
                // GLOBAL LINK FAN-OUT: If linked, mirror this exact state to ALL other devices
                if (ApplicationUI.isDevicesLinked) {
                    TUYA_DEVICES.forEach(deviceData => {
                        if (deviceData.id !== this.deviceId) {
                            DeviceManager.devicesState[deviceData.id].hue = Math.round(hueDegrees);
                            DeviceManager.devicesState[deviceData.id].saturation = Math.round(saturationRatio * 1000);
                            
                            // Force visual update on the other device's color wheel if it happens to be rendered
                            if (DeviceManager.colorWheelControllers[deviceData.id]) {
                                DeviceManager.colorWheelControllers[deviceData.id].updateIndicatorFromState();
                            }
                        }
                    });
                }
            }

            dispatchFinalColorCommand() {
                // If linked, execute for all. If not, execute for just this one.
                const targetIds = ApplicationUI.isDevicesLinked ? TUYA_DEVICES.map(d=>d.id) : [this.deviceId];
                targetIds.forEach(id => {
                    DeviceManager.executeColorCommand(id);
                });
            }
            
            /**
             * Mathematically reverses Tuya State back into polar coordinates for the UI Indicator.
             * Completely immune to CSS transition artifacts due to hardcoded boundary geometry.
             */
            updateIndicatorFromState() {
                const state = DeviceManager.devicesState[this.deviceId];
                
                // Strict Failsafe: Initialize to dead center (Pure White) if state data is missing or precisely zero
                if(state.hue === undefined || state.saturation === undefined || (state.hue === 0 && state.saturation === 0)) {
                    this.indicator.style.left = `100px`; // 50% of 200
                    this.indicator.style.top = `100px`;
                    this.indicator.style.backgroundColor = `#FFFFFF`;
                    return;
                }
                
                // Reverse engineering polar coordinates to place the thumb within the strictly 200x200 box
                // Angle must be mapped back to standard geometric radians where 0 is at 3 o'clock
                const angleRadians = (state.hue - 90) * (Math.PI / 180);
                const distanceRatio = state.saturation / 1000;
                const absoluteDistance = distanceRatio * this.fixedCenterPoint;
                
                const visualThumbX = this.fixedCenterPoint + Math.cos(angleRadians) * absoluteDistance;
                const visualThumbY = this.fixedCenterPoint + Math.sin(angleRadians) * absoluteDistance;
                
                this.indicator.style.left = `${visualThumbX}px`;
                this.indicator.style.top = `${visualThumbY}px`;
                
                // Dynamic lightness interpolation for Pure White rendering
                const lightnessPct = 100 - (distanceRatio * 50);
                this.indicator.style.backgroundColor = `hsl(${state.hue}, 100%, ${lightnessPct}%)`;
            }
        }

        /* ==========================================================================
           STATE & API MANAGEMENT FOR SMART DEVICES
           ========================================================================== */

        class TuyaSmartDeviceManager {
            constructor() {
                this.workerApiUrl = localStorage.getItem(STORAGE_KEYS.WORKER_URL) || '';
                this.devicesState = {};
                
                // Map to store instantiated canvas controllers
                this.colorWheelControllers = {};
                
                for (let i = 0; i < TUYA_DEVICES.length; i++) {
                    const device = TUYA_DEVICES[i];
                    // Strict initialization. Default Hue 0, Saturation 0 = Pure White.
                    this.devicesState[device.id] = {
                        on: false,
                        brightness: 100, 
                        hue: 0,
                        saturation: 0
                    };
                }
                this.debounceTimers = {};
            }

            buildEndpointUrl(path) {
                return this.workerApiUrl.replace(/\/$/, '') + path;
            }

            setApiUrl(newUrl) {
                this.workerApiUrl = newUrl.trim();
                localStorage.setItem(STORAGE_KEYS.WORKER_URL, this.workerApiUrl);
            }

            isConfigured() {
                return this.workerApiUrl !== null && this.workerApiUrl !== '';
            }

            async synchronizeAllDevices() {
                if (!this.isConfigured()) return;

                for (let i = 0; i < TUYA_DEVICES.length; i++) {
                    const device = TUYA_DEVICES[i];
                    ApplicationUI.setDeviceConnectingState(device.id, true);
                    try {
                        const url = this.buildEndpointUrl(`/status?device=${device.id}`);
                        const jsonPayload = await NetworkService.get(url);
                        
                        if (jsonPayload.success && jsonPayload.result) {
                            this.parseAndApplyTuyaStatusPayload(device.id, jsonPayload.result);
                        }
                    } catch (error) {
                        console.warn(`TuyaSmartDeviceManager: Synchronization failed for device [${device.name}].`, error);
                    } finally {
                        ApplicationUI.setDeviceConnectingState(device.id, false);
                        ApplicationUI.updateDeviceCardRender(device.id);
                        
                        // Force color wheel UI to match synchronized state memory
                        if(this.colorWheelControllers[device.id]) {
                            this.colorWheelControllers[device.id].updateIndicatorFromState();
                        }
                    }
                }
            }

            parseAndApplyTuyaStatusPayload(deviceId, statusArray) {
                const powerInstruction = statusArray.find(instruction => instruction.code === 'switch_led');
                if (powerInstruction !== undefined) {
                    this.devicesState[deviceId].on = powerInstruction.value;
                }
                
                const colorInstruction = statusArray.find(instruction => instruction.code === 'colour_data_v2' || instruction.code === 'colour_data');
                if (colorInstruction !== undefined) {
                    try {
                        const parsedValueObject = typeof colorInstruction.value === 'string' 
                            ? JSON.parse(colorInstruction.value) 
                            : colorInstruction.value;
                            
                        if (parsedValueObject) {
                            if (parsedValueObject.v !== undefined) {
                                let uiBrightness = Math.round(parsedValueObject.v / 10);
                                this.devicesState[deviceId].brightness = Math.max(1, Math.min(100, uiBrightness));
                            }
                            if (parsedValueObject.h !== undefined) {
                                this.devicesState[deviceId].hue = parsedValueObject.h;
                            }
                            if (parsedValueObject.s !== undefined) {
                                this.devicesState[deviceId].saturation = parsedValueObject.s;
                            }
                        }
                    } catch (parseError) {
                        console.error("TuyaSmartDeviceManager: Failed to parse colour_data JSON.", parseError);
                    }
                }
            }

            /**
             * Toggles power, branching out to multiple devices if global link is active.
             */
            async toggleDevicePower(deviceId) {
                if (!this.isConfigured()) {
                    ApplicationUI.openSettingsModal();
                    return;
                }

                // Determine target state based on the specific device interacted with
                const targetState = !this.devicesState[deviceId].on;
                
                // Fan-out array based on Global Link state
                const targetDeviceIds = ApplicationUI.isDevicesLinked ? TUYA_DEVICES.map(d => d.id) : [deviceId];

                // Optimistically invert state and apply connecting UI for ALL targets
                targetDeviceIds.forEach(id => {
                    this.devicesState[id].on = targetState;
                    ApplicationUI.setDeviceConnectingState(id, true);
                    ApplicationUI.updateDeviceCardRender(id);
                });

                try {
                    const url = this.buildEndpointUrl('/command');
                    
                    // Execute all requests concurrently
                    await Promise.all(targetDeviceIds.map(id => {
                        const body = {
                            device: id,
                            commands: [{ code: 'switch_led', value: targetState }]
                        };
                        return NetworkService.post(url, body);
                    }));

                } catch (error) {
                    if (error.name === 'AbortError') {
                        GlobalToast.show("Device Unresponsive (Timeout)");
                    } else {
                        GlobalToast.show("Network Error. Check Connection.");
                    }
                    // Revert state on network failure for all targets
                    targetDeviceIds.forEach(id => {
                        this.devicesState[id].on = !targetState;
                        ApplicationUI.updateDeviceCardRender(id);
                    });
                } finally {
                    // Always remove connecting state
                    targetDeviceIds.forEach(id => {
                        ApplicationUI.setDeviceConnectingState(id, false);
                    });
                }
            }

            /**
             * Queues brightness command.
             */
            handleBrightnessChangeIntent(deviceId, newBrightnessPercentage) {
                if (!this.isConfigured()) return;

                if (this.debounceTimers[deviceId]) clearTimeout(this.debounceTimers[deviceId]);

                this.debounceTimers[deviceId] = setTimeout(() => {
                    this.executeBrightnessCommand(deviceId, newBrightnessPercentage);
                }, 400);
            }

            /**
             * Executes brightness modification, fanning out if globally linked.
             */
            async executeBrightnessCommand(deviceId, newBrightnessPercentage) {
                const targetDeviceIds = ApplicationUI.isDevicesLinked ? TUYA_DEVICES.map(d => d.id) : [deviceId];
                const tuyaFormatBrightness = parseInt(newBrightnessPercentage, 10) * 10;
                
                let dispatchNeeded = false;

                targetDeviceIds.forEach(id => {
                    if (this.devicesState[id].on === true) {
                        dispatchNeeded = true;
                        ApplicationUI.setDeviceConnectingState(id, true);
                    }
                });
                
                if(!dispatchNeeded) return;

                try {
                    const url = this.buildEndpointUrl('/command');
                    
                    await Promise.all(targetDeviceIds.map(id => {
                        if (this.devicesState[id].on === false) return Promise.resolve();
                        
                        const body = {
                            device: id,
                            commands: [
                                { code: 'work_mode', value: 'colour' },
                                { code: 'colour_data', value: JSON.stringify({ 
                                    h: this.devicesState[id].hue || 0, 
                                    s: this.devicesState[id].saturation || 0, 
                                    v: tuyaFormatBrightness 
                                }) }
                            ]
                        };
                        return NetworkService.post(url, body);
                    }));
                } catch (error) {
                    if (error.name === 'AbortError') GlobalToast.show("Device Unresponsive (Timeout)");
                    else GlobalToast.show("Network Error. Check Connection.");
                } finally {
                    targetDeviceIds.forEach(id => {
                        ApplicationUI.setDeviceConnectingState(id, false);
                    });
                }
            }
            
            /**
             * Transmits isolated color state modifications, fanning out if globally linked.
             */
            async executeColorCommand(deviceId) {
                if (!this.isConfigured()) return;
                
                const targetDeviceIds = ApplicationUI.isDevicesLinked ? TUYA_DEVICES.map(d => d.id) : [deviceId];
                
                targetDeviceIds.forEach(id => {
                    if (this.devicesState[id].on === false) {
                        this.devicesState[id].on = true;
                        ApplicationUI.updateDeviceCardRender(id);
                    }
                    ApplicationUI.setDeviceConnectingState(id, true);
                });

                try {
                    const url = this.buildEndpointUrl('/command');
                    
                    await Promise.all(targetDeviceIds.map(id => {
                        const body = {
                            device: id,
                            commands: [
                                { code: 'work_mode', value: 'colour' },
                                { code: 'colour_data', value: JSON.stringify({ 
                                    h: this.devicesState[id].hue, 
                                    s: this.devicesState[id].saturation, 
                                    v: this.devicesState[id].brightness * 10 
                                }) }
                            ]
                        };
                        return NetworkService.post(url, body);
                    }));

                } catch (error) {
                    GlobalToast.show("Failed to apply color configuration.");
                } finally {
                    targetDeviceIds.forEach(id => {
                        ApplicationUI.setDeviceConnectingState(id, false);
                    });
                }
            }
        }

            attachDynamicCardListeners(deviceId) {

                const sliderInput = document.getElementById(`native-slider-input-${deviceId}`);

                // Main card container tap to expand layout
                if (cardWrapper) {
                    cardWrapper.addEventListener('click', (event) => {

                        // ARCHITECTURAL ENFORCEMENT:

                        if(cardWrapper.classList.contains('is-expanded') && DeviceManager.colorWheelControllers[deviceId]) {
                            window.requestAnimationFrame(() => {
                                setTimeout(() => {
                                    DeviceManager.colorWheelControllers[deviceId].updateIndicatorFromState();
                                }, 80); 
                            });
                        }
                    });
                }

                if (toggleButton) {
                    toggleButton.addEventListener('click', (event) => {
                        event.stopPropagation(); // Shield card expansion
                        DeviceManager.toggleDevicePower(deviceId);
                    });
                }

                if (sliderInput) {
                    sliderInput.addEventListener('mousedown', (e) => e.stopPropagation());
                    sliderInput.addEventListener('touchstart', (e) => e.stopPropagation(), {passive: true});
                    
                    sliderInput.addEventListener('input', (event) => {
                        event.stopPropagation();
                        const newBrightnessValue = event.target.value;
                        this.handleHighFrequencySliderDrag(deviceId, newBrightnessValue);
                    });

                    sliderInput.addEventListener('change', (event) => {
                        event.stopPropagation();
                        const finalBrightnessValue = event.target.value;
                        DeviceManager.handleBrightnessChangeIntent(deviceId, finalBrightnessValue);
                    });
                }
            }

            /**
             * Repaints DOM variables during high-fps touch interactions.
             * Propagates visual updates to all devices if Global Link is active.
             */
            handleHighFrequencySliderDrag(deviceId, rawValue) {
                const integerValue = parseInt(rawValue, 10);
                
                const targetDeviceIds = this.isDevicesLinked ? TUYA_DEVICES.map(d => d.id) : [deviceId];

                targetDeviceIds.forEach(id => {
                    // Fast-path ON state invocation immediately upon interaction
                    if (DeviceManager.devicesState[id].on === false) {
                        DeviceManager.devicesState[id].on = true;
                        this.updateDeviceCardRender(id);
                    }

                    DeviceManager.devicesState[id].brightness = integerValue;
                    
                    const fillLayer = document.getElementById(`slider-fill-layer-${id}`);
                    const statusLabel = document.getElementById(`status-label-${id}`);
                    const nativeSlider = document.getElementById(`native-slider-input-${id}`);
                    
                    if (fillLayer) fillLayer.style.setProperty('--current-fill-percentage', `${integerValue}%`);

                    if (DeviceManager.devicesState[id].on && statusLabel && nativeSlider) {
                        statusLabel.innerText = `${integerValue}%`;
                        nativeSlider.value = integerValue; // Force physical sync of other slider
                        nativeSlider.setAttribute('aria-valuenow', integerValue);
                        nativeSlider.setAttribute('aria-valuetext', `${integerValue} percent`);
                    }
                });
            }

            /**
             * Applies authoritative state data from memory onto the DOM node structurally.
             */
            updateDeviceCardRender(deviceId) {
                const stateObject = DeviceManager.devicesState[deviceId];
                const cardWrapper = document.getElementById(`device-card-wrapper-${deviceId}`);
                const statusLabel = document.getElementById(`status-label-${deviceId}`);
                const fillLayer = document.getElementById(`slider-fill-layer-${deviceId}`);
                const nativeSlider = document.getElementById(`native-slider-input-${deviceId}`);
                const toggleBtn = document.getElementById(`toggle-btn-${deviceId}`);

                if (!cardWrapper || !statusLabel || !fillLayer || !nativeSlider || !toggleBtn) return;

                if (stateObject.on === true) {
                    cardWrapper.classList.add('state-is-on');
                    statusLabel.innerText = `${stateObject.brightness}%`;
                    toggleBtn.setAttribute('aria-pressed', 'true');
                    nativeSlider.disabled = false;
                } else {
                    cardWrapper.classList.remove('state-is-on');
                    statusLabel.innerText = 'Off';
                    toggleBtn.setAttribute('aria-pressed', 'false');
                    nativeSlider.disabled = true;
                    
                    // ARCHITECTURAL ENFORCEMENT:
                    // If the device is turned off we must ensure the expanded color wheel is collapsed.
                    if (cardWrapper.classList.contains('is-expanded')) {
                        cardWrapper.classList.remove('is-expanded');
                    }
                }

                nativeSlider.value = stateObject.brightness;
                nativeSlider.setAttribute('aria-valuenow', stateObject.brightness);
                nativeSlider.setAttribute('aria-valuetext', `${stateObject.brightness} percent`);
                fillLayer.style.setProperty('--current-fill-percentage', `${stateObject.brightness}%`);
            }
            
            setDeviceConnectingState(deviceId, isConnecting) {
                const cardWrapper = document.getElementById(`device-card-wrapper-${deviceId}`);
                if (cardWrapper) {
                    // Directly manipulate classes to trigger subtle CSS animations
                    if (isConnecting) cardWrapper.classList.add('is-connecting');
                    else cardWrapper.classList.remove('is-connecting');
                }
            }

            openSettingsModal() {
                this.setLayoutMode(localStorage.getItem(STORAGE_KEYS.LAYOUT_MODE) || 'portrait');
                if (this.inputWorkerUrl) this.inputWorkerUrl.value = DeviceManager.workerApiUrl;
                if (this.settingsModalBackdrop) {
                    this.settingsModalBackdrop.classList.add('is-visible-active');
                    this.settingsModalBackdrop.setAttribute('aria-hidden', 'false');
                }
            }

            handleSettingsCancel() {
                const memoryLayout = localStorage.getItem(STORAGE_KEYS.LAYOUT_MODE) || 'portrait';
                this.setLayoutMode(memoryLayout);
                if (this.settingsModalBackdrop) {
                    this.settingsModalBackdrop.classList.remove('is-visible-active');
                    this.settingsModalBackdrop.setAttribute('aria-hidden', 'true');
                }
            }

            handleSettingsSave() {
                if (!this.inputWorkerUrl) return;
                const inputString = this.inputWorkerUrl.value.trim();
                if (inputString === '') return GlobalToast.show("Error: Web URL cannot be empty.");
                
                DeviceManager.setApiUrl(inputString);
                localStorage.setItem(STORAGE_KEYS.LAYOUT_MODE, this.layoutMode);
                this.applyLayoutModeToBody();

                if (this.settingsModalBackdrop) {
                    this.settingsModalBackdrop.classList.remove('is-visible-active');
                    this.settingsModalBackdrop.setAttribute('aria-hidden', 'true');
                }

                GlobalToast.show("Configuration saved. Connecting...");
                DeviceManager.synchronizeAllDevices();
            }
        }

        const ApplicationUI = new UserInterfaceController();

        /* ==========================================================================
           BOOTSTRAPPING & LIFECYCLE MANAGEMENT
           ========================================================================== */
        
        document.addEventListener('DOMContentLoaded', () => {
            ApplicationUI.initialize();

            // Initialize Live Digital Clock
            LiveClock.start();

            // Instantiate and trigger background weather service independently
            const WeatherAPI = new WeatherService();
            WeatherAPI.fetchAndRender();

            // Evaluate configuration readiness
            if (!DeviceManager.isConfigured()) {
                setTimeout(() => {
                    ApplicationUI.openSettingsModal();
                }, 600);
            } else {
                DeviceManager.synchronizeAllDevices();
            }
        });

    </script>
</body>
</html>
