<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Ultimate Premium Apple HomeKit Style Smart Home Controller for iPad Air 2">
    <title>Smart Home Control Center</title>

    <style>
        /* ==========================================================================
           GLOBAL DESIGN TOKENS & VARIABLES
           ========================================================================== */
        :root {
            /* Core Backgrounds */
            --application-background-color: #000000;
            
            /* Glassmorphism System */
            --glass-background-base: rgba(255, 255, 255, 0.08);
            --glass-border-color: rgba(255, 255, 255, 0.12);
            --glass-background-hover: rgba(255, 255, 255, 0.15);
            --glass-backdrop-filter-blur: blur(45px);
            --glass-backdrop-filter-saturate: saturate(180%);
            
            /* Active Device States (ON) - Calibrated for absolute premium contrast */
            --card-active-background-color: #FFFFFF; /* Pure Apple White */
            --card-active-text-color: #000000;
            --card-active-subtitle-color: rgba(0, 0, 0, 0.50);
            --icon-active-background-color: #FFCC00; /* Apple System Yellow */
            --icon-active-foreground-color: #FFFFFF;
            --icon-active-box-shadow: 0px 6px 16px rgba(255, 204, 0, 0.35);
            
            /* The Slider Fix: Premium Frosted Silver (Not Black, Not White) */
            --slider-active-track-color: #F2F2F7; /* Apple Grouped Background Grey */
            --slider-active-fill-color: #D1D1D6; /* Apple System Gray 4 - Beautiful Silver */
            --slider-active-fill-shadow: inset 0px 1px 1px rgba(255, 255, 255, 0.8), 0px 1px 4px rgba(0, 0, 0, 0.06);

            /* Inactive Device States (OFF) - Calibrated for dark mode elegance */
            --card-inactive-text-color: #FFFFFF;
            --card-inactive-subtitle-color: rgba(255, 255, 255, 0.55);
            --icon-inactive-background-color: rgba(255, 255, 255, 0.12);
            --icon-inactive-foreground-color: rgba(255, 255, 255, 0.60);
            
            --slider-inactive-track-color: rgba(0, 0, 0, 0.25);
            --slider-inactive-fill-color: rgba(255, 255, 255, 0.20);
            --slider-inactive-fill-shadow: none;

            /* Typography */
            --system-font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            
            /* Physics & Animation Curves */
            --animation-spring-curve: cubic-bezier(0.32, 0.72, 0, 1.0);
            --animation-ease-out-curve: cubic-bezier(0.25, 1.0, 0.5, 1.0);
            --animation-duration-fast: 0.2s;
            --animation-duration-medium: 0.4s;
            --animation-duration-slow: 0.6s;

            /* Layout Constraints */
            --layout-max-width-portrait: 768px;
            --layout-max-width-landscape: 1024px;
            --layout-padding-horizontal-portrait: 32px;
            --layout-padding-horizontal-landscape: 48px;
            --layout-padding-vertical-bottom: 40px;
        }

        /* ==========================================================================
           CSS RESET & NORMALIZATION
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin-top: 0;
            margin-right: 0;
            margin-bottom: 0;
            margin-left: 0;
            padding-top: 0;
            padding-right: 0;
            padding-bottom: 0;
            padding-left: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-family: var(--system-font-family);
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            background-color: var(--application-background-color);
            color: var(--card-inactive-text-color);
            margin-left: auto;
            margin-right: auto;
            min-height: 100vh;
            /* Safe area insets for notched iPads */
            padding-top: calc(env(safe-area-inset-top, 40px) + 24px);
            padding-right: var(--layout-padding-horizontal-portrait);
            padding-bottom: var(--layout-padding-vertical-bottom);
            padding-left: var(--layout-padding-horizontal-portrait);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            
            /* Prevent user selection for app-like feel, except in inputs */
            user-select: none;
            -webkit-user-select: none;
            touch-action: pan-y;
            
            /* Max width transitions for layout changes */
            max-width: var(--layout-max-width-portrait);
            transition-property: max-width, padding;
            transition-duration: var(--animation-duration-medium);
            transition-timing-function: var(--animation-ease-out-curve);
        }

        /* Responsive Landscape Injection */
        body.layout-mode-landscape {
            max-width: var(--layout-max-width-landscape);
            padding-right: var(--layout-padding-horizontal-landscape);
            padding-left: var(--layout-padding-horizontal-landscape);
        }

        /* Allow typing explicitly in input fields */
        input, textarea, select {
            user-select: text !important;
            -webkit-user-select: text !important;
            -webkit-touch-callout: default !important;
            font-family: inherit;
        }

        /* ==========================================================================
           HEADER COMPONENT
           ========================================================================== */
        .application-header {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 36px;
            padding-left: 8px;
            padding-right: 8px;
        }

        .application-title {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.035em;
            line-height: 1.2;
            color: #FFFFFF;
        }

        .header-controls-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 16px;
        }

        .circular-icon-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--glass-background-base);
            border-width: 1px;
            border-style: solid;
            border-color: var(--glass-border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            cursor: pointer;
            backdrop-filter: var(--glass-backdrop-filter-blur) var(--glass-backdrop-filter-saturate);
            -webkit-backdrop-filter: var(--glass-backdrop-filter-blur) var(--glass-backdrop-filter-saturate);
            
            transition-property: transform, background-color;
            transition-duration: var(--animation-duration-medium), var(--animation-duration-fast);
            transition-timing-function: var(--animation-spring-curve), var(--animation-ease-out-curve);
            
            outline: none;
        }

        .circular-icon-button:active {
            transform: scale(0.88);
            background-color: var(--glass-background-hover);
        }

        .circular-icon-button svg {
            width: 20px;
            height: 20px;
        }

        /* ==========================================================================
           WEATHER WIDGET COMPONENT
           ========================================================================== */
        .weather-dashboard-widget {
            background-color: var(--glass-background-base);
            border-width: 1px;
            border-style: solid;
            border-color: var(--glass-border-color);
            backdrop-filter: var(--glass-backdrop-filter-blur) var(--glass-backdrop-filter-saturate);
            -webkit-backdrop-filter: var(--glass-backdrop-filter-blur) var(--glass-backdrop-filter-saturate);
            border-radius: 32px;
            padding-top: 28px;
            padding-right: 32px;
            padding-bottom: 28px;
            padding-left: 32px;
            margin-bottom: 40px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0px 12px 48px rgba(0, 0, 0, 0.4), inset 0px 1px 0px rgba(255, 255, 255, 0.1);
            
            transition-property: transform;
            transition-duration: var(--animation-duration-medium);
            transition-timing-function: var(--animation-spring-curve);
        }

        .weather-dashboard-widget:active {
            transform: scale(0.98);
        }

        .weather-information-left {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .weather-city-label {
            font-size: 15px;
            font-weight: 600;
            color: var(--card-inactive-subtitle-color);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .weather-temperature-display {
            font-size: 56px;
            font-weight: 200;
            letter-spacing: -0.05em;
            line-height: 1.0;
            margin-top: 4px;
            margin-bottom: 4px;
            color: #FFFFFF;
        }

        .weather-condition-description {
            font-size: 16px;
            font-weight: 500;
            color: var(--card-inactive-subtitle-color);
        }

        .weather-graphics-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 16px;
        }

        .weather-vector-icon {
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .weather-vector-icon svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0px 6px 16px rgba(255, 255, 255, 0.15));
        }

        .weather-high-low-range {
            font-size: 15px;
            font-weight: 600;
            color: var(--card-inactive-subtitle-color);
        }
        
        /* Skeleton Loading State for Weather */
        .skeleton {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }
        .skeleton::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            transform: translateX(-100%);
            background-image: linear-gradient(90deg, rgba(255,255,255,0) 0, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            100% {
                transform: translateX(100%);
            }
        }
        .weather-spinner {
            width: 24px;
            height: 24px;
            border-width: 3px;
            border-style: solid;
            border-color: rgba(255, 255, 255, 0.15);
            border-top-color: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation-name: spin;
            animation-duration: 1s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }


        /* ==========================================================================
           DEVICE GRID LAYOUT
           ========================================================================== */
        .section-heading-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-left: 8px;
            letter-spacing: -0.02em;
            color: #FFFFFF;
        }

        .device-grid-container {
            display: grid;
            /* Explicitly set to 2 columns for both portrait and landscape to stretch gracefully */
            grid-template-columns: repeat(2, 1fr);
            column-gap: 24px;
            row-gap: 24px;
            
            transition-property: grid-template-columns, column-gap;
            transition-duration: var(--animation-duration-medium);
            transition-timing-function: var(--animation-ease-out-curve);
        }

        /* Landscape adjustments - Grid columns remain 2, but gap increases for scale */
        body.layout-mode-landscape .device-grid-container {
            grid-template-columns: repeat(2, 1fr);
            column-gap: 32px;
            row-gap: 32px;
        }

        /* ==========================================================================
           SMART DEVICE CARD COMPONENT
           ========================================================================== */
        .smart-device-card {
            background-color: var(--glass-background-base);
            border-width: 1px;
            border-style: solid;
            border-color: var(--glass-border-color);
            backdrop-filter: blur(35px) saturate(160%);
            -webkit-backdrop-filter: blur(35px) saturate(160%);
            border-radius: 32px;
            padding-top: 24px;
            padding-right: 24px;
            padding-bottom: 24px;
            padding-left: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 200px;
            box-shadow: 0px 12px 36px rgba(0, 0, 0, 0.25), inset 0px 1px 0px rgba(255, 255, 255, 0.05);
            position: relative;
            
            /* Remove overflow:hidden from the card itself to prevent rendering artifacts */
            
            transition-property: background-color, color, transform, box-shadow, border-color, opacity;
            transition-duration: var(--animation-duration-medium), var(--animation-duration-medium), var(--animation-duration-medium), var(--animation-duration-medium), var(--animation-duration-medium), var(--animation-duration-fast);
            transition-timing-function: var(--animation-ease-out-curve), var(--animation-ease-out-curve), var(--animation-spring-curve), var(--animation-ease-out-curve), var(--animation-ease-out-curve), var(--animation-ease-out-curve);
        }

        /* State: Device is ON */
        .smart-device-card.state-is-on {
            background-color: var(--card-active-background-color);
            color: var(--card-active-text-color);
            box-shadow: 0px 16px 40px rgba(0, 0, 0, 0.1), inset 0px 1px 0px rgba(255, 255, 255, 1.0);
            border-color: transparent;
        }

        .smart-device-card:active {
            transform: scale(0.96);
        }

        /* State: Device is connecting */
        .smart-device-card.is-connecting {
            opacity: 0.7;
            pointer-events: none;
        }

        /* Top Area: Icon Toggle */
        .device-card-header-row {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: flex-start;
        }

        .device-toggle-icon-container {
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background-color: var(--icon-inactive-background-color);
            color: var(--icon-inactive-foreground-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            
            transition-property: background-color, color, transform, box-shadow;
            transition-duration: var(--animation-duration-medium), var(--animation-duration-medium), var(--animation-duration-medium), var(--animation-duration-medium);
            transition-timing-function: var(--animation-ease-out-curve), var(--animation-ease-out-curve), var(--animation-spring-curve), var(--animation-ease-out-curve);
        }

        .device-toggle-icon-container:active {
            transform: scale(0.82);
        }

        .smart-device-card.state-is-on .device-toggle-icon-container {
            background-color: var(--icon-active-background-color);
            color: var(--icon-active-foreground-color);
            box-shadow: var(--icon-active-box-shadow);
        }
        
        .smart-device-card.is-connecting .device-toggle-icon-container {
            animation-name: pulse-connecting;
            animation-duration: 1.5s;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in-out;
        }
        
        @keyframes pulse-connecting {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .device-toggle-icon-container svg {
            width: 26px;
            height: 26px;
        }

        /* Middle Area: Device Information */
        .device-text-information-block {
            display: flex;
            flex-direction: column;
            pointer-events: none;
            margin-top: auto;
            margin-bottom: 20px;
        }

        .device-display-name {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.015em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .device-current-status-label {
            font-size: 15px;
            font-weight: 500;
            color: var(--card-inactive-subtitle-color);
            margin-top: 4px;
            
            transition-property: color;
            transition-duration: var(--animation-duration-medium);
            transition-timing-function: var(--animation-ease-out-curve);
        }

        .smart-device-card.state-is-on .device-current-status-label {
            color: var(--card-active-subtitle-color);
        }

        /* Bottom Area: Slider Control (Perfected Architecture) */
        .device-brightness-slider-container {
            width: 100%;
            height: 40px;
            border-radius: 20px;
            background-color: var(--slider-inactive-track-color);
            position: relative;
            
            /* Critical fix for iOS Safari border-radius clipping shadow artifacts */
            overflow: hidden;
            -webkit-mask-image: -webkit-linear-gradient(white, white);
            -webkit-mask-repeat: no-repeat;
            -webkit-backface-visibility: hidden;
            -moz-backface-visibility: hidden;
            transform: translate3d(0, 0, 0);
            
            box-shadow: inset 0px 2px 6px rgba(0, 0, 0, 0.2);
            
            transition-property: background-color, box-shadow, opacity;
            transition-duration: var(--animation-duration-medium);
            transition-timing-function: var(--animation-ease-out-curve);
        }

        /* New: Disable slider interaction when light is OFF */
        .smart-device-card:not(.state-is-on) .device-brightness-slider-container {
            pointer-events: none;
            opacity: 0.5;
        }

        .smart-device-card.state-is-on .device-brightness-slider-container {
            background-color: var(--slider-active-track-color);
            box-shadow: inset 0px 1px 4px rgba(0, 0, 0, 0.05);
        }

        .brightness-slider-visual-fill {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            background-color: var(--slider-inactive-fill-color);
            pointer-events: none;
            z-index: 1;
            /* width is controlled via CSS variable dynamically */
            width: var(--current-fill-percentage, 0%);
            border-radius: 20px;
            
            box-shadow: var(--slider-inactive-fill-shadow);
            
            transition-property: background-color, box-shadow;
            transition-duration: var(--animation-duration-medium), var(--animation-duration-medium);
            transition-timing-function: var(--animation-ease-out-curve), var(--animation-ease-out-curve);
        }

        .smart-device-card.state-is-on .brightness-slider-visual-fill {
            background-color: var(--slider-active-fill-color);
            box-shadow: var(--slider-active-fill-shadow);
        }

        /* Native Input Overlay */
        .brightness-native-range-input {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 100%;
            background-color: transparent;
            outline-style: none;
            outline-color: initial;
            outline-width: initial;
            border-style: none;
            border-color: initial;
            border-width: initial;
            box-shadow: none;
            margin-top: 0;
            margin-right: 0;
            margin-bottom: 0;
            margin-left: 0;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
        }

        .brightness-native-range-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 40px;
            height: 40px;
            background-color: transparent;
            border-style: none;
            border-color: initial;
            border-width: initial;
            box-shadow: none;
            cursor: pointer;
        }
        
        .brightness-native-range-input::-webkit-slider-runnable-track {
            background-color: transparent;
            border-style: none;
            border-color: initial;
            border-width: initial;
            box-shadow: none;
        }

        /* ==========================================================================
           MODALS, OVERLAYS & SETTINGS
           ========================================================================== */
        .application-modal-backdrop {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            background-color: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
            
            transition-property: opacity;
            transition-duration: var(--animation-duration-medium);
            transition-timing-function: var(--animation-ease-out-curve);
        }

        .application-modal-backdrop.is-visible-active {
            opacity: 1;
            pointer-events: auto;
        }

        .settings-modal-sheet {
            background-color: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(50px) saturate(200%);
            -webkit-backdrop-filter: blur(50px) saturate(200%);
            border-width: 1px;
            border-style: solid;
            border-color: rgba(255, 255, 255, 0.15);
            width: 380px;
            border-radius: 36px;
            padding-top: 36px;
            padding-right: 28px;
            padding-bottom: 36px;
            padding-left: 28px;
            text-align: center;
            box-shadow: 0px 24px 80px rgba(0, 0, 0, 0.6);
            
            transform: translateY(50px) scale(0.92);
            transition-property: transform;
            transition-duration: 0.5s;
            transition-timing-function: var(--animation-spring-curve);
        }

        .application-modal-backdrop.is-visible-active .settings-modal-sheet {
            transform: translateY(0) scale(1);
        }

        .settings-modal-heading {
            font-size: 24px;
            font-weight: 700;
            color: #FFFFFF;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .settings-modal-description {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.65);
            margin-bottom: 28px;
            line-height: 1.5;
        }

        /* Segmented Control for Layout Selection */
        .ios-segmented-control-container {
            display: flex;
            flex-direction: row;
            background-color: rgba(0, 0, 0, 0.35);
            border-radius: 14px;
            padding-top: 4px;
            padding-right: 4px;
            padding-bottom: 4px;
            padding-left: 4px;
            margin-bottom: 28px;
        }

        .ios-segmented-control-button {
            flex-grow: 1;
            flex-shrink: 1;
            flex-basis: 0;
            padding-top: 12px;
            padding-bottom: 12px;
            border-radius: 10px;
            border: none;
            background-color: transparent;
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            
            transition-property: background-color, color, box-shadow;
            transition-duration: var(--animation-duration-fast);
            transition-timing-function: var(--animation-ease-out-curve);
        }

        .ios-segmented-control-button.is-segment-active {
            background-color: rgba(255, 255, 255, 0.25);
            color: #FFFFFF;
            box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.25);
        }

        /* Form Inputs */
        .settings-text-input-field {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            border-width: 1px;
            border-style: solid;
            border-color: rgba(255, 255, 255, 0.15);
            color: #FFFFFF;
            padding-top: 18px;
            padding-right: 18px;
            padding-bottom: 18px;
            padding-left: 18px;
            border-radius: 18px;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
            
            transition-property: border-color, background-color;
            transition-duration: var(--animation-duration-fast);
            transition-timing-function: var(--animation-ease-out-curve);
        }

        .settings-text-input-field:focus {
            border-color: rgba(255, 255, 255, 0.4);
            background-color: rgba(0, 0, 0, 0.5);
        }

        .settings-action-button-primary {
            background-color: #FFFFFF;
            color: #000000;
            width: 100%;
            padding-top: 18px;
            padding-bottom: 18px;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            margin-bottom: 14px;
            
            transition-property: transform, opacity;
            transition-duration: var(--animation-duration-fast);
            transition-timing-function: var(--animation-ease-out-curve);
        }

        .settings-action-button-primary:active {
            transform: scale(0.96);
            opacity: 0.85;
        }

        .settings-action-button-secondary {
            background-color: transparent;
            color: rgba(255, 255, 255, 0.65);
            width: 100%;
            padding-top: 16px;
            padding-bottom: 16px;
            font-size: 17px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            
            transition-property: color;
            transition-duration: var(--animation-duration-fast);
            transition-timing-function: var(--animation-ease-out-curve);
        }

        .settings-action-button-secondary:active {
            color: #FFFFFF;
        }

        /* ==========================================================================
           TOAST NOTIFICATION SYSTEM
           ========================================================================== */
        .system-toast-notification {
            position: fixed;
            bottom: 48px;
            left: 50%;
            transform: translateX(-50%) translateY(24px) scale(0.9);
            background-color: rgba(45, 45, 45, 0.95);

            padding-right: 32px;
            padding-bottom: 16px;
            padding-left: 32px;
            border-radius: 32px;
            font-size: 16px;

            opacity: 0;
            pointer-events: none;
            z-index: 2000;
            box-shadow: 0px 12px 36px rgba(0, 0, 0, 0.4);
            white-space: nowrap;
            
            transition-property: opacity, transform;
            transition-duration: var(--animation-duration-medium);
            transition-timing-function: var(--animation-spring-curve);
        }

        .system-toast-notification.is-toast-visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0) scale(1);
        }

    </style>
</head>

    <!-- ==========================================================================
         APPLICATION JAVASCRIPT LOGIC
         ========================================================================== -->
    <script>
        /**
         * @fileoverview Enterprise-grade architecture for Tuya Smart Home Control via Cloudflare Workers.
         * Encompasses state management, UI rendering, debounced network requests, and external API integrations.
         * Implements rigorous architectural patterns, Advanced AbortControllers, and extensive error boundaries.
         */

        "use strict";

        /* ==========================================================================
           CONSTANTS & STATIC DATA
           ========================================================================== */
        
        /**
         * Hardcoded Tuya Device Data structure.
         * Must strictly adhere to this format as requested.
         * @constant {Array<Object>}
         */
        const TUYA_DEVICES = [
            { id: 'bf8b0e945d8c5f9861fjzy', name: 'Led Lights Tak' },
            { id: 'bf1cf6aca13749cf898g3p', name: 'Led Lights Skrivbord' }
        ];

        /**
         * Configuration keys for LocalStorage and SessionStorage persistence.
         * @constant {Object}
         */
        const STORAGE_KEYS = {
            WORKER_URL: 'enterprise_tuya_worker_url_v7',
            LAYOUT_MODE: 'enterprise_tuya_layout_mode_v7',
            WEATHER_CACHE: 'enterprise_weather_cache_v7'
        };

        /**
         * Weather Vector Graphics Mapping.
         * @constant {Object}
         */
        const SVG_ASSETS = {
            WEATHER_SUN: `<svg viewBox="0 0 24 24" fill="none" stroke="#FFB340" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`,
            WEATHER_CLOUD: `<svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>`,
            WEATHER_RAIN: `<svg viewBox="0 0 24 24" fill="none" stroke="#0A84FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.4 14.5a6 6 0 1 0-10.8-2.5A5.5 5.5 0 1 0 7.5 22h9a5 5 0 1 0-.1-10Z"/><path d="M12 22v-4"/><path d="M8 22v-4"/><path d="M16 22v-4"/></svg>`,
            WEATHER_SNOW: `<svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/><path d="M8 23v-2"/><path d="M12 23v-2"/><path d="M16 23v-2"/></svg>`,
            LIGHTBULB: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7zm2.85 11.1l-.85.6V16h-4v-2.3l-.85-.6A4.997 4.997 0 0 1 7 9c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.63-.8 3.16-2.15 4.1z"/><path d="M14 20h-4c-.55 0-1 .45-1 1s.45 1 1 1h4c.55 0 1-.45 1-1s-.45-1-1-1z"/></svg>`
        };

        /* ==========================================================================
           UTILITY CLASSES
           ========================================================================== */
        
        /**
         * Singleton class to manage global toast notifications robustly.
         */
        class ToastManager {
            constructor() {
                this.toastElement = document.getElementById('system-toast-notification');
                this.timeoutReference = null;
                this.displayDurationMs = 3500;
            }

            /**
             * Displays a transient notification message to the user.
             * @param {string} message - The text content to display.
             */
            show(message) {
                if (!this.toastElement) return;

                // Clear existing timeout to reset duration if spammed
                if (this.timeoutReference !== null) {
                    clearTimeout(this.timeoutReference);
                }

                this.toastElement.innerText = message;
                this.toastElement.classList.add('is-toast-visible');

                this.timeoutReference = setTimeout(() => {
                    this.toastElement.classList.remove('is-toast-visible');
                    this.timeoutReference = null;
                }, this.displayDurationMs);
            }
        }

        const GlobalToast = new ToastManager();

        /* ==========================================================================
           EXTERNAL SERVICE INTEGRATIONS
           ========================================================================== */

        /**
         * Manages retrieval, parsing, and caching of meteorological data via Open-Meteo API.
         * Specifically targets Spånga, Stockholm with sub-zero latency caching.
         */
        class WeatherService {
            constructor() {
                // Hardcoded coordinates for Spånga, Stockholm
                this.latitudeCoordinateForApi = 59.38;
                this.longitudeCoordinateForApi = 17.90;
                
                this.apiUrl = `https://api.open-meteo.com/v1/forecast?latitude=${this.latitudeCoordinateForApi}&longitude=${this.longitudeCoordinateForApi}&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min&timezone=auto`;
                
                // DOM element references
                this.widgetElement = document.getElementById('weather-dashboard-widget');
            }
            
            /**
             * Populates the widget with a skeleton loading state.
             */
            renderLoadingState() {
                if (!this.widgetElement) return;
                this.widgetElement.innerHTML = `
                    <div class="weather-information-left">
                        <span class="weather-city-label">Spånga</span>
                        <h2 class="weather-temperature-display"><div class="skeleton" style="width: 80px; height: 50px;"></div></h2>
                        <span class="weather-condition-description">Fetching Weather...</span>
                    </div>
                    <div class="weather-graphics-right">
                        <div class="weather-vector-icon">
                            <div class="weather-spinner"></div>
                        </div>
                        <span class="weather-high-low-range"><div class="skeleton" style="width: 100px; height: 18px;"></div></span>
                    </div>
                `;
            }
            
            /**
             * Populates the widget with an error message.
             */
            renderErrorState(errorMessage) {
                if (!this.widgetElement) return;
                this.widgetElement.innerHTML = `
                    <div class="weather-information-left">
                        <span class="weather-city-label">Spånga</span>
                        <h2 class="weather-temperature-display">--</h2>
                        <span class="weather-condition-description" style="color: #FF453A;">${errorMessage}</span>
                    </div>
                `;
            }

            /**
             * Translates WMO Weather interpretation codes into UI-ready text and SVG assets.
             * @param {number} code - WMO weather code integer.
             * @returns {Object} { text: string, icon: string }
             */
            parseWmoWeatherCode(code) {
                if (code === 0 || code === 1) return { text: "Clear Sky", icon: SVG_ASSETS.WEATHER_SUN };
                if (code === 2) return { text: "Partly Cloudy", icon: SVG_ASSETS.WEATHER_CLOUD };
                if (code === 3) return { text: "Overcast", icon: SVG_ASSETS.WEATHER_CLOUD };
                if (code >= 51 && code <= 67) return { text: "Rain", icon: SVG_ASSETS.WEATHER_RAIN };
                if (code >= 71 && code <= 77) return { text: "Snowfall", icon: SVG_ASSETS.WEATHER_SNOW };
                if (code >= 80 && code <= 82) return { text: "Rain Showers", icon: SVG_ASSETS.WEATHER_RAIN };
                if (code >= 85 && code <= 86) return { text: "Snow Showers", icon: SVG_ASSETS.WEATHER_SNOW };
                if (code >= 95) return { text: "Thunderstorm", icon: SVG_ASSETS.WEATHER_RAIN };
                return { text: "Cloudy", icon: SVG_ASSETS.WEATHER_CLOUD }; // Fallback
            }

            /**
             * Updates the actual DOM elements with the provided parsed weather data.
             * @param {Object} data - Formatted weather object { temp, text, icon, high, low }
             */
            renderSuccessState(data) {
                if (!this.widgetElement) return;
                this.widgetElement.innerHTML = `
                    <div class="weather-information-left">
                        <span class="weather-city-label" id="weather-label-city">Spånga</span>
                        <h2 class="weather-temperature-display" id="weather-label-temperature">${data.temp}°</h2>
                        <span class="weather-condition-description" id="weather-label-description">${data.text}</span>
                    </div>
                    <div class="weather-graphics-right">
                        <div class="weather-vector-icon" id="weather-vector-container" aria-hidden="true">
                            ${data.icon}
                        </div>
                        <span class="weather-high-low-range" id="weather-label-range">H:${data.high}° L:${data.low}°</span>
                    </div>
                `;
            }

            /**
             * Primary orchestration method. Attempts to load from cache immediately, 
             * then fetches fresh data asynchronously in the background.
             */
            async fetchAndRender() {
                // 1. Attempt optimistic cache render to prevent layout shift and "Loading..." state
                const cachedPayload = sessionStorage.getItem(STORAGE_KEYS.WEATHER_CACHE);
                if (cachedPayload) {
                    try {
                        const parsedCache = JSON.parse(cachedPayload);
                        this.renderSuccessState(parsedCache);
                    } catch (e) {
                        console.warn("Failed to parse weather cache.", e);
                        this.renderLoadingState(); // Fallback to loading state if cache is corrupt
                    }
                } else {
                    // No cache, show loading state immediately.
                    this.renderLoadingState();
                }

                // 2. Fetch fresh Open-Meteo data using robust timeout wrapper
                try {
                    const rawData = await NetworkService.get(this.apiUrl);
                    
                    if (!rawData || !rawData.current || !rawData.daily) {
                        throw new Error("Invalid data structure from Open-Meteo API.");
                    }

                    // Extract Current Telemetry
                    const currentTemperature = Math.round(rawData.current.temperature_2m);
                    const weatherCondition = this.parseWmoWeatherCode(rawData.current.weather_code);
                    const dailyHigh = Math.round(rawData.daily.temperature_2m_max[0]);
                    const dailyLow = Math.round(rawData.daily.temperature_2m_min[0]);

                    // Construct formatted payload
                    const compiledWeatherData = {
                        temp: currentTemperature,
                        text: weatherCondition.text,
                        icon: weatherCondition.icon,
                        high: dailyHigh,
                        low: dailyLow
                    };

                    // 3. Render fresh data to DOM and save to SessionStorage Cache
                    this.renderSuccessState(compiledWeatherData);
                    sessionStorage.setItem(STORAGE_KEYS.WEATHER_CACHE, JSON.stringify(compiledWeatherData));

                } catch (error) {
                    let errorMessage = "Data Unavailable";
                    if (error.name === 'AbortError') {
                        errorMessage = "Weather API Timeout";
                        console.warn("WeatherService fetch aborted due to timeout.");
                    } else {
                        console.error("WeatherService encountered a critical error during fetch:", error);
                    }

                    // If we failed and there was no cache, render the error state.
                    if (!cachedPayload) {
                        this.renderErrorState(errorMessage);
                    }
                }
            }
        }

        /* ==========================================================================
           NETWORK SERVICE LAYER
           ========================================================================== */

        /**
         * A dedicated service for handling all network requests with centralized logic
         * for timeouts and error handling.
         */
        class NetworkManager {
            constructor() {
                this.defaultTimeoutMs = 12000; // Generous 12-second timeout
            }

            /**
             * Performs a GET request with a timeout.
             * @param {string} url - The URL to fetch.
             * @returns {Promise<Object>} The JSON response.
             */
            async get(url) {
                const abortController = new AbortController();
                const timeoutId = setTimeout(() => abortController.abort(), this.defaultTimeoutMs);

                try {
                    const response = await fetch(url, { signal: abortController.signal });
                    clearTimeout(timeoutId);

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    return await response.json();
                } catch (error) {
                    clearTimeout(timeoutId); // Ensure timeout is cleared on early fetch errors too
                    throw error; // Re-throw for the calling function to handle
                }
            }

            /**
             * Performs a POST request with a timeout.
             * @param {string} url - The URL to post to.
             * @param {Object} body - The JSON body of the request.
             * @returns {Promise<Object>} The JSON response.
             */
            async post(url, body) {
                const abortController = new AbortController();
                const timeoutId = setTimeout(() => abortController.abort(), this.defaultTimeoutMs);

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body),
                        signal: abortController.signal
                    });
                    clearTimeout(timeoutId);

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    return await response.json();
                } catch (error) {
                    clearTimeout(timeoutId);
                    throw error;
                }
            }
        }

        const NetworkService = new NetworkManager();
        
        /* ==========================================================================
           STATE & API MANAGEMENT FOR SMART DEVICES
           ========================================================================== */

        /**
         * State management and network controller for Cloudflare Worker Tuya proxy.
         * Now delegates network operations to the dedicated NetworkManager.
         */
        class TuyaSmartDeviceManager {
            constructor() {
                this.workerApiUrl = localStorage.getItem(STORAGE_KEYS.WORKER_URL) || '';
                
                // Initialize state object with strictly enforced defaults for safety
                this.devicesState = {};
                for (let i = 0; i < TUYA_DEVICES.length; i++) {
                    const device = TUYA_DEVICES[i];
                    this.devicesState[device.id] = {
                        on: false,
                        brightness: 100 // Scale 1-100 for UI purposes
                    };
                }

                // Debounce map to prevent network saturation during slider dragging
                this.debounceTimers = {};
            }

            /**
             * Normalizes and returns the current Worker API URL.
             * @param {string} path - The specific endpoint path (e.g., '/status').
             * @returns {string} Fully qualified URL string.
             */
            buildEndpointUrl(path) {
                // Ensure no trailing slash on base URL before appending path
                return this.workerApiUrl.replace(/\/$/, '') + path;
            }

            /**
             * Sets a new Worker API URL and persists to local storage.
             * @param {string} newUrl - The provided Cloudflare Worker URL.
             */
            setApiUrl(newUrl) {
                this.workerApiUrl = newUrl.trim();
                localStorage.setItem(STORAGE_KEYS.WORKER_URL, this.workerApiUrl);
            }

            /**
             * Indicates whether the application is configured to make network requests.
             * @returns {boolean}
             */
            isConfigured() {
                return this.workerApiUrl !== null && this.workerApiUrl !== '';
            }

            /**
             * Synchronizes local state with Tuya cloud via Worker proxy.
             */
            async synchronizeAllDevices() {
                if (!this.isConfigured()) return;

                for (let i = 0; i < TUYA_DEVICES.length; i++) {
                    const device = TUYA_DEVICES[i];
                    ApplicationUI.setDeviceConnectingState(device.id, true);
                    try {
                        const url = this.buildEndpointUrl(`/status?device=${device.id}`);
                        const jsonPayload = await NetworkService.get(url);
                        
                        if (jsonPayload.success && jsonPayload.result) {
                            this.parseAndApplyTuyaStatusPayload(device.id, jsonPayload.result);
                        }
                    } catch (error) {
                        console.warn(`TuyaSmartDeviceManager: Synchronization failed for device [${device.name}].`, error);
                    } finally {
                        ApplicationUI.setDeviceConnectingState(device.id, false);
                        ApplicationUI.updateDeviceCardRender(device.id);
                    }
                }
            }

            /**
             * Parses the generic Tuya instruction arrays into our strictly typed local state.
             * @param {string} deviceId - The unique Tuya device identifier.
             * @param {Array<Object>} statusArray - Array of code/value objects from Tuya API.
             */
            parseAndApplyTuyaStatusPayload(deviceId, statusArray) {
                const powerInstruction = statusArray.find(instruction => instruction.code === 'switch_led');
                if (powerInstruction !== undefined) {
                    this.devicesState[deviceId].on = powerInstruction.value;
                }
                const colorInstruction = statusArray.find(instruction => instruction.code === 'colour_data_v2' || instruction.code === 'colour_data');
                if (colorInstruction !== undefined) {
                    try {
                        const parsedValueObject = typeof colorInstruction.value === 'string' 
                            ? JSON.parse(colorInstruction.value) 
                            : colorInstruction.value;
                            
                        if (parsedValueObject && parsedValueObject.v !== undefined) {
                            let uiBrightness = Math.round(parsedValueObject.v / 10);
                            uiBrightness = Math.max(1, Math.min(100, uiBrightness));
                            this.devicesState[deviceId].brightness = uiBrightness;
                        }
                    } catch (parseError) {
                        console.error("TuyaSmartDeviceManager: Failed to parse colour_data JSON.", parseError);
                    }
                }
            }

            /**
             * Toggles device power locally and transmits command to API.
             * Employs Optimistic UI principles with rollback safety.
             * @param {string} deviceId - The unique Tuya device identifier.
             */
            async toggleDevicePower(deviceId) {
                if (!this.isConfigured()) {
                    ApplicationUI.openSettingsModal();
                    return;
                }

                // Optimistically invert state and apply connecting UI
                const previousState = this.devicesState[deviceId].on;
                this.devicesState[deviceId].on = !previousState;
                ApplicationUI.setDeviceConnectingState(deviceId, true);
                ApplicationUI.updateDeviceCardRender(deviceId);

                try {
                    const url = this.buildEndpointUrl('/command');
                    const body = {
                        device: deviceId,
                        commands: [{ code: 'switch_led', value: this.devicesState[deviceId].on }]
                    };
                    await NetworkService.post(url, body);
                } catch (error) {
                    if (error.name === 'AbortError') {
                        GlobalToast.show("Device Unresponsive (Timeout)");
                    } else {
                        GlobalToast.show("Network Error. Check Connection.");
                    }
                    // Revert state on network failure or timeout
                    this.devicesState[deviceId].on = previousState;
                    ApplicationUI.updateDeviceCardRender(deviceId);
                } finally {
                    // Always remove connecting state after operation completes
                    ApplicationUI.setDeviceConnectingState(deviceId, false);
                }
            }

            /**
             * Enqueues a brightness command to avoid rate-limiting while dragging sliders.
             * @param {string} deviceId - The unique Tuya device identifier.
             * @param {number} newBrightnessPercentage - 1-100 integer.
             */
            handleBrightnessChangeIntent(deviceId, newBrightnessPercentage) {
                if (!this.isConfigured()) return;

                if (this.debounceTimers[deviceId]) {
                    clearTimeout(this.debounceTimers[deviceId]);
                }

                this.debounceTimers[deviceId] = setTimeout(() => {
                    this.executeBrightnessCommand(deviceId, newBrightnessPercentage);
                }, 400);
            }

            /**
             * Executes the actual HTTP network transmission for brightness modification.
             * @param {string} deviceId - The unique Tuya device identifier.
             * @param {number} newBrightnessPercentage - 1-100 integer.
             */
            async executeBrightnessCommand(deviceId, newBrightnessPercentage) {
                // This logic is now handled in the high-frequency UI update
                // to prevent the "flash" effect. We ensure the command is only
                // sent if the light is on, which it will be by this point.
                if (this.devicesState[deviceId].on === false) {
                    return; 
                }

                ApplicationUI.setDeviceConnectingState(deviceId, true);

                const tuyaFormatBrightness = parseInt(newBrightnessPercentage, 10) * 10;

                try {
                    const url = this.buildEndpointUrl('/command');
                    const body = {
                        device: deviceId,
                        commands: [
                            { code: 'work_mode', value: 'colour' },
                            { code: 'colour_data', value: JSON.stringify({ h: 0, s: 0, v: tuyaFormatBrightness }) }
                        ]
                    };
                    await NetworkService.post(url, body);
                } catch (error) {
                    if (error.name === 'AbortError') {
                        GlobalToast.show("Device Unresponsive (Timeout)");
                    } else {
                        GlobalToast.show("Network Error. Check Connection.");
                    }
                } finally {
                    ApplicationUI.setDeviceConnectingState(deviceId, false);
                }
            }
        }

        const DeviceManager = new TuyaSmartDeviceManager();

        /* ==========================================================================
           USER INTERFACE RENDERER
           ========================================================================== */

        /**
         * Orchestrates all DOM manipulation, Event Listening, and View rendering.
         */
        class UserInterfaceController {
            constructor() {
                this.layoutMode = localStorage.getItem(STORAGE_KEYS.LAYOUT_MODE) || 'portrait';
                this.deviceGridContainer = document.getElementById('main-device-grid');
                this.settingsModalBackdrop = document.getElementById('modal-backdrop-settings');
                this.inputWorkerUrl = document.getElementById('input-field-worker-url');
                
                // Bind contexts for event listeners
                this.handleSettingsSave = this.handleSettingsSave.bind(this);
                this.handleSettingsCancel = this.handleSettingsCancel.bind(this);
            }

            /**
             * Initializes the application UI topology.
             */
            initialize() {
                this.applyLayoutModeToBody();
                this.constructDeviceGrid();
                this.attachStaticEventListeners();
            }

            /**
             * Applies CSS classes to document body dictating max-width grid columns.
             */
            applyLayoutModeToBody() {
                if (this.layoutMode === 'landscape') {
                    document.body.classList.add('layout-mode-landscape');
                } else {
                    document.body.classList.remove('layout-mode-landscape');
                }

                // Update Segmented Control visual state
                const btnPortrait = document.getElementById('segment-btn-portrait');
                const btnLandscape = document.getElementById('segment-btn-landscape');
                
                if (btnPortrait && btnLandscape) {
                    if (this.layoutMode === 'portrait') {
                        btnPortrait.classList.add('is-segment-active');
                        btnPortrait.setAttribute('aria-checked', 'true');
                        btnLandscape.classList.remove('is-segment-active');
                        btnLandscape.setAttribute('aria-checked', 'false');
                    } else {
                        btnLandscape.classList.add('is-segment-active');
                        btnLandscape.setAttribute('aria-checked', 'true');
                        btnPortrait.classList.remove('is-segment-active');
                        btnPortrait.setAttribute('aria-checked', 'false');
                    }
                }
            }

            /**
             * Sets the layout mode in memory, applies classes, and triggers repaint.
             * @param {string} mode - 'portrait' or 'landscape'
             */
            setLayoutMode(mode) {
                if (mode === 'portrait' || mode === 'landscape') {
                    this.layoutMode = mode;
                    this.applyLayoutModeToBody();
                }
            }

            /**
             * Attaches event listeners to static UI elements defined in HTML.
             */
            attachStaticEventListeners() {
                // Header Controls
                document.getElementById('header-btn-refresh').addEventListener('click', () => {
                    if (!DeviceManager.isConfigured()) {
                        this.openSettingsModal();
                        return;
                    }
                    GlobalToast.show("Synchronizing telemetry...");
                    DeviceManager.synchronizeAllDevices();
                });

                document.getElementById('header-btn-settings').addEventListener('click', () => {
                    this.openSettingsModal();
                });

                // Layout Segment Controls
                document.getElementById('segment-btn-portrait').addEventListener('click', () => {
                    this.setLayoutMode('portrait');
                });
                
                document.getElementById('segment-btn-landscape').addEventListener('click', () => {
                    this.setLayoutMode('landscape');
                });

                // Settings Modal Actions
                document.getElementById('modal-btn-save').addEventListener('click', this.handleSettingsSave);
                document.getElementById('modal-btn-cancel').addEventListener('click', this.handleSettingsCancel);
            }

            /**
             * Iterates over hardcoded TUYA_DEVICES to construct DOM structure dynamically.
             */
            constructDeviceGrid() {
                // Empty existing grid content
                while (this.deviceGridContainer.firstChild) {
                    this.deviceGridContainer.removeChild(this.deviceGridContainer.firstChild);
                }

                for (let i = 0; i < TUYA_DEVICES.length; i++) {
                    const deviceData = TUYA_DEVICES[i];
                    const currentState = DeviceManager.devicesState[deviceData.id];

                    // Determine active class inclusion
                    const activeClassString = currentState.on ? 'state-is-on' : '';

                    // Create Card Wrapper
                    const cardElement = document.createElement('article');
                    cardElement.className = `smart-device-card ${activeClassString}`;
                    cardElement.id = `device-card-wrapper-${deviceData.id}`;
                    cardElement.setAttribute('aria-label', `Control for ${deviceData.name}`);

                    // Use explicit, verbose HTML string construction to guarantee architecture adherence
                    cardElement.innerHTML = `
                        <div class="device-card-header-row">
                            <div class="device-toggle-icon-container" 
                                 id="toggle-btn-${deviceData.id}"
                                 role="button" 
                                 aria-pressed="${currentState.on ? 'true' : 'false'}" 
                                 aria-label="Toggle Power for ${deviceData.name}">
                                ${SVG_ASSETS.LIGHTBULB}
                            </div>
                        </div>
                        
                        <div class="device-text-information-block">
                            <div class="device-display-name">${deviceData.name}</div>
                            <div class="device-current-status-label" id="status-label-${deviceData.id}">
                                ${currentState.on ? currentState.brightness + '%' : 'Off'}
                            </div>
                        </div>

                        <div class="device-brightness-slider-container">
                            <div class="brightness-slider-visual-fill" 
                                 id="slider-fill-layer-${deviceData.id}" 
                                 style="--current-fill-percentage: ${currentState.brightness}%">
                            </div>
                            <input type="range" 
                                   class="brightness-native-range-input" 
                                   id="native-slider-input-${deviceData.id}"
                                   min="1" 
                                   max="100" 
                                   step="1" 
                                   value="${currentState.brightness}"
                                   aria-label="Brightness Control for ${deviceData.name}"
                                   aria-valuemin="1"
                                   aria-valuemax="100"
                                   aria-valuenow="${currentState.brightness}"
                                   aria-valuetext="${currentState.brightness} percent"
                                   ${currentState.on ? '' : 'disabled'}>
                        </div>
                    `;

                    this.deviceGridContainer.appendChild(cardElement);

                    // Add dynamic event listeners specifically tied to the newly injected elements
                    this.attachDynamicCardListeners(deviceData.id);
                }
            }

            /**
             * Binds interaction logic to a specifically injected device card.
             * @param {string} deviceId - The unique Tuya device identifier.
             */
            attachDynamicCardListeners(deviceId) {
                const toggleButton = document.getElementById(`toggle-btn-${deviceId}`);
                const sliderInput = document.getElementById(`native-slider-input-${deviceId}`);

                if (toggleButton) {
                    toggleButton.addEventListener('click', () => {
                        DeviceManager.toggleDevicePower(deviceId);
                    });
                }

                if (sliderInput) {
                    // onInput fires at 60/120Hz while the user finger drags the track
                    sliderInput.addEventListener('input', (event) => {
                        const newBrightnessValue = event.target.value;
                        this.handleHighFrequencySliderDrag(deviceId, newBrightnessValue);
                    });

                    // onChange fires once when the user finger lifts off the screen
                    sliderInput.addEventListener('change', (event) => {
                        const finalBrightnessValue = event.target.value;
                        DeviceManager.handleBrightnessChangeIntent(deviceId, finalBrightnessValue);
                    });
                }
            }

            /**
             * Immediately repaints DOM layout variables during high-fps touch interactions.
             * This method now handles the "turn on" logic to prevent the background flash.
             * @param {string} deviceId - The unique Tuya device identifier.
             * @param {string|number} rawValue - Brightness integer from slider input.
             */
            handleHighFrequencySliderDrag(deviceId, rawValue) {
                const integerValue = parseInt(rawValue, 10);
                
                // If the device is currently off, this interaction should turn it on.
                // This is the critical fix for the background "flash".
                if (DeviceManager.devicesState[deviceId].on === false) {
                    DeviceManager.devicesState[deviceId].on = true;
                    // Trigger a full re-render to apply the 'state-is-on' class immediately.
                    this.updateDeviceCardRender(deviceId);
                }

                // Update local memory
                DeviceManager.devicesState[deviceId].brightness = integerValue;
                
                // Target DOM nodes directly for maximum performance
                const fillLayer = document.getElementById(`slider-fill-layer-${deviceId}`);
                const statusLabel = document.getElementById(`status-label-${deviceId}`);
                const nativeSlider = document.getElementById(`native-slider-input-${deviceId}`);

                
                if (fillLayer) {
                    fillLayer.style.setProperty('--current-fill-percentage', `${integerValue}%`);
                }

                // If device is strictly considered ON, update the text label and accessibility attributes
                if (DeviceManager.devicesState[deviceId].on && statusLabel && nativeSlider) {
                    statusLabel.innerText = `${integerValue}%`;
                    nativeSlider.setAttribute('aria-valuenow', integerValue);
                    nativeSlider.setAttribute('aria-valuetext', `${integerValue} percent`);
                }
            }

            /**
             * Applies authoritative state data from memory onto the DOM node structurally.
             * This function is the single source of truth for a card's visual state.
             * @param {string} deviceId - The unique Tuya device identifier.
             */
            updateDeviceCardRender(deviceId) {
                const state = DeviceManager.devicesState[deviceId];
                
                const cardWrapper = document.getElementById(`device-card-wrapper-${deviceId}`);
                const statusLabel = document.getElementById(`status-label-${deviceId}`);
                const fillLayer = document.getElementById(`slider-fill-layer-${deviceId}`);
                const nativeSlider = document.getElementById(`native-slider-input-${deviceId}`);
                const toggleBtn = document.getElementById(`toggle-btn-${deviceId}`);

                if (!cardWrapper || !statusLabel || !fillLayer || !nativeSlider || !toggleBtn) {
                    console.warn(`UIRenderer: Attempted to update non-existent DOM nodes for device ${deviceId}`);
                    return;
                }

                // Handle ON/OFF CSS classifications and structural text
                if (state.on === true) {
                    cardWrapper.classList.add('state-is-on');
                    statusLabel.innerText = `${state.brightness}%`;
                    toggleBtn.setAttribute('aria-pressed', 'true');
                    nativeSlider.disabled = false;
                } else {
                    cardWrapper.classList.remove('state-is-on');
                    statusLabel.innerText = 'Off';
                    toggleBtn.setAttribute('aria-pressed', 'false');
                    nativeSlider.disabled = true;
                }

                // Assign brightness layout constraints and accessibility attributes
                nativeSlider.value = state.brightness;
                nativeSlider.setAttribute('aria-valuenow', state.brightness);
                nativeSlider.setAttribute('aria-valuetext', `${state.brightness} percent`);
                fillLayer.style.setProperty('--current-fill-percentage', `${state.brightness}%`);
            }
            
            /**
             * Applies or removes the 'is-connecting' class to a device card.
             * @param {string} deviceId - The unique Tuya device identifier.
             * @param {boolean} isConnecting - True to apply the connecting state, false to remove.
             */
            setDeviceConnectingState(deviceId, isConnecting) {
                const cardWrapper = document.getElementById(`device-card-wrapper-${deviceId}`);
                if (cardWrapper) {
                    if (isConnecting) {
                        cardWrapper.classList.add('is-connecting');
                    } else {
                        cardWrapper.classList.remove('is-connecting');
                    }
                }
            }

            /**
             * Makes settings modal visible and populates input with current config.
             */
            openSettingsModal() {
                // Ensure Layout Selection reflects persistent memory before opening
                this.setLayoutMode(localStorage.getItem(STORAGE_KEYS.LAYOUT_MODE) || 'portrait');
                
                if (this.inputWorkerUrl) {
                    this.inputWorkerUrl.value = DeviceManager.workerApiUrl;
                }
                
                if (this.settingsModalBackdrop) {
                    this.settingsModalBackdrop.classList.add('is-visible-active');
                    this.settingsModalBackdrop.setAttribute('aria-hidden', 'false');
                }
            }

            /**
             * Hides settings modal without saving, reverting layout if changed unsaved.
             */
            handleSettingsCancel() {
                // Revert any unsaved segmented control tapping
                const memoryLayout = localStorage.getItem(STORAGE_KEYS.LAYOUT_MODE) || 'portrait';
                this.setLayoutMode(memoryLayout);

                if (this.settingsModalBackdrop) {
                    this.settingsModalBackdrop.classList.remove('is-visible-active');
                    this.settingsModalBackdrop.setAttribute('aria-hidden', 'true');
                }
            }

            /**
             * Extracts inputs, persists to memory, and triggers re-synchronization.
             */
            handleSettingsSave() {
                if (!this.inputWorkerUrl) return;

                const inputString = this.inputWorkerUrl.value.trim();
                
                if (inputString === '') {
                    GlobalToast.show("Error: Web URL cannot be empty.");
                    return;
                }
                
                // Persist Cloudflare Worker URL
                DeviceManager.setApiUrl(inputString);
                
                // Persist Layout Mode
                localStorage.setItem(STORAGE_KEYS.LAYOUT_MODE, this.layoutMode);
                
                // Finalize layout render logic just in case it wasn't triggered
                this.applyLayoutModeToBody();

                // Close Modal
                if (this.settingsModalBackdrop) {
                    this.settingsModalBackdrop.classList.remove('is-visible-active');
                    this.settingsModalBackdrop.setAttribute('aria-hidden', 'true');
                }

                GlobalToast.show("Configuration saved. Connecting...");
                
                // Trigger full sync using new credentials
                DeviceManager.synchronizeAllDevices();
            }
        }

        const ApplicationUI = new UserInterfaceController();

        /* ==========================================================================
           BOOTSTRAPPING & LIFECYCLE MANAGEMENT
           ========================================================================== */
        
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Initialize DOM structure and attach primary event listeners
            ApplicationUI.initialize();

            // 2. Instantiate and trigger background weather service independently
            const WeatherAPI = new WeatherService();
            WeatherAPI.fetchAndRender();

            // 3. Evaluate configuration readiness
            if (!DeviceManager.isConfigured()) {
                // Delay modal slightly to allow initial paint and smooth transition
                setTimeout(() => {
                    ApplicationUI.openSettingsModal();
                }, 600);
            } else {
                // Valid configuration found, proceed to network synchronization
                DeviceManager.synchronizeAllDevices();
            }
        });

    </script>
</body>
</html>
