                    const indicatorEl = document.getElementById(`color-thumb-${deviceData.id}`);
                    DeviceManager.colorWheelControllers[deviceData.id] = new ColorWheelManager(deviceData.id, canvasEl, indicatorEl);
                    DeviceManager.colorWheelControllers[deviceData.id].updateIndicatorFromState();
                }
            }

            attachDynamicCardListeners(deviceId) {
                const cardWrapper = document.getElementById(`device-card-wrapper-${deviceId}`);
                const toggleButton = document.getElementById(`toggle-btn-${deviceId}`);
                const sliderInput = document.getElementById(`native-slider-input-${deviceId}`);
                const expansionArea = document.getElementById(`expansion-area-${deviceId}`);

                if (cardWrapper) {
                    cardWrapper.addEventListener('click', (event) => {
                        if (event.target === toggleButton || toggleButton.contains(event.target) || event.target === sliderInput || expansionArea.contains(event.target)) {
                            return;
                        }
                        if (DeviceManager.devicesState[deviceId].on === false) return;
                        
                        cardWrapper.classList.toggle('is-expanded');
                        if(cardWrapper.classList.contains('is-expanded') && DeviceManager.colorWheelControllers[deviceId]) {
                            window.requestAnimationFrame(() => {
                                setTimeout(() => {
                                    DeviceManager.colorWheelControllers[deviceId].updateIndicatorFromState();
                                }, 80); 
                            });
                        }
                    });
                }

                if (toggleButton) {
                    toggleButton.addEventListener('click', (event) => {
                        event.stopPropagation(); 
                        DeviceManager.toggleDevicePower(deviceId);
                    });
                }

                if (sliderInput) {
                    sliderInput.addEventListener('mousedown', (e) => e.stopPropagation());
                    sliderInput.addEventListener('touchstart', (e) => e.stopPropagation(), {passive: true});
                    
                    sliderInput.addEventListener('input', (event) => {
                        event.stopPropagation();
                        const newBrightnessValue = event.target.value;
                        this.handleHighFrequencySliderDrag(deviceId, newBrightnessValue);
                    });

                    sliderInput.addEventListener('change', (event) => {
                        event.stopPropagation();
                        const finalBrightnessValue = event.target.value;
                        DeviceManager.handleBrightnessChangeIntent(deviceId, finalBrightnessValue);
                    });
                }
            }

            handleHighFrequencySliderDrag(deviceId, rawValue) {
                const integerValue = parseInt(rawValue, 10);
                const targetDeviceIds = this.isDevicesLinked ? TUYA_DEVICES.map(d => d.id) : [deviceId];

                targetDeviceIds.forEach(id => {
                    if (DeviceManager.devicesState[id].on === false) {
                        DeviceManager.devicesState[id].on = true;
                        this.updateDeviceCardRender(id);
                    }

                    DeviceManager.devicesState[id].brightness = integerValue;
                    
                    const fillLayer = document.getElementById(`slider-fill-layer-${id}`);
                    const statusLabel = document.getElementById(`status-label-${id}`);
                    const nativeSlider = document.getElementById(`native-slider-input-${id}`);
                    
                    if (fillLayer) fillLayer.style.setProperty('--current-fill-percentage', `${integerValue}%`);

                    if (DeviceManager.devicesState[id].on && statusLabel && nativeSlider) {
                        statusLabel.innerText = `${integerValue}%`;
                        nativeSlider.value = integerValue; 
                        nativeSlider.setAttribute('aria-valuenow', integerValue);
                        nativeSlider.setAttribute('aria-valuetext', `${integerValue} percent`);
                    }
                });
            }

            updateDeviceCardRender(deviceId) {
                const stateObject = DeviceManager.devicesState[deviceId];
                const cardWrapper = document.getElementById(`device-card-wrapper-${deviceId}`);
                const statusLabel = document.getElementById(`status-label-${deviceId}`);
                const fillLayer = document.getElementById(`slider-fill-layer-${deviceId}`);
                const nativeSlider = document.getElementById(`native-slider-input-${deviceId}`);
                const toggleBtn = document.getElementById(`toggle-btn-${deviceId}`);

                if (!cardWrapper || !statusLabel || !fillLayer || !nativeSlider || !toggleBtn) return;

                if (stateObject.on === true) {
                    cardWrapper.classList.add('state-is-on');
                    statusLabel.innerText = `${stateObject.brightness}%`;
                    toggleBtn.setAttribute('aria-pressed', 'true');
                    nativeSlider.disabled = false;
                } else {
                    cardWrapper.classList.remove('state-is-on');
                    statusLabel.innerText = 'Off';
                    toggleBtn.setAttribute('aria-pressed', 'false');
                    nativeSlider.disabled = true;
                    
                    if (cardWrapper.classList.contains('is-expanded')) {
                        cardWrapper.classList.remove('is-expanded');
                    }
                }

                nativeSlider.value = stateObject.brightness;
                nativeSlider.setAttribute('aria-valuenow', stateObject.brightness);
                nativeSlider.setAttribute('aria-valuetext', `${stateObject.brightness} percent`);
                fillLayer.style.setProperty('--current-fill-percentage', `${stateObject.brightness}%`);
            }
            
            setDeviceConnectingState(deviceId, isConnecting) {
                const cardWrapper = document.getElementById(`device-card-wrapper-${deviceId}`);
                if (cardWrapper) {
                    if (isConnecting) cardWrapper.classList.add('is-connecting');
                    else cardWrapper.classList.remove('is-connecting');
                }
            }

            openSettingsModal() {
                this.setLayoutMode(localStorage.getItem(STORAGE_KEYS.LAYOUT_MODE) || 'portrait');
                if (this.inputWorkerUrl) this.inputWorkerUrl.value = DeviceManager.workerApiUrl;
                
                this.renderAgendaEditorSettings();
                
                if (this.settingsModalBackdrop) {
                    this.settingsModalBackdrop.classList.add('is-visible-active');
                    this.settingsModalBackdrop.setAttribute('aria-hidden', 'false');
                }
            }

            handleSettingsCancel() {
                const memoryLayout = localStorage.getItem(STORAGE_KEYS.LAYOUT_MODE) || 'portrait';
                this.setLayoutMode(memoryLayout);
                if (this.settingsModalBackdrop) {
                    this.settingsModalBackdrop.classList.remove('is-visible-active');
                    this.settingsModalBackdrop.setAttribute('aria-hidden', 'true');
                }
            }

            handleSettingsSave() {
                if (!this.inputWorkerUrl) return;
                const inputString = this.inputWorkerUrl.value.trim();
                if (inputString === '') return GlobalToast.show("Error: Web URL cannot be empty.");
                
                DeviceManager.setApiUrl(inputString);
                localStorage.setItem(STORAGE_KEYS.LAYOUT_MODE, this.layoutMode);
                this.applyLayoutModeToBody();

                if (this.settingsModalBackdrop) {
                    this.settingsModalBackdrop.classList.remove('is-visible-active');
                    this.settingsModalBackdrop.setAttribute('aria-hidden', 'true');
                }

                GlobalToast.show("Configuration saved. Connecting...");
                DeviceManager.synchronizeAllDevices();
                
                this.evaluateAndRenderActiveRoutine();
            }
        }

        const ApplicationUI = new UserInterfaceController();
        
        // Expose critical functions to global namespace for HTML inline event handlers
        AgendaSystem.handleCreateNewRoutine = () => {
            const titleEl = document.getElementById('agenda-new-routine-title');
            const startEl = document.getElementById('agenda-new-routine-start');
            const endEl = document.getElementById('agenda-new-routine-end');
            
            if(titleEl && startEl && endEl && titleEl.value.trim() !== '') {
                AgendaSystem.addRoutine(titleEl.value, startEl.value, endEl.value);
                titleEl.value = '';
                ApplicationUI.renderAgendaEditorSettings();
                ApplicationUI.evaluateAndRenderActiveRoutine();
                GlobalToast.show("Routine Created");
            } else {
                GlobalToast.show("Please provide a name for the routine.");
            }
        };

        /* ==========================================================================
           BOOTSTRAPPING & LIFECYCLE MANAGEMENT
           ========================================================================== */
        
        document.addEventListener('DOMContentLoaded', () => {
            ApplicationUI.initialize();
            triggerEntryAnimations();
            LiveClock.start();

            const WeatherAPI = new WeatherService();
            WeatherAPI.fetchAndRender();

            if (!DeviceManager.isConfigured()) {
                setTimeout(() => ApplicationUI.openSettingsModal(), 1200);
            } else {
                DeviceManager.synchronizeAllDevices();
            }
        });

    </script>
</body>
</html>
