<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Ultimate Premium Apple HomeKit Style Smart Home Controller for iPad Air 2">
    <title>Smart Home Control Center</title>

    <style>
        /* ==========================================================================
           GLOBAL DESIGN TOKENS & VARIABLES
           ========================================================================== */
        :root {
            /* Core Backgrounds */
            --application-background-color: #000000;
            
            /* Glassmorphism System */
            --glass-background-base: rgba(255, 255, 255, 0.08);
            --glass-border-color: rgba(255, 255, 255, 0.12);
            --glass-background-hover: rgba(255, 255, 255, 0.15);
            --glass-backdrop-filter-blur: blur(45px);
            --glass-backdrop-filter-saturate: saturate(180%);
            
            /* Active Device States (ON) - Flawless Solid Colors */
            --card-active-background-color: #FFFFFF; /* Pure Apple White - No Opacity Drop */
            --card-active-text-color: #000000;
            --card-active-subtitle-color: rgba(0, 0, 0, 0.50);
            --icon-active-background-color: #FFCC00; /* Apple System Yellow */
            --icon-active-foreground-color: #FFFFFF;
            --icon-active-box-shadow: 0px 6px 16px rgba(255, 204, 0, 0.35);
            
            /* Premium Slider */
            --slider-active-track-color: #F2F2F7; /* Apple Grouped Background Grey */
            --slider-active-fill-color: #D1D1D6; /* Apple System Gray 4 - Beautiful Silver */
            --slider-active-fill-shadow: inset 0px 1px 1px rgba(255, 255, 255, 0.8), 0px 1px 4px rgba(0, 0, 0, 0.06);

            /* Inactive Device States (OFF) */
            --card-inactive-text-color: #FFFFFF;
            --card-inactive-subtitle-color: rgba(255, 255, 255, 0.55);
            --icon-inactive-background-color: rgba(255, 255, 255, 0.12);
            --icon-inactive-foreground-color: rgba(255, 255, 255, 0.60);
            --slider-inactive-track-color: rgba(0, 0, 0, 0.25);
            --slider-inactive-fill-color: rgba(255, 255, 255, 0.20);
            --slider-inactive-fill-shadow: none;

            /* Typography */
            --system-font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            
            /* Physics & Animation Curves */
            --animation-spring-curve: cubic-bezier(0.32, 0.72, 0, 1.0);
            --animation-ease-out-curve: cubic-bezier(0.25, 1.0, 0.5, 1.0);
            --animation-duration-fast: 0.2s;
            --animation-duration-medium: 0.4s;
            --animation-duration-slow: 0.6s;

            /* Layout Constraints */
            --layout-max-width-portrait: 768px;
            --layout-max-width-landscape: 1024px;
            --layout-padding-horizontal-portrait: 32px;
            --layout-padding-horizontal-landscape: 48px;
            --layout-padding-vertical-bottom: 40px;
        }

        /* ==========================================================================
           CSS RESET & NORMALIZATION
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin-top: 0;
            margin-right: 0;
            margin-bottom: 0;
            margin-left: 0;
            padding-top: 0;
            padding-right: 0;
            padding-bottom: 0;
            padding-left: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-family: var(--system-font-family);
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            background-color: var(--application-background-color);
            color: var(--card-inactive-text-color);
            margin-left: auto;
            margin-right: auto;
            min-height: 100vh;
            padding-top: calc(env(safe-area-inset-top, 40px) + 24px);
            padding-right: var(--layout-padding-horizontal-portrait);
            padding-bottom: var(--layout-padding-vertical-bottom);
            padding-left: var(--layout-padding-horizontal-portrait);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
            touch-action: pan-y;
            max-width: var(--layout-max-width-portrait);
            transition-property: max-width, padding;
            transition-duration: var(--animation-duration-medium);
            transition-timing-function: var(--animation-ease-out-curve);
        }

        body.layout-mode-landscape {
            max-width: var(--layout-max-width-landscape);
            padding-right: var(--layout-padding-horizontal-landscape);
            padding-left: var(--layout-padding-horizontal-landscape);
        }

        input, textarea, select {
            user-select: text !important;
            -webkit-user-select: text !important;
            -webkit-touch-callout: default !important;
            font-family: inherit;
        }

        /* ==========================================================================
           HEADER COMPONENT
           ========================================================================== */
        .application-header {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 36px;
            padding-left: 8px;
            padding-right: 8px;
        }

        .application-title {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.035em;
            line-height: 1.2;
            color: #FFFFFF;
        }

        .header-controls-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 16px;
        }

        .circular-icon-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--glass-background-base);
            border-width: 1px;
            border-style: solid;
            border-color: var(--glass-border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            cursor: pointer;
            backdrop-filter: var(--glass-backdrop-filter-blur) var(--glass-backdrop-filter-saturate);
            -webkit-backdrop-filter: var(--glass-backdrop-filter-blur) var(--glass-backdrop-filter-saturate);
            transition-property: transform, background-color;
            transition-duration: var(--animation-duration-medium), var(--animation-duration-fast);
            transition-timing-function: var(--animation-spring-curve), var(--animation-ease-out-curve);
            outline: none;
        }

        .circular-icon-button:active {
            transform: scale(0.88);
            background-color: var(--glass-background-hover);
        }

        .circular-icon-button svg {
            width: 20px;
            height: 20px;
        }

        /* ==========================================================================
           WEATHER WIDGET COMPONENT (EXPANDABLE)
           ========================================================================== */
        .weather-dashboard-widget {
            background-color: var(--glass-background-base);
            border-width: 1px;
            border-style: solid;
            border-color: var(--glass-border-color);
            backdrop-filter: var(--glass-backdrop-filter-blur) var(--glass-backdrop-filter-saturate);
            -webkit-backdrop-filter: var(--glass-backdrop-filter-blur) var(--glass-backdrop-filter-saturate);
            border-radius: 32px;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            box-shadow: 0px 12px 48px rgba(0, 0, 0, 0.4), inset 0px 1px 0px rgba(255, 255, 255, 0.1);
            transition-property: transform, background-color;
            transition-duration: var(--animation-duration-medium);
            transition-timing-function: var(--animation-spring-curve);
            overflow: hidden;
            cursor: pointer;
        }

        .weather-dashboard-widget:active {
            transform: scale(0.98);
            background-color: var(--glass-background-hover);
        }

        .weather-main-row {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding-top: 28px;
            padding-right: 32px;
            padding-bottom: 28px;
            padding-left: 32px;
        }

        .weather-information-left { display: flex; flex-direction: column; gap: 6px; }
        .weather-city-label { font-size: 15px; font-weight: 600; color: var(--card-inactive-subtitle-color); text-transform: uppercase; letter-spacing: 0.06em; }
        .weather-temperature-display { font-size: 56px; font-weight: 200; letter-spacing: -0.05em; line-height: 1.0; margin-top: 4px; margin-bottom: 4px; color: #FFFFFF; }
        .weather-condition-description { font-size: 16px; font-weight: 500; color: var(--card-inactive-subtitle-color); }
        .weather-graphics-right { display: flex; flex-direction: column; align-items: flex-end; gap: 16px; }
        .weather-vector-icon { width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; }
        .weather-vector-icon svg { width: 100%; height: 100%; filter: drop-shadow(0px 6px 16px rgba(255, 255, 255, 0.15)); }
        .weather-high-low-range { font-size: 15px; font-weight: 600; color: var(--card-inactive-subtitle-color); }
        
        /* Expandable Hourly Section */
        .weather-hourly-container {
            max-height: 0;
            opacity: 0;
            overflow-x: auto;
            overflow-y: hidden;
            display: flex;
            flex-direction: row;
            gap: 20px;
            padding-left: 32px;
            padding-right: 32px;
            border-top-width: 1px;
            border-top-style: solid;
            border-top-color: transparent;
            transition-property: max-height, opacity, padding, border-top-color;
            transition-duration: 0.5s;
            transition-timing-function: var(--animation-spring-curve);
        }

        .weather-hourly-container::-webkit-scrollbar {
            display: none;
        }

        .weather-dashboard-widget.is-expanded .weather-hourly-container {
            max-height: 140px;
            opacity: 1;
            padding-top: 24px;
            padding-bottom: 24px;
            border-top-color: rgba(255, 255, 255, 0.1);
        }

        .hourly-item-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-width: 48px;
        }

        .hourly-item-time { font-size: 14px; font-weight: 600; color: var(--card-inactive-subtitle-color); }
        .hourly-item-icon { width: 28px; height: 28px; }
        .hourly-item-icon svg { width: 100%; height: 100%; }
        .hourly-item-temp { font-size: 16px; font-weight: 600; color: #FFFFFF; }
        
        /* Skeleton */
        .skeleton { background-color: rgba(255, 255, 255, 0.1); border-radius: 8px; position: relative; overflow: hidden; }
        .skeleton::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; transform: translateX(-100%); background-image: linear-gradient(90deg, rgba(255,255,255,0) 0, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%); animation: shimmer 2s infinite; }
        @keyframes shimmer { 100% { transform: translateX(100%); } }

        /* ==========================================================================
           DEVICE GRID LAYOUT
           ========================================================================== */
        .section-heading-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-left: 8px;
            letter-spacing: -0.02em;
            color: #FFFFFF;
        }

        .device-grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-auto-rows: minmax(min-content, max-content);
            column-gap: 24px;
            row-gap: 24px;
            transition-property: grid-template-columns, column-gap;
            transition-duration: var(--animation-duration-medium);
            transition-timing-function: var(--animation-ease-out-curve);
        }

        body.layout-mode-landscape .device-grid-container {
            grid-template-columns: repeat(2, 1fr);
            column-gap: 32px;
            row-gap: 32px;
        }

        /* ==========================================================================
           SMART DEVICE CARD COMPONENT (EXPANDABLE)
           ========================================================================== */
        .smart-device-card {
            background-color: var(--glass-background-base);
            border-width: 1px;
            border-style: solid;
            border-color: var(--glass-border-color);
            backdrop-filter: blur(35px) saturate(160%);
            -webkit-backdrop-filter: blur(35px) saturate(160%);
            border-radius: 32px;
            padding-top: 24px;
            padding-right: 24px;
            padding-bottom: 24px;
            padding-left: 24px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            height: 200px;
            box-shadow: 0px 12px 36px rgba(0, 0, 0, 0.25), inset 0px 1px 0px rgba(255, 255, 255, 0.05);
            position: relative;
            cursor: pointer;
            
            transition-property: background-color, color, transform, box-shadow, border-color, height;
            transition-duration: var(--animation-duration-medium), var(--animation-duration-medium), var(--animation-duration-medium), var(--animation-duration-medium), var(--animation-duration-medium), 0.5s;
            transition-timing-function: var(--animation-ease-out-curve), var(--animation-ease-out-curve), var(--animation-spring-curve), var(--animation-ease-out-curve), var(--animation-ease-out-curve), var(--animation-spring-curve);
        }

        /* Expanded State for Color Picker */
        .smart-device-card.is-expanded {
            grid-row-end: span 2;
            height: 480px;
        }

        /* State: Device is ON */
        .smart-device-card.state-is-on {
            background-color: var(--card-active-background-color) !important;
            color: var(--card-active-text-color);
            box-shadow: 0px 16px 40px rgba(0, 0, 0, 0.1), inset 0px 1px 0px rgba(255, 255, 255, 1.0);
            border-color: transparent;
        }

        /* Base Content Wrapper */
        .card-base-content {
            display: flex;
            flex-direction: column;
            height: 152px; /* Fixed height for the non-expanded part */
            justify-content: space-between;
        }

        .device-card-header-row {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: flex-start;
        }

        .device-toggle-icon-container {
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background-color: var(--icon-inactive-background-color);
            color: var(--icon-inactive-foreground-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition-property: background-color, color, transform, box-shadow;
            transition-duration: var(--animation-duration-medium);
            transition-timing-function: var(--animation-ease-out-curve);
        }

        .smart-device-card.state-is-on .device-toggle-icon-container {
            background-color: var(--icon-active-background-color);
            color: var(--icon-active-foreground-color);
            box-shadow: var(--icon-active-box-shadow);
        }
        
        .smart-device-card.is-connecting .device-toggle-icon-container {
            animation-name: pulse-connecting;
            animation-duration: 1.2s;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in-out;
        }
        
        @keyframes pulse-connecting {
            0% { transform: scale(1); }
            50% { transform: scale(1.12); }
            100% { transform: scale(1); }
        }

        .device-toggle-icon-container svg { width: 26px; height: 26px; }

        .device-text-information-block {
            display: flex;
            flex-direction: column;
            pointer-events: none;
            margin-bottom: 20px;
        }

        .device-display-name { font-size: 17px; font-weight: 600; letter-spacing: -0.015em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .device-current-status-label { font-size: 15px; font-weight: 500; color: var(--card-inactive-subtitle-color); margin-top: 4px; transition-property: color; transition-duration: var(--animation-duration-medium); transition-timing-function: var(--animation-ease-out-curve); }
        .smart-device-card.state-is-on .device-current-status-label { color: var(--card-active-subtitle-color); }

        /* Bottom Area: Slider Control */
        .device-brightness-slider-container {
            width: 100%;
            height: 40px;
            border-radius: 20px;
            background-color: var(--slider-inactive-track-color);
            position: relative;
            overflow: hidden;
            -webkit-mask-image: -webkit-linear-gradient(white, white);
            -webkit-mask-repeat: no-repeat;
            -webkit-backface-visibility: hidden;
            -moz-backface-visibility: hidden;
            transform: translate3d(0, 0, 0);
            box-shadow: inset 0px 2px 6px rgba(0, 0, 0, 0.2);
            transition-property: background-color, box-shadow, opacity;
            transition-duration: var(--animation-duration-medium);
            transition-timing-function: var(--animation-ease-out-curve);
        }

        .smart-device-card:not(.state-is-on) .device-brightness-slider-container {
            pointer-events: none;
            opacity: 0.5;
        }

        .smart-device-card.state-is-on .device-brightness-slider-container {
            background-color: var(--slider-active-track-color);
            box-shadow: inset 0px 1px 4px rgba(0, 0, 0, 0.05);
        }

        .brightness-slider-visual-fill {
            position: absolute; top: 0; left: 0; bottom: 0;
            background-color: var(--slider-inactive-fill-color);
            pointer-events: none; z-index: 1;
            width: var(--current-fill-percentage, 0%);
            border-radius: 20px;
            box-shadow: var(--slider-inactive-fill-shadow);
            transition-property: background-color, box-shadow;
            transition-duration: var(--animation-duration-medium);
            transition-timing-function: var(--animation-ease-out-curve);
        }

        .smart-device-card.state-is-on .brightness-slider-visual-fill {
            background-color: var(--slider-active-fill-color);
            box-shadow: var(--slider-active-fill-shadow);
        }

        .brightness-native-range-input {
            -webkit-appearance: none; appearance: none;
            width: 100%; height: 100%; background-color: transparent;
            outline: none; border: none; box-shadow: none; margin: 0;
            position: absolute; top: 0; left: 0; z-index: 2;
        }

        .brightness-native-range-input::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 40px; height: 40px; background-color: transparent;
            border: none; box-shadow: none; cursor: pointer;
        }
        .brightness-native-range-input::-webkit-slider-runnable-track { background-color: transparent; border: none; box-shadow: none; }

        /* Expansion Area: Color Picker */
        .color-picker-expansion-area {
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 0;
            transition-property: opacity, max-height, padding;
            transition-duration: 0.5s;
            transition-timing-function: var(--animation-spring-curve);
        }

        .smart-device-card.is-expanded .color-picker-expansion-area {
            opacity: 1;
            max-height: 250px;
            padding-top: 24px;
        }

        .color-wheel-canvas-container {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            position: relative;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.2);
            cursor: crosshair;
            background: radial-gradient(circle at center, white 0%, transparent 100%), conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
        }

        .color-wheel-indicator {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.5);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: background-color 0.1s;
        }

        /* ==========================================================================
           MODALS, OVERLAYS & SETTINGS
           ========================================================================== */
        .application-modal-backdrop {
            position: fixed; top: 0; right: 0; bottom: 0; left: 0;
            background-color: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; z-index: 1000;
            transition-property: opacity; transition-duration: var(--animation-duration-medium); transition-timing-function: var(--animation-ease-out-curve);
        }
        .application-modal-backdrop.is-visible-active { opacity: 1; pointer-events: auto; }

        .settings-modal-sheet {
            background-color: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(50px) saturate(200%); -webkit-backdrop-filter: blur(50px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            width: 380px; border-radius: 36px; padding: 36px 28px;
            text-align: center; box-shadow: 0px 24px 80px rgba(0, 0, 0, 0.6);
            transform: translateY(50px) scale(0.92); transition-property: transform; transition-duration: 0.5s; transition-timing-function: var(--animation-spring-curve);
        }
        .application-modal-backdrop.is-visible-active .settings-modal-sheet { transform: translateY(0) scale(1); }

        .settings-modal-heading { font-size: 24px; font-weight: 700; color: #FFFFFF; margin-bottom: 12px; letter-spacing: -0.02em; }
        .settings-modal-description { font-size: 15px; color: rgba(255, 255, 255, 0.65); margin-bottom: 28px; line-height: 1.5; }

        .ios-segmented-control-container { display: flex; flex-direction: row; background-color: rgba(0, 0, 0, 0.35); border-radius: 14px; padding: 4px; margin-bottom: 28px; }
        .ios-segmented-control-button { flex: 1; padding: 12px 0; border-radius: 10px; border: none; background-color: transparent; color: rgba(255, 255, 255, 0.6); font-size: 15px; font-weight: 600; cursor: pointer; transition: all var(--animation-duration-fast) var(--animation-ease-out-curve); }
        .ios-segmented-control-button.is-segment-active { background-color: rgba(255, 255, 255, 0.25); color: #FFFFFF; box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.25); }

        .settings-text-input-field { width: 100%; background-color: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.15); color: #FFFFFF; padding: 18px; border-radius: 18px; font-size: 16px; margin-bottom: 20px; outline: none; transition: all var(--animation-duration-fast) var(--animation-ease-out-curve); }
        .settings-text-input-field:focus { border-color: rgba(255, 255, 255, 0.4); background-color: rgba(0, 0, 0, 0.5); }

        .settings-action-button-primary { background-color: #FFFFFF; color: #000000; width: 100%; padding: 18px; border-radius: 18px; font-size: 17px; font-weight: 600; border: none; cursor: pointer; margin-bottom: 14px; transition: transform var(--animation-duration-fast) var(--animation-ease-out-curve); }
        .settings-action-button-primary:active { transform: scale(0.96); opacity: 0.85; }
        .settings-action-button-secondary { background-color: transparent; color: rgba(255, 255, 255, 0.65); width: 100%; padding: 16px; font-size: 17px; font-weight: 600; border: none; cursor: pointer; transition: color var(--animation-duration-fast) var(--animation-ease-out-curve); }
        .settings-action-button-secondary:active { color: #FFFFFF; }

        .system-toast-notification { position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%) translateY(24px) scale(0.9); background-color: rgba(45, 45, 45, 0.95); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.15); color: #FFFFFF; padding: 16px 32px; border-radius: 32px; font-size: 16px; font-weight: 600; opacity: 0; pointer-events: none; z-index: 2000; box-shadow: 0px 12px 36px rgba(0, 0, 0, 0.4); white-space: nowrap; transition: all var(--animation-duration-medium) var(--animation-spring-curve); }
        .system-toast-notification.is-toast-visible { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    </style>
</head>
<body>

    <!-- ==========================================================================
         APPLICATION HEADER
         ========================================================================== -->
    <header class="application-header" aria-label="Main Application Header">
        <h1 class="application-title">My Home</h1>
        <div class="header-controls-container">
            <button class="circular-icon-button" id="header-btn-refresh" aria-label="Synchronize Devices" title="Force Refresh">

        class ToastManager {
            constructor() {
                this.toastElement = document.getElementById('system-toast-notification');
                this.timeoutReference = null;

            show(message) {
                if (!this.toastElement) return;
                if (this.timeoutReference !== null) clearTimeout(this.timeoutReference);
                this.toastElement.innerText = message;
                this.toastElement.classList.add('is-toast-visible');
                this.timeoutReference = setTimeout(() => {
                    this.toastElement.classList.remove('is-toast-visible');

        /**
         * Manages retrieval, parsing, and caching of meteorological data via Open-Meteo API.
         * Integrates fully fledged hourly forecasting with horizontal scroll UI mapping.
         */
        class WeatherService {
            constructor() {
                this.latitudeCoordinateForApi = 59.38; // Spånga
                this.longitudeCoordinateForApi = 17.90; // Spånga
                // Fetching current, daily, AND hourly telemetry
                this.apiUrl = `https://api.open-meteo.com/v1/forecast?latitude=${this.latitudeCoordinateForApi}&longitude=${this.longitudeCoordinateForApi}&current=temperature_2m,weather_code&hourly=temperature_2m,precipitation,weather_code&daily=temperature_2m_max,temperature_2m_min&timezone=auto`;
                
                this.mainRowElement = document.getElementById('weather-main-row-container');
                this.hourlyContainerElement = document.getElementById('weather-hourly-container');
            }
            
            renderLoadingState() {
                if (!this.mainRowElement) return;
                this.mainRowElement.innerHTML = `
                    <div class="weather-information-left">
                        <span class="weather-city-label">Spånga</span>
                        <h2 class="weather-temperature-display"><div class="skeleton" style="width: 80px; height: 50px;"></div></h2>
                        <span class="weather-condition-description">Fetching Weather...</span>
                    </div>
                    <div class="weather-graphics-right">
                        <div class="weather-vector-icon"><div class="weather-spinner"></div></div>
                        <span class="weather-high-low-range"><div class="skeleton" style="width: 100px; height: 18px;"></div></span>
                    </div>
                `;
            }
            
            renderErrorState(errorMessage) {
                if (!this.mainRowElement) return;
                this.mainRowElement.innerHTML = `
                    <div class="weather-information-left">
                        <span class="weather-city-label">Spånga</span>
                        <h2 class="weather-temperature-display">--</h2>
                        <span class="weather-condition-description" style="color: #FF453A;">${errorMessage}</span>
                    </div>
                `;
            }

            parseWmoWeatherCode(code) {
                if (code === 0 || code === 1) return { text: "Clear Sky", icon: SVG_ASSETS.WEATHER_SUN };
                if (code === 2) return { text: "Partly Cloudy", icon: SVG_ASSETS.WEATHER_CLOUD };
                if (code === 3) return { text: "Overcast", icon: SVG_ASSETS.WEATHER_CLOUD };
                if (code >= 51 && code <= 67) return { text: "Rain", icon: SVG_ASSETS.WEATHER_RAIN };
                if (code >= 71 && code <= 77) return { text: "Snowfall", icon: SVG_ASSETS.WEATHER_SNOW };
                if (code >= 80 && code <= 82) return { text: "Rain Showers", icon: SVG_ASSETS.WEATHER_RAIN };
                if (code >= 85 && code <= 86) return { text: "Snow Showers", icon: SVG_ASSETS.WEATHER_SNOW };
                if (code >= 95) return { text: "Thunderstorm", icon: SVG_ASSETS.WEATHER_RAIN };
                return { text: "Cloudy", icon: SVG_ASSETS.WEATHER_CLOUD };
            }

            renderSuccessState(data) {
                if (!this.mainRowElement) return;
                
                // Render main dashboard
                this.mainRowElement.innerHTML = `
                    <div class="weather-information-left">
                        <span class="weather-city-label">Spånga</span>
                        <h2 class="weather-temperature-display">${data.current.temp}°</h2>
                        <span class="weather-condition-description">${data.current.text}</span>
                    </div>
                    <div class="weather-graphics-right">
                        <div class="weather-vector-icon">${data.current.icon}</div>
                        <span class="weather-high-low-range">H:${data.current.high}° L:${data.current.low}°</span>
                    </div>
                `;

                // Render Hourly Forecast if container exists
                if (this.hourlyContainerElement && data.hourly && data.hourly.length > 0) {
                    this.hourlyContainerElement.innerHTML = data.hourly.map(hourBlock => `
                        <div class="hourly-item-block">
                            <span class="hourly-item-time">${hourBlock.time}</span>
                            <div class="hourly-item-icon">${hourBlock.icon}</div>
                            <span class="hourly-item-temp">${hourBlock.temp}°</span>
                        </div>
                    `).join('');
                }
            }

            async fetchAndRender() {
                const cachedPayload = sessionStorage.getItem(STORAGE_KEYS.WEATHER_CACHE);
                if (cachedPayload) {
                    try {
                        this.renderSuccessState(JSON.parse(cachedPayload));
                    } catch (e) {
                        this.renderLoadingState(); 
                    }
                } else {
                    this.renderLoadingState();
                }

                try {
                    const rawData = await NetworkService.get(this.apiUrl);
                    
                    if (!rawData || !rawData.current || !rawData.daily || !rawData.hourly) {
                        throw new Error("Invalid data structure from Open-Meteo API.");
                    }

                    // Process Current
                    const currentCondition = this.parseWmoWeatherCode(rawData.current.weather_code);
                    const compiledWeatherData = {
                        current: {
                            temp: Math.round(rawData.current.temperature_2m),
                            text: currentCondition.text,
                            icon: currentCondition.icon,
                            high: Math.round(rawData.daily.temperature_2m_max[0]),
                            low: Math.round(rawData.daily.temperature_2m_min[0])
                        },
                        hourly: []
                    };

                    // Process Hourly (Extract next 24 hours based on current time)
                    const currentHourIso = new Date().toISOString().substring(0, 14) + "00"; // roughly match "YYYY-MM-DDTHH:00"
                    
                    // Find index of current hour in OpenMeteo's time array
                    let startIndex = 0;
                    const nowTime = new Date().getTime();
                    
                    // Simple search for closest hour
                    for (let i = 0; i < rawData.hourly.time.length; i++) {
                        const hourTime = new Date(rawData.hourly.time[i]).getTime();
                        if (hourTime >= nowTime - 1800000) { // within last half hour
                            startIndex = i;
                            break;
                        }
                    }

                    // Map 24 hours of data
                    for (let i = startIndex; i < startIndex + 24 && i < rawData.hourly.time.length; i++) {
                        const dateObj = new Date(rawData.hourly.time[i]);
                        const hoursStr = String(dateObj.getHours()).padStart(2, '0') + ":00";
                        const hCondition = this.parseWmoWeatherCode(rawData.hourly.weather_code[i]);
                        
                        compiledWeatherData.hourly.push({
                            time: i === startIndex ? "Now" : hoursStr,
                            temp: Math.round(rawData.hourly.temperature_2m[i]),
                            icon: hCondition.icon
                        });
                    }

                    this.renderSuccessState(compiledWeatherData);
                    sessionStorage.setItem(STORAGE_KEYS.WEATHER_CACHE, JSON.stringify(compiledWeatherData));

                } catch (error) {
                    let errorMessage = "Data Unavailable";
                    if (error.name === 'AbortError') {
                        errorMessage = "Weather API Timeout";
                    }
                    if (!cachedPayload) {
                        this.renderErrorState(errorMessage);
                    }
                }
            }
        }

        /* ==========================================================================
           NETWORK SERVICE LAYER
           ========================================================================== */

        class NetworkManager {
            constructor() {
                this.defaultTimeoutMs = 15000; // Expanded to 15 seconds for robust resilience
            }
            async get(url) {
                const abortController = new AbortController();
                const timeoutId = setTimeout(() => abortController.abort(), this.defaultTimeoutMs);
                try {
                    const response = await fetch(url, { signal: abortController.signal });
                    clearTimeout(timeoutId);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return await response.json();
                } catch (error) {
                    clearTimeout(timeoutId);
                    throw error;
                }
            }
            async post(url, body) {
                const abortController = new AbortController();
                const timeoutId = setTimeout(() => abortController.abort(), this.defaultTimeoutMs);
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body),
                        signal: abortController.signal
                    });
                    clearTimeout(timeoutId);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return await response.json();
                } catch (error) {
                    clearTimeout(timeoutId);
                    throw error;
                }
            }
        }
        const NetworkService = new NetworkManager();
        
        /* ==========================================================================
           COLOR WHEEL LOGIC (HTML5 CANVAS)
           ========================================================================== */
           
        /**
         * Handles rendering and interaction logic for the HSL Color Wheel on HTML5 Canvas.
         */
        class ColorWheelManager {
            /**
             * Attaches a color wheel to a specific canvas element.
             * @param {string} deviceId - Tuya device identifier.
             * @param {HTMLCanvasElement} canvasElement - The target canvas.
             * @param {HTMLElement} indicatorElement - The circular thumb overlay.
             */
            constructor(deviceId, canvasElement, indicatorElement) {
                this.deviceId = deviceId;
                this.canvas = canvasElement;
                this.indicator = indicatorElement;
                
                // Track interaction state
                this.isDragging = false;
                
                this.bindEvents();
            }

            /**
             * Binds complex multi-touch and mouse tracking events.
             */
            bindEvents() {
                const handleStart = (e) => {
                    this.isDragging = true;
                    this.processInteraction(e);
                    // Prevent scrolling while picking color
                    if(e.cancelable) e.preventDefault(); 
                };

                const handleMove = (e) => {
                    if (!this.isDragging) return;
                    this.processInteraction(e);
                    if(e.cancelable) e.preventDefault();
                };

                const handleEnd = (e) => {
                    if(this.isDragging) {
                        this.isDragging = false;
                        this.dispatchFinalColorCommand();
                    }
                };

                this.canvas.addEventListener('mousedown', handleStart, {passive: false});
                this.canvas.addEventListener('mousemove', handleMove, {passive: false});
                window.addEventListener('mouseup', handleEnd);

                this.canvas.addEventListener('touchstart', handleStart, {passive: false});
                this.canvas.addEventListener('touchmove', handleMove, {passive: false});
                window.addEventListener('touchend', handleEnd);
            }

            /**
             * Converts physical touch coordinates into polar Hue/Saturation metrics.
             * @param {Event} event - Mouse or Touch event.
             */
            processInteraction(event) {
                const rect = this.canvas.getBoundingClientRect();
                
                // Handle both touch and mouse coords
                let clientX = event.clientX;
                let clientY = event.clientY;
                if (event.touches && event.touches.length > 0) {
                    clientX = event.touches[0].clientX;
                    clientY = event.touches[0].clientY;
                }

                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const radius = centerX;

                const xRelativeToCenter = clientX - rect.left - centerX;
                const yRelativeToCenter = clientY - rect.top - centerY;

                // Mathematical angle calculation (Hue)
                let angleRadians = Math.atan2(yRelativeToCenter, xRelativeToCenter);
                let angleDegrees = angleRadians * (180 / Math.PI) + 90; 
                if (angleDegrees < 0) angleDegrees += 360;
                
                // Distance from center (Saturation)
                const distanceFromCenter = Math.sqrt(xRelativeToCenter * xRelativeToCenter + yRelativeToCenter * yRelativeToCenter);
                
                // Clamp saturation to boundaries of circle
                const clampedDistance = Math.min(distanceFromCenter, radius);
                const saturationPercentage = clampedDistance / radius;

                // Update visual thumb placement
                const thumbX = centerX + Math.cos(angleRadians) * clampedDistance;
                const thumbY = centerY + Math.sin(angleRadians) * clampedDistance;
                
                this.indicator.style.left = `${thumbX}px`;
                this.indicator.style.top = `${thumbY}px`;
                this.indicator.style.backgroundColor = `hsl(${angleDegrees}, ${saturationPercentage * 100}%, 50%)`;

                // Update authoritative state locally (Scale: H 0-360, S 0-1000)
                DeviceManager.devicesState[this.deviceId].hue = Math.round(angleDegrees);
                DeviceManager.devicesState[this.deviceId].saturation = Math.round(saturationPercentage * 1000);
            }

            /**
             * Triggers network request after interaction finishes.
             */
            dispatchFinalColorCommand() {
                DeviceManager.executeColorCommand(this.deviceId);
            }
            
            /**
             * Resets the visual indicator to match memory state if modified externally.
             */
            updateIndicatorFromState() {
                const state = DeviceManager.devicesState[this.deviceId];
                if(state.hue === undefined || state.saturation === undefined) return;
                
                const rect = this.canvas.getBoundingClientRect();
                // Avoid calculation if element has zero geometry
                if(rect.width === 0) return; 
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                // Reverse engineering polar coordinates
                const angleRadians = (state.hue - 90) * (Math.PI / 180);
                const distance = (state.saturation / 1000) * centerX;
                
                const thumbX = centerX + Math.cos(angleRadians) * distance;
                const thumbY = centerY + Math.sin(angleRadians) * distance;
                
                this.indicator.style.left = `${thumbX}px`;
                this.indicator.style.top = `${thumbY}px`;
                this.indicator.style.backgroundColor = `hsl(${state.hue}, ${(state.saturation/1000) * 100}%, 50%)`;
            }
        }

        /* ==========================================================================
           STATE & API MANAGEMENT FOR SMART DEVICES
           ========================================================================== */

        class TuyaSmartDeviceManager {
            constructor() {
                this.workerApiUrl = localStorage.getItem(STORAGE_KEYS.WORKER_URL) || '';
                this.devicesState = {};
                
                // Map to store instantiated color wheel controllers
                this.colorWheelControllers = {};
                
                for (let i = 0; i < TUYA_DEVICES.length; i++) {
                    const device = TUYA_DEVICES[i];
                    this.devicesState[device.id] = {
                        on: false,
                        brightness: 100, 
                        hue: 0,
                        saturation: 0
                    };
                }
                this.debounceTimers = {};
            }

            buildEndpointUrl(path) {
                return this.workerApiUrl.replace(/\/$/, '') + path;
            }

            setApiUrl(newUrl) {
                this.workerApiUrl = newUrl.trim();
                localStorage.setItem(STORAGE_KEYS.WORKER_URL, this.workerApiUrl);
            }

            isConfigured() {
                return this.workerApiUrl !== null && this.workerApiUrl !== '';
            }

            async synchronizeAllDevices() {
                if (!this.isConfigured()) return;

                for (let i = 0; i < TUYA_DEVICES.length; i++) {
                    const device = TUYA_DEVICES[i];
                    ApplicationUI.setDeviceConnectingState(device.id, true);
                    try {
                        const url = this.buildEndpointUrl(`/status?device=${device.id}`);
                        const jsonPayload = await NetworkService.get(url);
                        
                        if (jsonPayload.success && jsonPayload.result) {
                            this.parseAndApplyTuyaStatusPayload(device.id, jsonPayload.result);
                        }
                    } catch (error) {
                        console.warn(`TuyaSmartDeviceManager: Synchronization failed for device [${device.name}].`, error);
                    } finally {
                        ApplicationUI.setDeviceConnectingState(device.id, false);
                        ApplicationUI.updateDeviceCardRender(device.id);
                        
                        // Sync color wheel visual if expanded
                        if(this.colorWheelControllers[device.id]) {
                            this.colorWheelControllers[device.id].updateIndicatorFromState();
                        }
                    }
                }
            }

            parseAndApplyTuyaStatusPayload(deviceId, statusArray) {
                const powerInstruction = statusArray.find(instruction => instruction.code === 'switch_led');
                if (powerInstruction !== undefined) {
                    this.devicesState[deviceId].on = powerInstruction.value;
                }
                const colorInstruction = statusArray.find(instruction => instruction.code === 'colour_data_v2' || instruction.code === 'colour_data');
                if (colorInstruction !== undefined) {
                    try {
                        const parsedValueObject = typeof colorInstruction.value === 'string' 
                            ? JSON.parse(colorInstruction.value) 
                            : colorInstruction.value;
                            
                        if (parsedValueObject) {
                            if (parsedValueObject.v !== undefined) {
                                let uiBrightness = Math.round(parsedValueObject.v / 10);
                                this.devicesState[deviceId].brightness = Math.max(1, Math.min(100, uiBrightness));
                            }
                            if (parsedValueObject.h !== undefined) {
                                this.devicesState[deviceId].hue = parsedValueObject.h;
                            }
                            if (parsedValueObject.s !== undefined) {
                                this.devicesState[deviceId].saturation = parsedValueObject.s;
                            }
                        }
                    } catch (parseError) {
                        console.error("TuyaSmartDeviceManager: Failed to parse colour_data JSON.", parseError);
                    }
                }
            }

            async toggleDevicePower(deviceId) {
                if (!this.isConfigured()) {
                    ApplicationUI.openSettingsModal();
                    return;
                }

                const previousState = this.devicesState[deviceId].on;
                this.devicesState[deviceId].on = !previousState;
                ApplicationUI.setDeviceConnectingState(deviceId, true);
                ApplicationUI.updateDeviceCardRender(deviceId);

                try {
                    const url = this.buildEndpointUrl('/command');
                    const body = {
                        device: deviceId,
                        commands: [{ code: 'switch_led', value: this.devicesState[deviceId].on }]
                    };
                    await NetworkService.post(url, body);
                } catch (error) {
                    if (error.name === 'AbortError') {
                        GlobalToast.show("Device Unresponsive (Timeout)");
                    } else {
                        GlobalToast.show("Network Error. Check Connection.");
                    }
                    this.devicesState[deviceId].on = previousState;
                    ApplicationUI.updateDeviceCardRender(deviceId);
                } finally {
                    ApplicationUI.setDeviceConnectingState(deviceId, false);
                }
            }

            handleBrightnessChangeIntent(deviceId, newBrightnessPercentage) {
                if (!this.isConfigured()) return;

                if (this.debounceTimers[deviceId]) {
                    clearTimeout(this.debounceTimers[deviceId]);
                }

                this.debounceTimers[deviceId] = setTimeout(() => {
                    this.executeBrightnessCommand(deviceId, newBrightnessPercentage);
                }, 400);
            }

            async executeBrightnessCommand(deviceId, newBrightnessPercentage) {
                if (this.devicesState[deviceId].on === false) return;

                ApplicationUI.setDeviceConnectingState(deviceId, true);
                const tuyaFormatBrightness = parseInt(newBrightnessPercentage, 10) * 10;

                try {
                    const url = this.buildEndpointUrl('/command');
                    const body = {
                        device: deviceId,
                        commands: [
                            { code: 'work_mode', value: 'colour' },
                            { code: 'colour_data', value: JSON.stringify({ 
                                h: this.devicesState[deviceId].hue || 0, 
                                s: this.devicesState[deviceId].saturation || 0, 
                                v: tuyaFormatBrightness 
                            }) }
                        ]
                    };
                    await NetworkService.post(url, body);
                } catch (error) {
                    if (error.name === 'AbortError') {
                        GlobalToast.show("Device Unresponsive (Timeout)");
                    } else {
                        GlobalToast.show("Network Error. Check Connection.");
                    }
                } finally {
                    ApplicationUI.setDeviceConnectingState(deviceId, false);
                }
            }
            
            /**
             * Transmits isolated color state modifications to Tuya via Cloudflare Worker.
             * @param {string} deviceId - Tuya device identifier.
             */
            async executeColorCommand(deviceId) {
                if (!this.isConfigured()) return;
                
                // Force turn on if adjusting color while off
                if (this.devicesState[deviceId].on === false) {
                    this.devicesState[deviceId].on = true;
                    ApplicationUI.updateDeviceCardRender(deviceId);
                }

                ApplicationUI.setDeviceConnectingState(deviceId, true);

                try {
                    const url = this.buildEndpointUrl('/command');
                    const body = {
                        device: deviceId,
                        commands: [
                            { code: 'work_mode', value: 'colour' },
                            { code: 'colour_data', value: JSON.stringify({ 
                                h: this.devicesState[deviceId].hue, 
                                s: this.devicesState[deviceId].saturation, 
                                v: this.devicesState[deviceId].brightness * 10 
                            }) }
                        ]
                    };
                    await NetworkService.post(url, body);
                } catch (error) {
                    GlobalToast.show("Failed to apply color configuration.");
                } finally {
                    ApplicationUI.setDeviceConnectingState(deviceId, false);
                }
            }
        }

        const DeviceManager = new TuyaSmartDeviceManager();

        /* ==========================================================================
           USER INTERFACE RENDERER
           ========================================================================== */

        /**
         * Orchestrates all DOM manipulation, Event Listening, and View rendering.
         */
        class UserInterfaceController {
            constructor() {
                this.layoutMode = localStorage.getItem(STORAGE_KEYS.LAYOUT_MODE) || 'portrait';
                this.deviceGridContainer = document.getElementById('main-device-grid');
                this.settingsModalBackdrop = document.getElementById('modal-backdrop-settings');
                this.inputWorkerUrl = document.getElementById('input-field-worker-url');
                
                this.handleSettingsSave = this.handleSettingsSave.bind(this);
                this.handleSettingsCancel = this.handleSettingsCancel.bind(this);
            }

            initialize() {
                this.applyLayoutModeToBody();
                this.constructDeviceGrid();
                this.attachStaticEventListeners();
            }

            applyLayoutModeToBody() {
                if (this.layoutMode === 'landscape') {
                    document.body.classList.add('layout-mode-landscape');
                } else {
                    document.body.classList.remove('layout-mode-landscape');
                }

                const btnPortrait = document.getElementById('segment-btn-portrait');
                const btnLandscape = document.getElementById('segment-btn-landscape');
                
                if (btnPortrait && btnLandscape) {
                    if (this.layoutMode === 'portrait') {
                        btnPortrait.classList.add('is-segment-active');
                        btnPortrait.setAttribute('aria-checked', 'true');
                        btnLandscape.classList.remove('is-segment-active');
                        btnLandscape.setAttribute('aria-checked', 'false');
                    } else {
                        btnLandscape.classList.add('is-segment-active');
                        btnLandscape.setAttribute('aria-checked', 'true');
                        btnPortrait.classList.remove('is-segment-active');
                        btnPortrait.setAttribute('aria-checked', 'false');
                    }
                }
            }

            setLayoutMode(mode) {
                if (mode === 'portrait' || mode === 'landscape') {
                    this.layoutMode = mode;
                    this.applyLayoutModeToBody();
                }
            }

            attachStaticEventListeners() {
                document.getElementById('header-btn-refresh').addEventListener('click', () => {
                    if (!DeviceManager.isConfigured()) {
                        this.openSettingsModal();
                        return;
                    }
                    GlobalToast.show("Synchronizing telemetry...");
                    DeviceManager.synchronizeAllDevices();
                });

                document.getElementById('header-btn-settings').addEventListener('click', () => {
                    this.openSettingsModal();
                });

                document.getElementById('segment-btn-portrait').addEventListener('click', () => {
                    this.setLayoutMode('portrait');
                });
                
                document.getElementById('segment-btn-landscape').addEventListener('click', () => {
                    this.setLayoutMode('landscape');
                });

                document.getElementById('modal-btn-save').addEventListener('click', this.handleSettingsSave);
                document.getElementById('modal-btn-cancel').addEventListener('click', this.handleSettingsCancel);
            }
            
            /**
             * Toggles expanding state for the Weather widget.
             */
            toggleWeatherExpansion() {
                const widget = document.getElementById('weather-dashboard-widget');
                if(widget) {
                    widget.classList.toggle('is-expanded');
                }
            }

            constructDeviceGrid() {
                while (this.deviceGridContainer.firstChild) {
                    this.deviceGridContainer.removeChild(this.deviceGridContainer.firstChild);
                }

                for (let i = 0; i < TUYA_DEVICES.length; i++) {
                    const deviceData = TUYA_DEVICES[i];
                    const currentState = DeviceManager.devicesState[deviceData.id];
                    const activeClassString = currentState.on ? 'state-is-on' : '';

                    const cardElement = document.createElement('article');
                    cardElement.className = `smart-device-card ${activeClassString}`;
                    cardElement.id = `device-card-wrapper-${deviceData.id}`;
                    cardElement.setAttribute('aria-label', `Control for ${deviceData.name}`);

                    cardElement.innerHTML = `
                        <div class="card-base-content">
                            <div class="device-card-header-row">
                                <div class="device-toggle-icon-container" 
                                     id="toggle-btn-${deviceData.id}"
                                     role="button" 
                                     aria-pressed="${currentState.on ? 'true' : 'false'}" 
                                     aria-label="Toggle Power for ${deviceData.name}">
                                    ${SVG_ASSETS.LIGHTBULB}
                                </div>
                            </div>
                            
                            <div class="device-text-information-block">
                                <div class="device-display-name">${deviceData.name}</div>
                                <div class="device-current-status-label" id="status-label-${deviceData.id}">
                                    ${currentState.on ? currentState.brightness + '%' : 'Off'}
                                </div>
                            </div>

                            <div class="device-brightness-slider-container">
                                <div class="brightness-slider-visual-fill" 
                                     id="slider-fill-layer-${deviceData.id}" 
                                     style="--current-fill-percentage: ${currentState.brightness}%">
                                </div>
                                <input type="range" 
                                       class="brightness-native-range-input" 
                                       id="native-slider-input-${deviceData.id}"
                                       min="1" 
                                       max="100" 
                                       step="1" 
                                       value="${currentState.brightness}"
                                       aria-label="Brightness Control for ${deviceData.name}"
                                       aria-valuemin="1"
                                       aria-valuemax="100"
                                       aria-valuenow="${currentState.brightness}"
                                       aria-valuetext="${currentState.brightness} percent"
                                       ${currentState.on ? '' : 'disabled'}>
                            </div>
                        </div>
                        
                        <div class="color-picker-expansion-area" id="expansion-area-${deviceData.id}">
                            <div class="color-wheel-canvas-container" id="wheel-container-${deviceData.id}">
                                <canvas class="color-wheel-canvas" id="canvas-${deviceData.id}" width="200" height="200" style="position: absolute; top:0; left:0; width:100%; height:100%; border-radius:50%;"></canvas>
                                <div class="color-wheel-indicator" id="color-thumb-${deviceData.id}"></div>
                            </div>
                        </div>
                    `;

                    this.deviceGridContainer.appendChild(cardElement);
                    this.attachDynamicCardListeners(deviceData.id);
                    
                    // Initialize Color Wheel Controller for this specific instance
                    const canvasEl = document.getElementById(`canvas-${deviceData.id}`);
                    const indicatorEl = document.getElementById(`color-thumb-${deviceData.id}`);
                    DeviceManager.colorWheelControllers[deviceData.id] = new ColorWheelManager(deviceData.id, canvasEl, indicatorEl);
                }
            }

            attachDynamicCardListeners(deviceId) {
                const cardWrapper = document.getElementById(`device-card-wrapper-${deviceId}`);
                const toggleButton = document.getElementById(`toggle-btn-${deviceId}`);
                const sliderInput = document.getElementById(`native-slider-input-${deviceId}`);
                const expansionArea = document.getElementById(`expansion-area-${deviceId}`);

                // Main card tap to expand
                if (cardWrapper) {
                    cardWrapper.addEventListener('click', (event) => {
                        // Prevent expansion if clicking specific controls
                        if (event.target === toggleButton || toggleButton.contains(event.target) || event.target === sliderInput || expansionArea.contains(event.target)) {
                            return;
                        }
                        cardWrapper.classList.toggle('is-expanded');
                        // Force a redraw of indicator to ensure it's placed correctly if opened for first time
                        if(cardWrapper.classList.contains('is-expanded') && DeviceManager.colorWheelControllers[deviceId]) {
                            setTimeout(() => {
                                DeviceManager.colorWheelControllers[deviceId].updateIndicatorFromState();
                            }, 50); // slight delay to allow CSS grid expansion to compute
                        }
                    });
                }

                if (toggleButton) {
                    toggleButton.addEventListener('click', (event) => {
                        event.stopPropagation(); // prevent card expand
                        DeviceManager.toggleDevicePower(deviceId);
                    });
                }

                if (sliderInput) {
                    sliderInput.addEventListener('mousedown', (e) => e.stopPropagation());
                    sliderInput.addEventListener('touchstart', (e) => e.stopPropagation(), {passive: true});
                    
                    sliderInput.addEventListener('input', (event) => {
                        event.stopPropagation();
                        const newBrightnessValue = event.target.value;
                        this.handleHighFrequencySliderDrag(deviceId, newBrightnessValue);
                    });

                    sliderInput.addEventListener('change', (event) => {
                        event.stopPropagation();
                        const finalBrightnessValue = event.target.value;
                        DeviceManager.handleBrightnessChangeIntent(deviceId, finalBrightnessValue);
                    });
                }
            }

            handleHighFrequencySliderDrag(deviceId, rawValue) {
                const integerValue = parseInt(rawValue, 10);
                
                // Crucial Flash Fix: Turn on device *immediately* upon touch logic initiation
                if (DeviceManager.devicesState[deviceId].on === false) {
                    DeviceManager.devicesState[deviceId].on = true;
                    this.updateDeviceCardRender(deviceId);
                }

                DeviceManager.devicesState[deviceId].brightness = integerValue;
                
                const fillLayer = document.getElementById(`slider-fill-layer-${deviceId}`);
                const statusLabel = document.getElementById(`status-label-${deviceId}`);
                const nativeSlider = document.getElementById(`native-slider-input-${deviceId}`);
                
                if (fillLayer) fillLayer.style.setProperty('--current-fill-percentage', `${integerValue}%`);

                if (DeviceManager.devicesState[deviceId].on && statusLabel && nativeSlider) {
                    statusLabel.innerText = `${integerValue}%`;
                    nativeSlider.setAttribute('aria-valuenow', integerValue);
                    nativeSlider.setAttribute('aria-valuetext', `${integerValue} percent`);
                }
            }

            updateDeviceCardRender(deviceId) {
                const state = DeviceManager.devicesState[deviceId];
                const cardWrapper = document.getElementById(`device-card-wrapper-${deviceId}`);
                const statusLabel = document.getElementById(`status-label-${deviceId}`);
                const fillLayer = document.getElementById(`slider-fill-layer-${deviceId}`);
                const nativeSlider = document.getElementById(`native-slider-input-${deviceId}`);
                const toggleBtn = document.getElementById(`toggle-btn-${deviceId}`);

                if (!cardWrapper || !statusLabel || !fillLayer || !nativeSlider || !toggleBtn) return;

                if (state.on === true) {
                    cardWrapper.classList.add('state-is-on');
                    statusLabel.innerText = `${state.brightness}%`;
                    toggleBtn.setAttribute('aria-pressed', 'true');
                    nativeSlider.disabled = false;
                } else {
                    cardWrapper.classList.remove('state-is-on');
                    statusLabel.innerText = 'Off';
                    toggleBtn.setAttribute('aria-pressed', 'false');
                    nativeSlider.disabled = true;
                }

                nativeSlider.value = state.brightness;
                nativeSlider.setAttribute('aria-valuenow', state.brightness);
                nativeSlider.setAttribute('aria-valuetext', `${state.brightness} percent`);
                fillLayer.style.setProperty('--current-fill-percentage', `${state.brightness}%`);
            }
            
            setDeviceConnectingState(deviceId, isConnecting) {
                const cardWrapper = document.getElementById(`device-card-wrapper-${deviceId}`);
                if (cardWrapper) {
                    if (isConnecting) cardWrapper.classList.add('is-connecting');
                    else cardWrapper.classList.remove('is-connecting');
                }
            }

            openSettingsModal() {
                this.setLayoutMode(localStorage.getItem(STORAGE_KEYS.LAYOUT_MODE) || 'portrait');
                if (this.inputWorkerUrl) this.inputWorkerUrl.value = DeviceManager.workerApiUrl;
                if (this.settingsModalBackdrop) {
                    this.settingsModalBackdrop.classList.add('is-visible-active');
                    this.settingsModalBackdrop.setAttribute('aria-hidden', 'false');
                }
            }

            handleSettingsCancel() {
                const memoryLayout = localStorage.getItem(STORAGE_KEYS.LAYOUT_MODE) || 'portrait';
                this.setLayoutMode(memoryLayout);
                if (this.settingsModalBackdrop) {
                    this.settingsModalBackdrop.classList.remove('is-visible-active');
                    this.settingsModalBackdrop.setAttribute('aria-hidden', 'true');
                }
            }

            handleSettingsSave() {
                if (!this.inputWorkerUrl) return;
                const inputString = this.inputWorkerUrl.value.trim();
                if (inputString === '') return GlobalToast.show("Error: Web URL cannot be empty.");
                
                DeviceManager.setApiUrl(inputString);
                localStorage.setItem(STORAGE_KEYS.LAYOUT_MODE, this.layoutMode);
                this.applyLayoutModeToBody();

                if (this.settingsModalBackdrop) {
                    this.settingsModalBackdrop.classList.remove('is-visible-active');
                    this.settingsModalBackdrop.setAttribute('aria-hidden', 'true');
                }

                GlobalToast.show("Configuration saved. Connecting...");
                DeviceManager.synchronizeAllDevices();
            }
        }

        const ApplicationUI = new UserInterfaceController();

        /* ==========================================================================
           BOOTSTRAPPING & LIFECYCLE MANAGEMENT
           ========================================================================== */
        
        document.addEventListener('DOMContentLoaded', () => {
            ApplicationUI.initialize();

            const WeatherAPI = new WeatherService();
            WeatherAPI.fetchAndRender();

            if (!DeviceManager.isConfigured()) {
                setTimeout(() => ApplicationUI.openSettingsModal(), 600);
            } else {
                DeviceManager.synchronizeAllDevices();
            }
        });

    </script>
</body>
</html>
