<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Smart Home</title>
  <style>
    /* ==========================================================================
       APPLE HOMEKIT PREMIUM THEME (DARK MODE)
       ========================================================================== */
    :root {
      --bg: #000000;
      
      /* Glassmorphism palettes */
      --glass-base: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-hover: rgba(255, 255, 255, 0.15);
      
      /* Active states (Device ON) - Softened & Warmed */
      --card-on-bg: #EBEBF0; 
      --card-on-text: #000000;
      --icon-on-bg: #FFB340; /* Warm, incandescent amber glow */
      --icon-on-color: #FFFFFF;
      --icon-on-shadow: rgba(255, 179, 64, 0.4);
      --slider-on-track: rgba(0, 0, 0, 0.08);
      --slider-on-fill: #000000;

      /* Inactive states (Device OFF) */
      --card-off-text: #FFFFFF;
      --card-off-sub: rgba(255, 255, 255, 0.55);
      --icon-off-bg: rgba(255, 255, 255, 0.15);
      --icon-off-color: rgba(255, 255, 255, 0.8);
      --slider-off-track: rgba(255, 255, 255, 0.05);
      --slider-off-fill: rgba(255, 255, 255, 0.9);

      /* Typography & Physics */
      --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      --spring: cubic-bezier(0.32, 0.72, 0, 1);
      --ease-out: cubic-bezier(0.25, 1, 0.5, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      touch-action: pan-y; 
    }

    body {
      background-color: var(--bg);
      color: var(--card-off-text);
      font-family: var(--font-family);
      max-width: 768px; /* Default Portrait */
      margin: 0 auto;
      min-height: 100vh;
      padding: calc(env(safe-area-inset-top, 40px) + 20px) 24px 40px 24px;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      transition: max-width 0.4s var(--ease-out);
    }

    /* Landscape Mode Modifier */
    body.landscape-mode {
      max-width: 1024px;
    }

    /* FIX: Allow inputs to be typed in on iPad */
    input {
      user-select: text !important;
      -webkit-user-select: text !important;
      -webkit-touch-callout: default !important; 
    }

    /* ==========================================================================
       HEADER & NAVIGATION
       ========================================================================== */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding: 0 8px;
    }

    h1 {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .header-controls {
      display: flex;
      gap: 16px;
    }

    .icon-button {
      width: 36px;
      height: 36px;
      border-radius: 18px;
      background: var(--glass-base);
      border: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      transition: transform 0.4s var(--spring), background 0.2s;
    }

    .icon-button:active {
      transform: scale(0.85);
      background: var(--glass-hover);
    }

    /* ==========================================================================
       WEATHER WIDGET
       ========================================================================== */
    .weather-widget {
      background: var(--glass-base);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(40px) saturate(1.5);
      -webkit-backdrop-filter: blur(40px) saturate(1.5);
      border-radius: 28px;
      padding: 24px 28px;
      margin-bottom: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
      transition: transform 0.4s var(--spring);
    }

    .weather-widget:active { transform: scale(0.97); }

    .weather-left { display: flex; flex-direction: column; gap: 4px; }
    .weather-location { font-size: 14px; font-weight: 600; color: var(--card-off-sub); text-transform: uppercase; letter-spacing: 0.05em; }
    .weather-temp { font-size: 48px; font-weight: 200; letter-spacing: -0.04em; line-height: 1; margin: 4px 0; }
    .weather-desc { font-size: 15px; font-weight: 500; color: var(--card-off-sub); }
    .weather-right { display: flex; flex-direction: column; align-items: flex-end; gap: 12px; }
    .weather-icon svg { width: 56px; height: 56px; filter: drop-shadow(0 4px 12px rgba(255,255,255,0.15)); }
    .weather-hilow { font-size: 14px; font-weight: 600; color: var(--card-off-sub); }

    /* ==========================================================================
       DEVICES GRID
       ========================================================================== */
    .section-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 16px;
      padding: 0 8px;
      letter-spacing: -0.02em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      transition: grid-template-columns 0.4s var(--ease-out);
    }

    body.landscape-mode .grid {
      grid-template-columns: repeat(3, 1fr);
    }

    .device-card {
      background: var(--glass-base);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(30px) saturate(1.5);
      -webkit-backdrop-filter: blur(30px) saturate(1.5);
      border-radius: 28px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 180px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
      transition: background 0.4s var(--ease-out), color 0.4s var(--ease-out), transform 0.4s var(--spring);
    }

    .device-card.is-on {
      background: var(--card-on-bg);
      color: var(--card-on-text);
      box-shadow: 0 12px 30px rgba(255, 255, 255, 0.08), inset 0 1px 0 rgba(255,255,255,0.8);
      border-color: transparent;
    }

    .device-card:active { transform: scale(0.95); }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; }

    .device-icon {
      width: 44px; height: 44px; border-radius: 22px;
      background: var(--icon-off-bg); color: var(--icon-off-color);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.4s var(--ease-out); cursor: pointer;
    }
    .device-icon:active { transform: scale(0.85); }
    .device-card.is-on .device-icon {
      background: var(--icon-on-bg); color: var(--icon-on-color);
      box-shadow: 0 4px 18px var(--icon-on-shadow);
    }
    .device-icon svg { width: 24px; height: 24px; }

    .card-info {
      display: flex; flex-direction: column; pointer-events: none;
      margin-top: auto; margin-bottom: 16px;
    }
    .device-name { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .device-status { font-size: 14px; font-weight: 500; color: var(--card-off-sub); margin-top: 2px; transition: color 0.4s var(--ease-out); }
    .device-card.is-on .device-status { color: rgba(0, 0, 0, 0.5); }

    /* ==========================================================================
       SLIDER ENGINE (Fixed iOS Safari curve/shadow rendering bugs)
       ========================================================================== */
    .slider-container {
      width: 100%;
      height: 36px;
      border-radius: 18px;
      background: var(--slider-off-track);
      position: relative;
      overflow: hidden;
      /* Crucial: Forces hardware acceleration and perfect clipping, removing phantom iOS shadows */
      -webkit-mask-image: -webkit-radial-gradient(white, black);
      transform: translateZ(0);
      transition: background 0.4s var(--ease-out);
    }

    .device-card.is-on .slider-container {
      background: var(--slider-on-track);
    }

    .slider-fill {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      background: var(--slider-off-fill);
      /* Do not add border-radius here to avoid internal curve overlap */
      pointer-events: none;
      z-index: 1;
      width: var(--fill-pct, 0%);
      transition: background 0.4s var(--ease-out);
    }

    .device-card.is-on .slider-fill {
      background: var(--slider-on-fill);
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%; height: 100%;
      background: transparent;
      outline: none; border: none; box-shadow: none;
      margin: 0; position: absolute; top: 0; left: 0; z-index: 2;
    }

    /* Kills all default iOS slider track/thumb visuals to ensure perfectly flat UI */
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 36px; height: 36px;
      background: transparent; border: none; box-shadow: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-runnable-track {
      background: transparent; border: none; box-shadow: none;
    }

    /* ==========================================================================
       MODALS & OVERLAYS
       ========================================================================== */
    .modal-backdrop {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.4s var(--ease-out); z-index: 1000;
    }
    .modal-backdrop.active { opacity: 1; pointer-events: auto; }

    .modal-sheet {
      background: rgba(30, 30, 30, 0.85);
      backdrop-filter: blur(40px) saturate(2); -webkit-backdrop-filter: blur(40px) saturate(2);
      border: 1px solid rgba(255,255,255,0.1);
      width: 360px; border-radius: 32px; padding: 32px 24px;
      transform: translateY(40px) scale(0.95); transition: transform 0.5s var(--spring);
      text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-backdrop.active .modal-sheet { transform: translateY(0) scale(1); }

    .modal-sheet h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .modal-sheet p { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 24px; line-height: 1.4; }

    .modal-input {
      width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white;
      padding: 16px; border-radius: 16px; font-size: 16px; margin-bottom: 16px; outline: none; transition: border 0.2s;
    }
    .modal-input:focus { border-color: rgba(255,255,255,0.3); }

    /* iOS Segmented Control for Layout Selection */
    .segment-control {
      display: flex;
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      padding: 3px;
      margin-bottom: 24px;
    }
    .segment-btn {
      flex: 1;
      padding: 10px 0;
      border-radius: 10px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .segment-btn.active {
      background: rgba(255,255,255,0.2);
      color: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .btn-primary {
      background: #FFFFFF; color: #000000; width: 100%; padding: 16px; border-radius: 16px;
      font-size: 16px; font-weight: 600; border: none; cursor: pointer; margin-bottom: 12px; transition: transform 0.2s, opacity 0.2s;
    }
    .btn-primary:active { transform: scale(0.96); opacity: 0.8; }
    .btn-secondary { background: transparent; color: rgba(255,255,255,0.6); width: 100%; padding: 16px; font-size: 16px; font-weight: 600; border: none; cursor: pointer; }

    /* Toast Notification */
    .toast {
      position: fixed; bottom: 40px; left: 50%;
      transform: translateX(-50%) translateY(20px) scale(0.95);
      background: rgba(40, 40, 40, 0.9);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1); color: white;
      padding: 14px 28px; border-radius: 30px; font-size: 15px; font-weight: 600;
      opacity: 0; pointer-events: none; transition: all 0.4s var(--spring);
      z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>My Home</h1>
    <div class="header-controls">
      <div class="icon-button" onclick="initSync()" title="Refresh">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.92-10.26l5.08 5.08"/></svg>
      </div>
      <div class="icon-button" onclick="openSetup()" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </div>
    </div>
  </header>

  <!-- WEATHER WIDGET -->
  <div class="weather-widget" id="weather-box" style="display: none;">
    <div class="weather-left">
      <span class="weather-location" id="w-city">Stockholm</span>
      <h2 class="weather-temp" id="w-temp">--°</h2>
      <span class="weather-desc" id="w-desc">Loading...</span>
    </div>
    <div class="weather-right">
      <div class="weather-icon" id="w-icon"></div>
      <span class="weather-hilow" id="w-hilow">H:--° L:--°</span>
    </div>
  </div>

  <h2 class="section-title">Rooms</h2>

  <!-- TUYA GRID -->
  <main class="grid" id="home-grid"></main>

  <!-- SETUP MODAL -->
  <div class="modal-backdrop" id="setup-modal">
    <div class="modal-sheet">
      <h2>Settings</h2>
      
      <div class="segment-control">
        <button class="segment-btn active" id="btn-portrait" onclick="selectLayout('portrait')">Portrait</button>
        <button class="segment-btn" id="btn-landscape" onclick="selectLayout('landscape')">Landscape</button>
      </div>

      <input type="url" class="modal-input" id="worker-url" placeholder="Cloudflare Worker URL" autocomplete="off" spellcheck="false">
      
      <button class="btn-primary" onclick="saveSetup()">Save & Close</button>
      <button class="btn-secondary" onclick="closeSetup()">Cancel</button>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    /* ==========================================================================
       DATA STRUCTURES & STATE
       ========================================================================== */
    const TUYA_DEVICES = [
      { id: 'bf8b0e945d8c5f9861fjzy', name: 'Led Lights Tak' },
      { id: 'bf1cf6aca13749cf898g3p', name: 'Led Lights Skrivbord' }
    ];
    
    let workerApi = localStorage.getItem('premium_home_worker_url') || '';
    let currentLayout = localStorage.getItem('premium_home_layout') || 'portrait';
    let devicesState = {};

    // Apply Layout
    function applyLayout() {
      if (currentLayout === 'landscape') {
        document.body.classList.add('landscape-mode');
      } else {
        document.body.classList.remove('landscape-mode');
      }
      document.getElementById('btn-portrait').classList.toggle('active', currentLayout === 'portrait');
      document.getElementById('btn-landscape').classList.toggle('active', currentLayout === 'landscape');
    }

    function selectLayout(mode) {
      currentLayout = mode;
      applyLayout();
    }

    /* ==========================================================================
       WEATHER ENGINE
       ========================================================================== */
    const WEATHER_ICONS = {
      sun: `<svg viewBox="0 0 24 24" fill="none" stroke="#FFB340" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`,
      cloud: `<svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>`,
      rain: `<svg viewBox="0 0 24 24" fill="none" stroke="#0A84FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.4 14.5a6 6 0 1 0-10.8-2.5A5.5 5.5 0 1 0 7.5 22h9a5 5 0 1 0-.1-10Z"/><path d="M12 22v-4"/><path d="M8 22v-4"/><path d="M16 22v-4"/></svg>`,
      snow: `<svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/><path d="M8 23v-2"/><path d="M12 23v-2"/><path d="M16 23v-2"/></svg>`
    };

    function getWeatherCode(code) {
      if (code === 0 || code === 1) return { text: "Mostly Clear", icon: WEATHER_ICONS.sun };
      if (code <= 3) return { text: "Cloudy", icon: WEATHER_ICONS.cloud };
      if (code >= 51 && code <= 67) return { text: "Rain", icon: WEATHER_ICONS.rain };
      if (code >= 71 && code <= 86) return { text: "Snow", icon: WEATHER_ICONS.snow };
      if (code >= 95) return { text: "Thunderstorm", icon: WEATHER_ICONS.rain };
      return { text: "Cloudy", icon: WEATHER_ICONS.cloud };
    }

    async function fetchWeather() {
      try {
        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=59.3293&longitude=18.0686&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min&timezone=auto');
        const data = await res.json();
        
        const temp = Math.round(data.current.temperature_2m);
        const wInfo = getWeatherCode(data.current.weather_code);
        const high = Math.round(data.daily.temperature_2m_max[0]);
        const low = Math.round(data.daily.temperature_2m_min[0]);

        document.getElementById('w-temp').innerText = `${temp}°`;
        document.getElementById('w-desc').innerText = wInfo.text;
        document.getElementById('w-icon').innerHTML = wInfo.icon;
        document.getElementById('w-hilow').innerText = `H:${high}° L:${low}°`;
        document.getElementById('weather-box').style.display = 'flex';
      } catch (e) { console.warn("Weather load skipped"); }
    }

    /* ==========================================================================
       UI RENDERING (TUYA)
       ========================================================================== */
    function renderGrid() {
      const grid = document.getElementById('home-grid');
      grid.innerHTML = '';

      TUYA_DEVICES.forEach(device => {
        if (!devicesState[device.id]) devicesState[device.id] = { on: false, brightness: 100 };
        const state = devicesState[device.id];

        const card = document.createElement('div');
        card.className = `device-card ${state.on ? 'is-on' : ''}`;
        card.id = `card-${device.id}`;
        
        const lightbulbSVG = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7zm2.85 11.1l-.85.6V16h-4v-2.3l-.85-.6A4.997 4.997 0 0 1 7 9c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.63-.8 3.16-2.15 4.1z"/><path d="M14 20h-4c-.55 0-1 .45-1 1s.45 1 1 1h4c.55 0 1-.45 1-1s-.45-1-1-1z"/></svg>`;

        card.innerHTML = `
          <div class="card-top">
            <div class="device-icon" onclick="toggleLight('${device.id}')">
              ${lightbulbSVG}
            </div>
          </div>
          
          <div class="card-info">
            <div class="device-name">${device.name}</div>
            <div class="device-status" id="status-${device.id}">
              ${state.on ? state.brightness + '%' : 'Off'}
            </div>
          </div>

          <div class="slider-container">
            <div class="slider-fill" id="fill-${device.id}" style="--fill-pct: ${state.brightness}%"></div>
            <input type="range" 
                   min="1" max="100" step="1" 
                   value="${state.brightness}"
                   oninput="handleUIUpdate('${device.id}', this.value)"
                   onchange="debouncedApiCall('${device.id}', this.value)">
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function handleUIUpdate(deviceId, value) {
      devicesState[deviceId].brightness = parseInt(value, 10);
      document.getElementById(`fill-${deviceId}`).style.setProperty('--fill-pct', value + '%');
      if (devicesState[deviceId].on) document.getElementById(`status-${deviceId}`).innerText = value + '%';
    }

    function applyStateToCard(deviceId) {
      const state = devicesState[deviceId];
      const card = document.getElementById(`card-${deviceId}`);
      const statusText = document.getElementById(`status-${deviceId}`);
      
      if (state.on) {
        card.classList.add('is-on');
        statusText.innerText = state.brightness + '%';
      } else {
        card.classList.remove('is-on');
        statusText.innerText = 'Off';
      }
      card.querySelector('input[type=range]').value = state.brightness;
      document.getElementById(`fill-${deviceId}`).style.setProperty('--fill-pct', state.brightness + '%');
    }

    /* ==========================================================================
       TUYA CLOUDFLARE API ENGINE
       ========================================================================== */
    const getUrl = (path) => workerApi.replace(/\/$/, '') + path;

    async function fetchAllStatuses() {
      if (!workerApi) return;
      for (const device of TUYA_DEVICES) {
        try {
          const res = await fetch(getUrl(`/status?device=${device.id}`));
          const json = await res.json();
          if (json.success && json.result) {
            const power = json.result.find(r => r.code === 'switch_led');
            if (power) devicesState[device.id].on = power.value;
            const color = json.result.find(r => r.code === 'colour_data_v2' || r.code === 'colour_data');
            if (color) {
              const val = typeof color.value === 'string' ? JSON.parse(color.value) : color.value;
              if (val && val.v !== undefined) devicesState[device.id].brightness = Math.max(1, Math.round(val.v / 10));
            }
          }
        } catch (error) {}
        applyStateToCard(device.id);
      }
    }

    async function toggleLight(deviceId) {
      if (!workerApi) return openSetup();
      devicesState[deviceId].on = !devicesState[deviceId].on;
      applyStateToCard(deviceId);
      try {
        await fetch(getUrl('/command'), {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ device: deviceId, commands: [{ code: 'switch_led', value: devicesState[deviceId].on }]})
        });
      } catch (error) {
        devicesState[deviceId].on = !devicesState[deviceId].on; 
        applyStateToCard(deviceId);
      }
    }

    let debounceTimers = {};
    function debouncedApiCall(deviceId, value) {
      clearTimeout(debounceTimers[deviceId]);
      debounceTimers[deviceId] = setTimeout(() => sendBrightnessCommand(deviceId, value), 300);
    }

    async function sendBrightnessCommand(deviceId, value) {
      if (!workerApi) return;
      if (!devicesState[deviceId].on) {
        devicesState[deviceId].on = true;
        applyStateToCard(deviceId);
      }
      try {
        await fetch(getUrl('/command'), {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ device: deviceId, commands: [
            { code: 'work_mode', value: 'colour' },
            { code: 'colour_data', value: JSON.stringify({ h: 0, s: 0, v: parseInt(value, 10) * 10 }) }
          ]})
        });
      } catch (error) {}
    }

    /* ==========================================================================
       SETUP MODAL & UTILS
       ========================================================================== */
    function openSetup() {
      applyLayout(); // Ensure UI matches state when opened
      document.getElementById('worker-url').value = workerApi;
      document.getElementById('setup-modal').classList.add('active');
    }

    function closeSetup() {
      // Revert layout preview if cancelled
      currentLayout = localStorage.getItem('premium_home_layout') || 'portrait';
      applyLayout();
      document.getElementById('setup-modal').classList.remove('active');
    }

    function saveSetup() {
      workerApi = document.getElementById('worker-url').value.trim();
      localStorage.setItem('premium_home_worker_url', workerApi);
      localStorage.setItem('premium_home_layout', currentLayout);
      applyLayout();
      document.getElementById('setup-modal').classList.remove('active');
      fetchAllStatuses();
    }

    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
    }

    function initSync() {
      if (!workerApi) return openSetup();
      showToast("Syncing devices...");
      fetchAllStatuses();
    }

    /* ==========================================================================
       BOOT SEQUENCE
       ========================================================================== */
    applyLayout();
    renderGrid();
    fetchWeather(); 
    
    if (!workerApi) setTimeout(openSetup, 600); 
    else fetchAllStatuses();
  </script>
</body>
</html>
