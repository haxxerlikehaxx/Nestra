<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Nestra: Ultimate Premium Apple HomeKit Style Smart Home Controller for iPad Air 2">
    
    <!-- Application Identity & iOS Home Screen Iconography -->
    <title>Nestra</title>
    <link rel="icon" href="/home/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/home/apple-touch-icon.png">

    <style>
        /* ==========================================================================
           CUSTOM TYPOGRAPHY INTEGRATION (ENTERPRISE GRADE)
           ========================================================================== */

        @font-face {
            font-family: 'SF Pro Light Custom';
            src: url('./SFProLight.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'SF Pro Regular Custom';
            src: url('./SFProRegular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'SF Pro Medium Custom';
            src: url('./SFProMedium.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'SF Pro Semibold Soft Custom';
            src: url('./SF%20Pro%20-%20Semibold%20Soft.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'SF Pro Bold Custom';
            src: url('./SF-Pro-Display-Bold.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* ==========================================================================
           GLOBAL DESIGN TOKENS & VARIABLES
           ========================================================================== */
        :root {
            /* Core Backgrounds */
            --application-background-color: #000000;
            
            /* Glassmorphism System */
            --glass-background-base: rgba(255, 255, 255, 0.08);
            --glass-border-color: rgba(255, 255, 255, 0.12);
            --glass-background-hover: rgba(255, 255, 255, 0.15);
            --glass-backdrop-filter-blur: blur(45px);
            --glass-backdrop-filter-saturate: saturate(180%);
            
            /* Active Device States (ON) */
            --card-active-background-color: #FFFFFF; 
            --card-active-text-color: #000000;
            --card-active-subtitle-color: rgba(0, 0, 0, 0.50);
            --icon-active-background-color: #FFCC00; 
            --icon-active-foreground-color: #FFFFFF;
            --icon-active-box-shadow: 0px 6px 16px rgba(255, 204, 0, 0.35);
            
            /* Premium Slider */
            --slider-active-track-color: #F2F2F7; 
            --slider-active-fill-color: #D1D1D6; 
            --slider-active-fill-shadow: inset 0px 1px 1px rgba(255, 255, 255, 0.8), 0px 1px 4px rgba(0, 0, 0, 0.06);

            /* Inactive Device States (OFF) */
            --card-inactive-text-color: #FFFFFF;
            --card-inactive-subtitle-color: rgba(255, 255, 255, 0.55);
            --icon-inactive-background-color: rgba(255, 255, 255, 0.12);
            --icon-inactive-foreground-color: rgba(255, 255, 255, 0.60);
            --slider-inactive-track-color: rgba(0, 0, 0, 0.25);
            --slider-inactive-fill-color: rgba(255, 255, 255, 0.20);
            --slider-inactive-fill-shadow: none;

            /* Link & Success States */
            --link-active-background-color: #0A84FF; 
            --link-active-foreground-color: #FFFFFF;
            --link-active-box-shadow: 0px 4px 16px rgba(10, 132, 255, 0.4);
            --success-color: #32D74B;
            --danger-color: #FF453A;

            /* Typography Pointers */
            --font-light: 'SF Pro Light Custom', -apple-system, sans-serif;
            --font-regular: 'SF Pro Regular Custom', -apple-system, sans-serif;
            --font-medium: 'SF Pro Medium Custom', -apple-system, sans-serif;
            --font-semibold-soft: 'SF Pro Semibold Soft Custom', -apple-system, sans-serif;
            --font-bold: 'SF Pro Bold Custom', -apple-system, sans-serif;
            
            /* Physics & Animation Curves */
            --animation-smooth-curve: cubic-bezier(0.25, 0.1, 0.25, 1.0); 
            --animation-bouncy-curve: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --animation-duration-fast: 0.25s;
            --animation-duration-medium: 0.45s;
            --animation-duration-slow: 0.65s;

            /* Layout Constraints */
            --layout-max-width-portrait: 768px;
            --layout-max-width-landscape: 1024px;
            --layout-padding-horizontal-portrait: 32px;
            --layout-padding-horizontal-landscape: 48px;
            --layout-padding-vertical-bottom: 40px;
            
            /* Card Height Mathematics */
            --card-base-height: 200px;
            --grid-gap-portrait: 24px;
            --card-expanded-height-portrait: 424px; 
            --grid-gap-landscape: 32px;
            --card-expanded-height-landscape: 432px; 
        }

        /* ==========================================================================
           CSS RESET & NORMALIZATION
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-family: var(--font-regular);
            -webkit-text-size-adjust: 100%; text-size-adjust: 100%;
        }

        body {
            background-color: var(--application-background-color);
            color: var(--card-inactive-text-color);
            margin-left: auto; margin-right: auto;
            min-height: 100vh;
            padding-top: calc(env(safe-area-inset-top, 40px) + 24px);
            padding-right: var(--layout-padding-horizontal-portrait);
            padding-bottom: var(--layout-padding-vertical-bottom);
            padding-left: var(--layout-padding-horizontal-portrait);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
            user-select: none; -webkit-user-select: none;
            touch-action: pan-y;
            max-width: var(--layout-max-width-portrait);
            
            transition: max-width var(--animation-duration-medium) var(--animation-smooth-curve), 
                        padding var(--animation-duration-medium) var(--animation-smooth-curve);
        }

        body.layout-mode-landscape {
            max-width: var(--layout-max-width-landscape);
            padding-right: var(--layout-padding-horizontal-landscape);
            padding-left: var(--layout-padding-horizontal-landscape);
        }

        input, textarea, select {
            user-select: text !important;
            -webkit-user-select: text !important;
            -webkit-touch-callout: default !important;
            font-family: inherit;
        }

        /* ==========================================================================
           HARDWARE ACCELERATED ANIMATION KEYFRAMES
           ========================================================================== */
        
        @keyframes elegant-fade-slide-up {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0px); }
        }

        @keyframes checkmark-pop-animation {
            0% { transform: scale(0.6); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes subtle-pulse-glow {
            0% { box-shadow: 0px 4px 12px rgba(50, 215, 75, 0.2); }
            50% { box-shadow: 0px 4px 24px rgba(50, 215, 75, 0.6); }
            100% { box-shadow: 0px 4px 12px rgba(50, 215, 75, 0.2); }
        }

        @keyframes task-enter {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .awaits-animation { opacity: 0; transform: translateY(30px); }

        .animate-entry {
            animation-name: elegant-fade-slide-up;
            animation-duration: 0.7s;
            animation-timing-function: var(--animation-smooth-curve);
            animation-fill-mode: forwards;
        }

        /* ==========================================================================
           HEADER COMPONENT
           ========================================================================== */
        .application-header {
            display: flex; flex-direction: row; justify-content: space-between; align-items: center;
            margin-bottom: 36px; padding-left: 8px; padding-right: 8px;
        }

        .application-title {
            font-family: var(--font-medium); font-weight: normal; font-size: 38px;
            letter-spacing: -0.04em; line-height: 1.2; color: #FFFFFF;
            font-variant-numeric: proportional-nums; font-feature-settings: "pnum" 1, "tnum" 0, "kern" 1;
        }

        .header-controls-container { display: flex; flex-direction: row; align-items: center; gap: 16px; }

        .circular-icon-button {
            width: 40px; height: 40px; border-radius: 50%;
            background-color: var(--glass-background-base);
            border: 1px solid var(--glass-border-color);
            display: flex; align-items: center; justify-content: center;
            color: #FFFFFF; cursor: pointer;
            backdrop-filter: var(--glass-backdrop-filter-blur) var(--glass-backdrop-filter-saturate);
            -webkit-backdrop-filter: var(--glass-backdrop-filter-blur) var(--glass-backdrop-filter-saturate);
            transition: transform var(--animation-duration-medium) var(--animation-smooth-curve), 
                        background-color var(--animation-duration-fast) var(--animation-smooth-curve);
            outline: none;
        }

        .circular-icon-button:active { transform: scale(0.88); background-color: var(--glass-background-hover); }
        .circular-icon-button svg { width: 20px; height: 20px; }

        /* ==========================================================================
           TASKS / REMINDERS DASHBOARD WIDGET
           ========================================================================== */
        .task-dashboard-widget {
            background-color: var(--glass-background-base);
            border: 1px solid var(--glass-border-color);
            backdrop-filter: var(--glass-backdrop-filter-blur) var(--glass-backdrop-filter-saturate);
            -webkit-backdrop-filter: var(--glass-backdrop-filter-blur) var(--glass-backdrop-filter-saturate);
            border-radius: 32px;
            margin-bottom: 24px; 
            padding: 24px 32px 32px 32px;
            display: flex; flex-direction: column;
            box-shadow: 0px 12px 48px rgba(0, 0, 0, 0.4), inset 0px 1px 0px rgba(255, 255, 255, 0.1);
        }

        .task-header-row {
            display: flex; flex-direction: row; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-left: 4px; padding-right: 4px;
        }

        .task-title {
            font-family: var(--font-bold); font-weight: normal; font-size: 22px;
            color: #FFFFFF; letter-spacing: -0.02em;
        }

        .task-stats-label {
            font-family: var(--font-medium); font-weight: normal; font-size: 14px;
            color: var(--card-inactive-subtitle-color); letter-spacing: 0.04em;
        }

        .task-list-container {
            max-height: 280px;
            overflow-y: auto; overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            display: flex; flex-direction: column; gap: 8px;
            margin-bottom: 20px; padding-right: 4px;
        }
        
        .task-list-container::-webkit-scrollbar { width: 4px; }
        .task-list-container::-webkit-scrollbar-thumb { background-color: rgba(255, 255, 255, 0.15); border-radius: 4px; }

        .task-item-row {
            display: flex; flex-direction: row; align-items: center; gap: 14px;
            padding: 12px 16px; cursor: pointer;
            background-color: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            animation: task-enter 0.4s var(--animation-smooth-curve) forwards;
            transition: all var(--animation-duration-medium) var(--animation-smooth-curve);
        }

        .task-item-row:active { transform: scale(0.98); background-color: rgba(255, 255, 255, 0.08); }

        .task-item-row.is-completed { opacity: 0.55; }
        .task-item-row.is-completed .task-text { text-decoration-line: line-through; color: var(--card-inactive-subtitle-color); }

        /* Independent Checkbox for Tasks to avoid overlap with Agenda */
        .task-checkbox-container {
            width: 22px; height: 22px; border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            transition: all var(--animation-duration-fast) var(--animation-smooth-curve);
        }

        .task-item-row.is-completed .task-checkbox-container {
            background-color: var(--success-color); border-color: var(--success-color);
            animation: subtle-pulse-glow 2s infinite ease-in-out;
        }

        .task-checkbox-svg {
            width: 12px; height: 12px; stroke: #FFFFFF; stroke-width: 3; stroke-linecap: round;
            stroke-linejoin: round; fill: none; stroke-dasharray: 24; stroke-dashoffset: 24; opacity: 0;
        }

        .task-item-row.is-completed .task-checkbox-svg {
            stroke-dashoffset: 0; opacity: 1;
            animation: checkmark-pop-animation 0.4s var(--animation-bouncy-curve) forwards;
        }

        .task-text {
            font-family: var(--font-medium); font-weight: normal; font-size: 16px;
            color: #FFFFFF; flex-grow: 1; line-height: 1.3;
            transition: color var(--animation-duration-medium);
        }

        .task-delete-btn {
            background: rgba(255, 69, 58, 0.1); color: var(--danger-color);
            border: none; border-radius: 10px; width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0.4;
            transition: all var(--animation-duration-fast) var(--animation-smooth-curve);
        }
        
        .task-item-row:hover .task-delete-btn { opacity: 1; }
        .task-delete-btn:active { transform: scale(0.9); opacity: 0.8 !important; }

        .task-input-wrapper { display: flex; flex-direction: row; gap: 12px; align-items: stretch; }

        .task-input-field {
            flex-grow: 1; background-color: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 18px;
            padding: 0 20px; color: #FFFFFF; font-family: var(--font-regular); font-size: 16px;
            outline: none; transition: all var(--animation-duration-fast) var(--animation-smooth-curve);
        }

        .task-input-field:focus { border-color: rgba(255, 255, 255, 0.4); background-color: rgba(0, 0, 0, 0.5); }
        .task-input-field::placeholder { color: rgba(255, 255, 255, 0.4); }

        .task-add-submit-btn {
            width: 48px; height: 48px; background-color: #FFFFFF; color: #000000;
            border: none; border-radius: 16px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0;
            transition: transform var(--animation-duration-fast) var(--animation-smooth-curve), 
                        opacity var(--animation-duration-fast) var(--animation-smooth-curve);
        }
        
        .task-add-submit-btn:active { transform: scale(0.92); opacity: 0.85; }

        .task-empty-state {
            font-family: var(--font-regular); font-weight: normal; font-size: 15px;
            color: var(--card-inactive-subtitle-color); text-align: center;
            padding-top: 16px; padding-bottom: 16px;
        }

        /* ==========================================================================
           AGENDA DASHBOARD WIDGET (DYNAMICALLY VISIBLE)
           ========================================================================== */
        
        .agenda-dashboard-section-wrapper {
            max-height: 0px; opacity: 0; overflow: hidden; margin-bottom: 0px; pointer-events: none;
            transform: translate3d(0, 30px, 0);
            will-change: max-height, opacity, transform, margin-bottom;
            transition: all var(--animation-duration-slow) var(--animation-smooth-curve);
        }

        .agenda-dashboard-section-wrapper.is-routine-active {
            max-height: 1000px; opacity: 1; margin-bottom: 24px; pointer-events: auto;
            transform: translate3d(0, 0px, 0);
        }

        .agenda-dashboard-widget {
            background-color: var(--glass-background-base);
            border: 1px solid var(--glass-border-color);
            backdrop-filter: var(--glass-backdrop-filter-blur) var(--glass-backdrop-filter-saturate);
            -webkit-backdrop-filter: var(--glass-backdrop-filter-blur) var(--glass-backdrop-filter-saturate);
            border-radius: 32px;
            padding: 24px 32px;
            display: flex; flex-direction: column;
            box-shadow: 0px 12px 48px rgba(0, 0, 0, 0.4), inset 0px 1px 0px rgba(255, 255, 255, 0.1);
        }

        .agenda-header-row { display: flex; flex-direction: column; align-items: flex-start; margin-bottom: 20px; padding-left: 4px; }
        .agenda-title { font-family: var(--font-bold); font-weight: normal; font-size: 22px; color: #FFFFFF; letter-spacing: -0.02em; margin-bottom: 2px; }
        .agenda-time-period-label { font-family: var(--font-medium); font-weight: normal; font-size: 14px; color: var(--card-inactive-subtitle-color); letter-spacing: 0.04em; }

        .agenda-list-container { display: flex; flex-direction: column; gap: 8px; }

        .agenda-item-row {
            display: flex; flex-direction: row; align-items: center; gap: 14px;
            padding: 8px; cursor: pointer; border-radius: 12px;
            transition: all var(--animation-duration-medium) var(--animation-smooth-curve);
        }

        .agenda-item-row:active { background-color: rgba(255,255,255,0.08); transform: scale(0.98); }
        .agenda-item-row.is-task-completed { opacity: 0.5; }
        .agenda-item-row.is-task-completed .agenda-item-title { text-decoration-line: line-through; color: var(--card-inactive-subtitle-color); }

        .agenda-checkbox-container {
            width: 22px; height: 22px; border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            transition: all var(--animation-duration-fast) var(--animation-smooth-curve);
        }

        .agenda-item-row.is-task-completed .agenda-checkbox-container {
            background-color: var(--success-color); border-color: var(--success-color);
            animation: subtle-pulse-glow 2s infinite ease-in-out;
        }

        .agenda-checkbox-svg {
            width: 12px; height: 12px; stroke: #FFFFFF; stroke-width: 3; stroke-linecap: round;
            stroke-linejoin: round; fill: none; stroke-dasharray: 24; stroke-dashoffset: 24; opacity: 0;
        }

        .agenda-item-row.is-task-completed .agenda-checkbox-svg {
            stroke-dashoffset: 0; opacity: 1;
            animation: checkmark-pop-animation 0.4s var(--animation-bouncy-curve) forwards;
        }

        .agenda-item-content { display: flex; flex-direction: column; flex-grow: 1; }
        .agenda-item-title { font-family: var(--font-medium); font-weight: normal; font-size: 15px; color: #FFFFFF; transition: color var(--animation-duration-medium); }
        .agenda-empty-state { font-family: var(--font-regular); font-weight: normal; font-size: 14px; color: var(--card-inactive-subtitle-color); text-align: center; padding: 8px 0; }

        /* ==========================================================================
           DEVICE GRID LAYOUT & GLOBAL LINK COMPONENT
           ========================================================================== */
        
        .device-grid-wrapper { position: relative; width: 100%; }

        .section-heading-title {
            font-family: var(--font-bold); font-weight: normal; font-size: 22px;
            margin-bottom: 20px; padding-left: 8px; letter-spacing: -0.02em; color: #FFFFFF;
        }

        .global-link-synchronization-button {
            position: absolute; left: 50%; top: -26px; transform: translateX(-50%);
            width: 38px; height: 38px; border-radius: 19px;
            background-color: var(--glass-background-base);
            border: 1px solid var(--glass-border-color);
            z-index: 100; display: flex; justify-content: center; align-items: center;
            color: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); cursor: pointer;
            transition: all var(--animation-duration-medium) var(--animation-smooth-curve);
        }

        .global-link-synchronization-button:active { transform: translateX(-50%) scale(0.85); }
        .global-link-synchronization-button.is-devices-linked {
            background-color: var(--link-active-background-color); color: var(--link-active-foreground-color);
            border-color: var(--link-active-background-color); box-shadow: var(--link-active-box-shadow);
        }
        .global-link-synchronization-button svg { width: 18px; height: 18px; }

        .device-grid-container {
            display: grid; grid-template-columns: repeat(2, 1fr);
            grid-auto-rows: minmax(var(--card-base-height), auto);
            column-gap: var(--grid-gap-portrait); row-gap: var(--grid-gap-portrait);
            transition: all var(--animation-duration-medium) var(--animation-smooth-curve);
        }

        body.layout-mode-landscape .device-grid-container {
            grid-template-columns: repeat(2, 1fr);
            column-gap: var(--grid-gap-landscape); row-gap: var(--grid-gap-landscape);
        }

        /* ==========================================================================
           SMART DEVICE CARD COMPONENT
           ========================================================================== */
        .smart-device-card {
            background-color: var(--glass-background-base); border: 1px solid var(--glass-border-color);
            backdrop-filter: blur(35px) saturate(160%); -webkit-backdrop-filter: blur(35px) saturate(160%);
            border-radius: 32px; padding: 24px; display: flex; flex-direction: column; justify-content: flex-start;
            height: var(--card-base-height); 
            box-shadow: 0px 12px 36px rgba(0, 0, 0, 0.25), inset 0px 1px 0px rgba(255, 255, 255, 0.05);
            position: relative; cursor: pointer; transform: translate3d(0, 0, 0);
            will-change: height, background-color, transform;
            transition: all var(--animation-duration-medium) var(--animation-smooth-curve);
        }

        .smart-device-card.is-expanded { grid-row-end: span 2; height: var(--card-expanded-height-portrait); }
        body.layout-mode-landscape .smart-device-card.is-expanded { height: var(--card-expanded-height-landscape); }

        .smart-device-card.state-is-on {
            background-color: var(--card-active-background-color) !important; color: var(--card-active-text-color);
            box-shadow: 0px 16px 40px rgba(0, 0, 0, 0.1), inset 0px 1px 0px rgba(255, 255, 255, 1.0);
            border-color: transparent;
        }

        .card-base-content { display: flex; flex-direction: column; height: 152px; justify-content: space-between; }
        .device-card-header-row { display: flex; flex-direction: row; justify-content: space-between; align-items: flex-start; }

        .device-toggle-icon-container {
            width: 48px; height: 48px; border-radius: 24px;
            background-color: var(--icon-inactive-background-color); color: var(--icon-inactive-foreground-color);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: all var(--animation-duration-medium) var(--animation-smooth-curve);
        }

        .smart-device-card.state-is-on .device-toggle-icon-container { background-color: var(--icon-active-background-color); color: var(--icon-active-foreground-color); box-shadow: var(--icon-active-box-shadow); }
        .smart-device-card.is-connecting .device-toggle-icon-container { animation: pulse-connecting-indicator 1.2s infinite ease-in-out; }
        
        @keyframes pulse-connecting-indicator {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); box-shadow: 0px 0px 20px rgba(255,204,0,0.6); }
            100% { transform: scale(1); }
        }

        .device-toggle-icon-container svg { width: 26px; height: 26px; }

        .device-text-information-block { display: flex; flex-direction: column; pointer-events: none; margin-bottom: 20px; }
        .device-display-name { font-family: var(--font-semibold-soft); font-weight: normal; font-size: 17px; letter-spacing: -0.015em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .device-current-status-label { font-family: var(--font-medium); font-weight: normal; font-size: 15px; color: var(--card-inactive-subtitle-color); margin-top: 4px; transition: color var(--animation-duration-medium) var(--animation-smooth-curve); }
        .smart-device-card.state-is-on .device-current-status-label { color: var(--card-active-subtitle-color); }

        /* Bottom Area: Slider Control */
        .device-brightness-slider-container {
            width: 100%; height: 40px; border-radius: 20px;
            background-color: var(--slider-inactive-track-color); position: relative; overflow: hidden;

        class AgendaManager {
            constructor() {
                this.routines = [];
                this.loadFromStorage();
                this.enforceDailyReset();
            }

            generateUUID() {
                return 'uuid-' + Math.random().toString(36).substr(2, 9) + '-' + Date.now().toString(36);
            }

            loadFromStorage() {
                const storedData = localStorage.getItem(STORAGE_KEYS.AGENDA_ROUTINES);
                if (storedData) {
                    try {
                        this.routines = JSON.parse(storedData);
                    } catch (e) {
                        this.routines = [];
                    }
                } else {
                    this.routines = [
                        {
                            id: this.generateUUID(),
                            title: "Morning Routine",
                            startTime: "06:00",
                            endTime: "09:00",
                            order: 0,
                            tasks: [
                                { id: this.generateUUID(), title: "Make Coffee", completed: false, order: 0 },
                                { id: this.generateUUID(), title: "Check Emails", completed: false, order: 1 }
                            ]
                        }
                    ];
                    this.saveToStorage();
                }
            }

            saveToStorage() {
                this.routines.sort((a,b) => a.order - b.order).forEach((routine, rIndex) => {
                    routine.order = rIndex;
                    routine.tasks.sort((a,b) => a.order - b.order).forEach((task, tIndex) => {
                        task.order = tIndex;
                    });
                });
                localStorage.setItem(STORAGE_KEYS.AGENDA_ROUTINES, JSON.stringify(this.routines));
            }

            enforceDailyReset() {
                const currentLocalDateString = new Date().toDateString();
                const lastRecordedResetDate = localStorage.getItem(STORAGE_KEYS.AGENDA_LAST_RESET);

                if (lastRecordedResetDate !== currentLocalDateString) {
                    this.routines.forEach(routine => {
                        routine.tasks.forEach(task => task.completed = false);
                    });
                    this.saveToStorage();
                    localStorage.setItem(STORAGE_KEYS.AGENDA_LAST_RESET, currentLocalDateString);
                }
            }

            getActiveRoutine() {
                const now = new Date();
                const currentAbsoluteMinutes = (now.getHours() * 60) + now.getMinutes();

                for (let i = 0; i < this.routines.length; i++) {
                    const routine = this.routines[i];
                    const [startH, startM] = routine.startTime.split(':').map(Number);
                    const startAbsoluteMinutes = (startH * 60) + startM;
                    const [endH, endM] = routine.endTime.split(':').map(Number);
                    const endAbsoluteMinutes = (endH * 60) + endM;

                    if (startAbsoluteMinutes <= endAbsoluteMinutes) {
                        if (currentAbsoluteMinutes >= startAbsoluteMinutes && currentAbsoluteMinutes <= endAbsoluteMinutes) return routine;
                    } else {
                        if (currentAbsoluteMinutes >= startAbsoluteMinutes || currentAbsoluteMinutes <= endAbsoluteMinutes) return routine;
                    }
                }
                return null; 
            }

            addRoutine(title, startTime, endTime) {
                this.routines.push({
                    id: this.generateUUID(),
                    title: title.trim() || "New Routine",
                    startTime: startTime,
                    endTime: endTime,
                    order: this.routines.length,
                    tasks: []
                });
                this.saveToStorage();
            }
            
            updateRoutine(routineId, newTitle, newStartTime, newEndTime) {
                const routine = this.routines.find(r => r.id === routineId);
                if (routine) {
                    if (newTitle !== undefined) routine.title = newTitle;
                    if (newStartTime !== undefined) routine.startTime = newStartTime;
                    if (newEndTime !== undefined) routine.endTime = newEndTime;
                    this.saveToStorage();
                }
            }

            deleteRoutine(routineId) {
                this.routines = this.routines.filter(r => r.id !== routineId);
                this.saveToStorage();
            }

            addTaskToRoutine(routineId, taskTitle) {
                const routine = this.routines.find(r => r.id === routineId);
                if (routine && taskTitle.trim() !== '') {
                    routine.tasks.push({ id: this.generateUUID(), title: taskTitle.trim(), completed: false, order: routine.tasks.length });
                    this.saveToStorage();
                }
            }

            updateTask(routineId, taskId, newTitle) {
                const routine = this.routines.find(r => r.id === routineId);
                if (routine) {
                    const task = routine.tasks.find(t => t.id === taskId);
                    if (task && newTitle !== undefined) {
                        task.title = newTitle;
                        this.saveToStorage();
                    }
                }
            }

            deleteTask(routineId, taskId) {
                const routine = this.routines.find(r => r.id === routineId);
                if (routine) {
                    routine.tasks = routine.tasks.filter(t => t.id !== taskId);
                    this.saveToStorage();
                }
            }

            toggleTaskCompletion(routineId, taskId) {
                const routine = this.routines.find(r => r.id === routineId);
                if (routine) {
                    const task = routine.tasks.find(t => t.id === taskId);
                    if (task) {
                        task.completed = !task.completed;
                        this.saveToStorage();
                    }
                }
            }

            moveTaskUp(routineId, taskId) {
                const routine = this.routines.find(r => r.id === routineId);
                if (!routine) return;
                const index = routine.tasks.findIndex(t => t.id === taskId);
                if (index > 0) {
                    const temp = routine.tasks[index];
                    routine.tasks[index] = routine.tasks[index - 1];
                    routine.tasks[index - 1] = temp;
                    this.saveToStorage();
                }
            }

            moveTaskDown(routineId, taskId) {
                const routine = this.routines.find(r => r.id === routineId);
                if (!routine) return;
                const index = routine.tasks.findIndex(t => t.id === taskId);
                if (index > -1 && index < routine.tasks.length - 1) {
                    const temp = routine.tasks[index];
                    routine.tasks[index] = routine.tasks[index + 1];
                    routine.tasks[index + 1] = temp;
                    this.saveToStorage();
                }
            }
        }

        class NetworkManager {
            constructor() {
                this.defaultTimeoutMs = 15000; 
            }
            async get(url) {
                const abortController = new AbortController();
                const timeoutId = setTimeout(() => abortController.abort(), this.defaultTimeoutMs);
                try {
                    const response = await fetch(url, { signal: abortController.signal });
                    clearTimeout(timeoutId);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return await response.json();
                } catch (error) {
                    clearTimeout(timeoutId);
                    throw error;
                }
            }
            async post(url, body) {
                const abortController = new AbortController();
                const timeoutId = setTimeout(() => abortController.abort(), this.defaultTimeoutMs);
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body),
                        signal: abortController.signal
                    });
                    clearTimeout(timeoutId);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return await response.json();
                } catch (error) {
                    clearTimeout(timeoutId);
                    throw error;
                }
            }
        }

        /* ==========================================================================
           COLOR WHEEL LOGIC (HTML5 CANVAS WITH MATHEMATICAL SNAP)
           ========================================================================== */
           
        class ColorWheelManager {
            constructor(deviceId, canvasElement, indicatorElement) {
                this.deviceId = deviceId;
                this.canvas = canvasElement;
                this.indicator = indicatorElement;
                this.isDragging = false;
                
                // Fixed dimensions decouple mathematical precision from DOM resize artifacts
                this.fixedCanvasDimension = 200;
                this.fixedCenterPoint = this.fixedCanvasDimension / 2; 
                
                this.bindEvents();
            }

            bindEvents() {
                const handleStart = (e) => {
                    this.isDragging = true;
                    this.processInteraction(e);
                    if(e.cancelable) e.preventDefault(); 
                };

                const handleMove = (e) => {
                    if (!this.isDragging) return;
                    this.processInteraction(e);
                    if(e.cancelable) e.preventDefault();
                };

                const handleEnd = (e) => {
                    if(this.isDragging) {
                        this.isDragging = false;
                        this.dispatchFinalColorCommand();
                    }
                };

                this.canvas.addEventListener('mousedown', handleStart, {passive: false});
                this.canvas.addEventListener('mousemove', handleMove, {passive: false});
                window.addEventListener('mouseup', handleEnd);

                this.canvas.addEventListener('touchstart', handleStart, {passive: false});
                this.canvas.addEventListener('touchmove', handleMove, {passive: false});
                window.addEventListener('touchend', handleEnd);
            }

            processInteraction(event) {
                const rect = this.canvas.getBoundingClientRect();
                
                let clientX = event.clientX;
                let clientY = event.clientY;
                if (event.touches && event.touches.length > 0) {
                    clientX = event.touches[0].clientX;
                    clientY = event.touches[0].clientY;
                }

                const centerX = rect.width / 2; 
                const centerY = rect.height / 2;
                
                const xOffset = clientX - rect.left - centerX;
                const yOffset = clientY - rect.top - centerY;

                // Absolute true radians (0 is at 3 o'clock)
                const rawAngleRadians = Math.atan2(yOffset, xOffset);
                const rawDistance = Math.sqrt(xOffset * xOffset + yOffset * yOffset);
                
                let clampedDistance = Math.min(rawDistance, this.fixedCenterPoint);
                
                const SNAP_RADIUS = 18;
                if (clampedDistance <= SNAP_RADIUS) {
                    clampedDistance = 0;
                }
                
                const saturationRatio = clampedDistance / this.fixedCenterPoint;

                // Visual mapping using fixed math isolates indicator from CSS layout jumps
                const visualThumbX = this.fixedCenterPoint + Math.cos(rawAngleRadians) * clampedDistance;
                const visualThumbY = this.fixedCenterPoint + Math.sin(rawAngleRadians) * clampedDistance;
                
                this.indicator.style.left = `${visualThumbX}px`;
                this.indicator.style.top = `${visualThumbY}px`;
                
                let hueDegrees = (rawAngleRadians * 180 / Math.PI) + 90; 
                if (hueDegrees < 0) hueDegrees += 360;
                if (hueDegrees >= 360) hueDegrees -= 360;
                
                const lightnessPct = 100 - (saturationRatio * 50);
                this.indicator.style.backgroundColor = `hsl(${hueDegrees}, 100%, ${lightnessPct}%)`;

                DeviceManager.devicesState[this.deviceId].hue = Math.round(hueDegrees);
                DeviceManager.devicesState[this.deviceId].saturation = Math.round(saturationRatio * 1000);
                
                if (ApplicationUI.isDevicesLinked) {
                    TUYA_DEVICES.forEach(deviceData => {
                        if (deviceData.id !== this.deviceId) {
                            DeviceManager.devicesState[deviceData.id].hue = Math.round(hueDegrees);
                            DeviceManager.devicesState[deviceData.id].saturation = Math.round(saturationRatio * 1000);
                            
                            if (DeviceManager.colorWheelControllers[deviceData.id]) {
                                DeviceManager.colorWheelControllers[deviceData.id].updateIndicatorFromState();
                            }
                        }
                    });
                }
            }

            dispatchFinalColorCommand() {
                const targetIds = ApplicationUI.isDevicesLinked ? TUYA_DEVICES.map(d=>d.id) : [this.deviceId];
                targetIds.forEach(id => {
                    DeviceManager.executeColorCommand(id);
                });
            }
            
            updateIndicatorFromState() {
                const state = DeviceManager.devicesState[this.deviceId];
                
                if(state.hue === undefined || state.saturation === undefined || (state.hue === 0 && state.saturation === 0)) {
                    this.indicator.style.left = `100px`; 
                    this.indicator.style.top = `100px`;
                    this.indicator.style.backgroundColor = `#FFFFFF`;
                    return;
                }
                
                const angleRadians = (state.hue - 90) * (Math.PI / 180);
                const distanceRatio = state.saturation / 1000;
                const absoluteDistance = distanceRatio * this.fixedCenterPoint;
                
                const visualThumbX = this.fixedCenterPoint + Math.cos(angleRadians) * absoluteDistance;
                const visualThumbY = this.fixedCenterPoint + Math.sin(angleRadians) * absoluteDistance;
                
                this.indicator.style.left = `${visualThumbX}px`;
                this.indicator.style.top = `${visualThumbY}px`;
                
                const lightnessPct = 100 - (distanceRatio * 50);
                this.indicator.style.backgroundColor = `hsl(${state.hue}, 100%, ${lightnessPct}%)`;
            }
        }

        /* ==========================================================================
           STATE & API MANAGEMENT FOR SMART DEVICES
           ========================================================================== */

        class TuyaSmartDeviceManager {
            constructor() {
                this.workerApiUrl = localStorage.getItem(STORAGE_KEYS.WORKER_URL) || '';
                this.devicesState = {};
                this.colorWheelControllers = {};
                
                for (let i = 0; i < TUYA_DEVICES.length; i++) {
                    const device = TUYA_DEVICES[i];
                    this.devicesState[device.id] = { on: false, brightness: 100, hue: 0, saturation: 0 };
                }
                this.debounceTimers = {};
            }

            buildEndpointUrl(path) { return this.workerApiUrl.replace(/\/$/, '') + path; }
            setApiUrl(newUrl) { this.workerApiUrl = newUrl.trim(); localStorage.setItem(STORAGE_KEYS.WORKER_URL, this.workerApiUrl); }
            isConfigured() { return this.workerApiUrl !== null && this.workerApiUrl !== ''; }

            async synchronizeAllDevices() {
                if (!this.isConfigured()) return;
                for (let i = 0; i < TUYA_DEVICES.length; i++) {
                    const device = TUYA_DEVICES[i];
                    ApplicationUI.setDeviceConnectingState(device.id, true);
                    try {
                        const jsonPayload = await NetworkService.get(this.buildEndpointUrl(`/status?device=${device.id}`));
                        if (jsonPayload.success && jsonPayload.result) this.parseAndApplyTuyaStatusPayload(device.id, jsonPayload.result);
                    } catch (error) {
                    } finally {
                        ApplicationUI.setDeviceConnectingState(device.id, false);
                        ApplicationUI.updateDeviceCardRender(device.id);
                        if(this.colorWheelControllers[device.id]) this.colorWheelControllers[device.id].updateIndicatorFromState();
                    }
                }
            }

            parseAndApplyTuyaStatusPayload(deviceId, statusArray) {
                const powerInstruction = statusArray.find(instruction => instruction.code === 'switch_led');
                if (powerInstruction !== undefined) this.devicesState[deviceId].on = powerInstruction.value;
                
                const colorInstruction = statusArray.find(instruction => instruction.code === 'colour_data_v2' || instruction.code === 'colour_data');
                if (colorInstruction !== undefined) {
                    try {
                        const parsedValueObject = typeof colorInstruction.value === 'string' ? JSON.parse(colorInstruction.value) : colorInstruction.value;
                        if (parsedValueObject) {
                            if (parsedValueObject.v !== undefined) this.devicesState[deviceId].brightness = Math.max(1, Math.min(100, Math.round(parsedValueObject.v / 10)));
                            if (parsedValueObject.h !== undefined) this.devicesState[deviceId].hue = parsedValueObject.h;
                            if (parsedValueObject.s !== undefined) this.devicesState[deviceId].saturation = parsedValueObject.s;
                        }
                    } catch (parseError) {}
                }
            }

            async toggleDevicePower(deviceId) {
                if (!this.isConfigured()) return ApplicationUI.openSettingsModal();

                const targetState = !this.devicesState[deviceId].on;
                const targetDeviceIds = ApplicationUI.isDevicesLinked ? TUYA_DEVICES.map(d => d.id) : [deviceId];

                targetDeviceIds.forEach(id => {
                    this.devicesState[id].on = targetState;
                    ApplicationUI.setDeviceConnectingState(id, true);
                    ApplicationUI.updateDeviceCardRender(id);
                });

                try {
                    const url = this.buildEndpointUrl('/command');
                    await Promise.all(targetDeviceIds.map(id => NetworkService.post(url, { device: id, commands: [{ code: 'switch_led', value: targetState }] })));
                } catch (error) {
                    GlobalToast.show("Network Error. Reverting.");
                    targetDeviceIds.forEach(id => {
                        this.devicesState[id].on = !targetState;
                        ApplicationUI.updateDeviceCardRender(id);
                    });
                } finally {
                    targetDeviceIds.forEach(id => ApplicationUI.setDeviceConnectingState(id, false));
                }
            }

            handleBrightnessChangeIntent(deviceId, newBrightnessPercentage) {
                if (!this.isConfigured()) return;
                if (this.debounceTimers[deviceId]) clearTimeout(this.debounceTimers[deviceId]);
                this.debounceTimers[deviceId] = setTimeout(() => this.executeBrightnessCommand(deviceId, newBrightnessPercentage), 400);
            }

            async executeBrightnessCommand(deviceId, newBrightnessPercentage) {
                const targetDeviceIds = ApplicationUI.isDevicesLinked ? TUYA_DEVICES.map(d => d.id) : [deviceId];
                const tuyaFormatBrightness = parseInt(newBrightnessPercentage, 10) * 10;
                
                let dispatchNeeded = false;
                targetDeviceIds.forEach(id => {
                    if (this.devicesState[id].on === true) { dispatchNeeded = true; ApplicationUI.setDeviceConnectingState(id, true); }
                });
                if(!dispatchNeeded) return;

                try {
                    const url = this.buildEndpointUrl('/command');
                    await Promise.all(targetDeviceIds.map(id => {
                        if (this.devicesState[id].on === false) return Promise.resolve();
                        return NetworkService.post(url, { device: id, commands: [ { code: 'work_mode', value: 'colour' }, { code: 'colour_data', value: JSON.stringify({ h: this.devicesState[id].hue || 0, s: this.devicesState[id].saturation || 0, v: tuyaFormatBrightness }) } ] });
                    }));
                } catch (error) {
                    GlobalToast.show("Network Error.");
                } finally {
                    targetDeviceIds.forEach(id => ApplicationUI.setDeviceConnectingState(id, false));
                }
            }
            
            async executeColorCommand(deviceId) {
                if (!this.isConfigured()) return;
                
                const targetDeviceIds = ApplicationUI.isDevicesLinked ? TUYA_DEVICES.map(d => d.id) : [deviceId];
                
                targetDeviceIds.forEach(id => {
                    if (this.devicesState[id].on === false) {
                        this.devicesState[id].on = true;
                        ApplicationUI.updateDeviceCardRender(id);
                    }
                    ApplicationUI.setDeviceConnectingState(id, true);
                });

                try {
                    const url = this.buildEndpointUrl('/command');
                    await Promise.all(targetDeviceIds.map(id => {
                        return NetworkService.post(url, { device: id, commands: [ { code: 'work_mode', value: 'colour' }, { code: 'colour_data', value: JSON.stringify({ h: this.devicesState[id].hue, s: this.devicesState[id].saturation, v: this.devicesState[id].brightness * 10 }) } ] });
                    }));
                } catch (error) {
                    GlobalToast.show("Failed to apply color configuration.");
                } finally {
                    targetDeviceIds.forEach(id => ApplicationUI.setDeviceConnectingState(id, false));
                }
            }
        }

                if (!listContainer || !statsLabel) return;

                const pendingCount = GlobalTasks.getPendingCount();
                statsLabel.innerText = `${pendingCount} remaining`;

                if (GlobalTasks.tasks.length === 0) {
                    listContainer.innerHTML = `<div class="task-empty-state">All caught up! Add a new task below.</div>`;
                    return;
                }

                // Sort Tasks: Pending first, then completed. Secondary sort by creation time.
                const sortedTasks = [...GlobalTasks.tasks].sort((a, b) => {
                    if (a.completed === b.completed) return a.createdAt - b.createdAt;
                    return a.completed ? 1 : -1;
                });

                listContainer.innerHTML = sortedTasks.map(task => `
                    <div class="task-item-row ${task.completed ? 'is-completed' : ''}" onclick="GlobalTasks.toggleTask('${task.id}')">
                        <div class="task-checkbox-container">
                            <svg class="task-checkbox-svg" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <span class="task-text">${task.text}</span>
                        <button class="task-delete-btn" onclick="event.stopPropagation(); GlobalTasks.deleteTask('${task.id}')" aria-label="Delete Task">
                            ${SVG_ASSETS.TRASH_CAN}
                        </button>
                    </div>
                `).join('');
            }

            // ================== AGENDA UI METHODS ==================

            evaluateAndRenderActiveRoutine() {
                const activeRoutine = AgendaSystem.getActiveRoutine();
                const sectionWrapper = document.getElementById('agenda-dashboard-section-wrapper');
                const titleLabel = document.getElementById('agenda-dynamic-title');
                const timeLabel = document.getElementById('agenda-active-time-label');
                const listContainer = document.getElementById('agenda-main-list-container');

                if (!sectionWrapper || !titleLabel || !timeLabel || !listContainer) return;

                if (!activeRoutine) {
                    sectionWrapper.classList.remove('is-routine-active');
                    return;
                }

                sectionWrapper.classList.add('is-routine-active');
                
                // Dynamic Title Injection
                titleLabel.innerText = activeRoutine.title;
                timeLabel.innerText = `${activeRoutine.startTime} - ${activeRoutine.endTime}`;
                
                const sortedTasks = [...activeRoutine.tasks].sort((a, b) => a.order - b.order);

                if (sortedTasks.length === 0) {
                    listContainer.innerHTML = `<div class="agenda-empty-state">No tasks scheduled.</div>`;
                } else {
                    listContainer.innerHTML = sortedTasks.map(task => `
                        <div class="agenda-item-row ${task.completed ? 'is-task-completed' : ''}" onclick="ApplicationUI.handleDashboardTaskToggle('${activeRoutine.id}', '${task.id}')">
                            <div class="agenda-checkbox-container">
                                <svg class="agenda-checkbox-svg" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            <div class="agenda-item-content">
                                <span class="agenda-item-title">${task.title}</span>
                            </div>
                        </div>
                    `).join('');
                }
            }

            handleDashboardTaskToggle(routineId, taskId) {
                AgendaSystem.toggleTaskCompletion(routineId, taskId);
                this.evaluateAndRenderActiveRoutine();
            }

            /**
             * Renders the settings editor with fully editable inline text inputs.
             * Utilizes explicit onblur/onchange events to save data without losing focus awkwardly.
             */
            renderAgendaEditorSettings() {
                const container = document.getElementById('settings-agenda-editor-container');
                if (!container) return;

                const sortedRoutines = [...AgendaSystem.routines].sort((a, b) => a.order - b.order);

                if (sortedRoutines.length === 0) {
                    container.innerHTML = `<div class="agenda-empty-state" style="margin-bottom:24px;">No routines created yet.</div>`;
                    return;
                }

                const upIcon = SVG_ASSETS.UP_CHEVRON;
                const downIcon = SVG_ASSETS.DOWN_CHEVRON;
                const trashIcon = SVG_ASSETS.TRASH_CAN;
                const plusIcon = SVG_ASSETS.PLUS_ICON;

                let editorHtml = '';

                sortedRoutines.forEach(routine => {
                    const sortedTasks = [...routine.tasks].sort((a, b) => a.order - b.order);
                    
                    let tasksHtml = '';
                    if (sortedTasks.length === 0) {
                        tasksHtml = `<div class="agenda-empty-state" style="font-size:13px; padding:4px;">No tasks. Add one below.</div>`;
                    } else {
                        tasksHtml = sortedTasks.map((task, tIndex) => `
                            <div class="agenda-task-edit-item">
                                <!-- Inline Editable Task Title -->
                                <input type="text" class="agenda-edit-inline-input" value="${task.title}" 
                                       onchange="AgendaSystem.updateTask('${routine.id}', '${task.id}', this.value); ApplicationUI.evaluateAndRenderActiveRoutine();">
                                
                                <div class="agenda-task-edit-controls">
                                    <button class="agenda-edit-action-btn" onclick="AgendaSystem.moveTaskUp('${routine.id}', '${task.id}'); ApplicationUI.renderAgendaEditorSettings();" ${tIndex === 0 ? 'disabled style="opacity:0.3"' : ''}>${upIcon}</button>
                                    <button class="agenda-edit-action-btn" onclick="AgendaSystem.moveTaskDown('${routine.id}', '${task.id}'); ApplicationUI.renderAgendaEditorSettings();" ${tIndex === sortedTasks.length - 1 ? 'disabled style="opacity:0.3"' : ''}>${downIcon}</button>
                                    <button class="agenda-edit-action-btn delete" onclick="AgendaSystem.deleteTask('${routine.id}', '${task.id}'); ApplicationUI.renderAgendaEditorSettings();">${trashIcon}</button>
                                </div>
                            </div>
                        `).join('');
                    }

                    editorHtml += `
                        <div class="agenda-routine-block">
                            <div class="agenda-routine-header">
                                <div class="agenda-routine-title-info">
                                    <!-- Inline Editable Routine Title -->
                                    <input type="text" class="agenda-edit-inline-input agenda-routine-title-text" style="padding-left:0; margin-bottom:4px;" value="${routine.title}" 
                                           onchange="AgendaSystem.updateRoutine('${routine.id}', this.value, undefined, undefined); ApplicationUI.evaluateAndRenderActiveRoutine();">
                                    
                                    <div class="agenda-routine-time-text">
                                        <!-- Inline Editable Start Time -->
                                        <input type="time" class="agenda-edit-inline-time" value="${routine.startTime}" 
                                               onchange="AgendaSystem.updateRoutine('${routine.id}', undefined, this.value, undefined); ApplicationUI.evaluateAndRenderActiveRoutine();">
                                        <span>-</span>
                                        <!-- Inline Editable End Time -->
                                        <input type="time" class="agenda-edit-inline-time" value="${routine.endTime}" 
                                               onchange="AgendaSystem.updateRoutine('${routine.id}', undefined, undefined, this.value); ApplicationUI.evaluateAndRenderActiveRoutine();">
                                    </div>
                                </div>
                                <button class="agenda-edit-action-btn delete" onclick="AgendaSystem.deleteRoutine('${routine.id}'); ApplicationUI.renderAgendaEditorSettings();" title="Delete Routine">${trashIcon}</button>
                            </div>
                            
                            <div style="display:flex; flex-direction:column; gap:8px;">
                                ${tasksHtml}
                            </div>
                            
                            <div class="agenda-add-task-form">
                                <input type="text" class="settings-text-input-field" style="margin-bottom:0; padding:12px; font-size:14px; border-radius:12px;" id="add-task-input-${routine.id}" placeholder="New task..." autocomplete="off">
                                <button class="settings-action-button-primary" style="margin:0; width:auto; padding:12px 16px; border-radius:12px;" onclick="ApplicationUI.handleAddNewTaskToRoutine('${routine.id}')">${plusIcon}</button>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = editorHtml;
            }

            handleAddNewTaskToRoutine(routineId) {
                const inputElement = document.getElementById(`add-task-input-${routineId}`);
                if (inputElement && inputElement.value.trim() !== '') {
                    AgendaSystem.addTaskToRoutine(routineId, inputElement.value);
                    this.renderAgendaEditorSettings(); 
                    this.evaluateAndRenderActiveRoutine(); 
                }
            }

            // ================== DEVICE GRID UI METHODS ==================

            constructDeviceGrid() {
                while (this.deviceGridContainer.firstChild) {
                    this.deviceGridContainer.removeChild(this.deviceGridContainer.firstChild);
                }

                for (let i = 0; i < TUYA_DEVICES.length; i++) {
                    const deviceData = TUYA_DEVICES[i];
                    const currentState = DeviceManager.devicesState[deviceData.id];
                    const activeClassString = currentState.on ? 'state-is-on' : '';

                    const cardElement = document.createElement('article');
                    cardElement.className = `smart-device-card ${activeClassString}`;
                    cardElement.id = `device-card-wrapper-${deviceData.id}`;
                    cardElement.setAttribute('aria-label', `Control for ${deviceData.name}`);

                    cardElement.innerHTML = `
                        <div class="card-base-content">
                            <div class="device-card-header-row">
                                <div class="device-toggle-icon-container" 
                                     id="toggle-btn-${deviceData.id}"
                                     role="button" 
                                     aria-pressed="${currentState.on ? 'true' : 'false'}" 
                                     aria-label="Toggle Power for ${deviceData.name}">
                                    ${SVG_ASSETS.LIGHTBULB}
                                </div>
                            </div>
                            
                            <div class="device-text-information-block">
                                <div class="device-display-name">${deviceData.name}</div>
                                <div class="device-current-status-label" id="status-label-${deviceData.id}">
                                    ${currentState.on ? currentState.brightness + '%' : 'Off'}
                                </div>
                            </div>

                            <div class="device-brightness-slider-container">
                                <div class="brightness-slider-visual-fill" 
                                     id="slider-fill-layer-${deviceData.id}" 
                                     style="--current-fill-percentage: ${currentState.brightness}%">
                                </div>
                                <input type="range" 
                                       class="brightness-native-range-input" 
                                       id="native-slider-input-${deviceData.id}"
                                       min="1" 
                                       max="100" 
                                       step="1" 
                                       value="${currentState.brightness}"
                                       aria-label="Brightness Control for ${deviceData.name}"
                                       aria-valuemin="1"
                                       aria-valuemax="100"
                                       aria-valuenow="${currentState.brightness}"
                                       aria-valuetext="${currentState.brightness} percent"
                                       ${currentState.on ? '' : 'disabled'}>
                            </div>
                        </div>
                        
                        <div class="color-picker-expansion-area" id="expansion-area-${deviceData.id}">
                            <div class="color-wheel-canvas-container" id="wheel-container-${deviceData.id}">
                                <canvas class="color-wheel-canvas" id="canvas-${deviceData.id}" width="200" height="200" style="position: absolute; top:0; left:0; width:100%; height:100%; border-radius:50%;"></canvas>
                                <div class="color-wheel-indicator" id="color-thumb-${deviceData.id}"></div>
                            </div>
                        </div>
                    `;

                    this.deviceGridContainer.appendChild(cardElement);
                    this.attachDynamicCardListeners(deviceData.id);
                    
                    // Initialize isolated Color Wheel Controller
                    const canvasEl = document.getElementById(`canvas-${deviceData.id}`);
                    const indicatorEl = document.getElementById(`color-thumb-${deviceData.id}`);
                    DeviceManager.colorWheelControllers[deviceData.id] = new ColorWheelManager(deviceData.id, canvasEl, indicatorEl);
                    
                    DeviceManager.colorWheelControllers[deviceData.id].updateIndicatorFromState();
                }
            }

            attachDynamicCardListeners(deviceId) {
                const cardWrapper = document.getElementById(`device-card-wrapper-${deviceId}`);
                const toggleButton = document.getElementById(`toggle-btn-${deviceId}`);
                const sliderInput = document.getElementById(`native-slider-input-${deviceId}`);
                const expansionArea = document.getElementById(`expansion-area-${deviceId}`);

                if (cardWrapper) {
                    cardWrapper.addEventListener('click', (event) => {
                        // Prevent expansion trigger if clicking interior interactive controls
                        if (event.target === toggleButton || toggleButton.contains(event.target) || event.target === sliderInput || expansionArea.contains(event.target)) {
                            return;
                        }
                        
                        if (DeviceManager.devicesState[deviceId].on === false) {
                            return;
                        }
                        
                        cardWrapper.classList.toggle('is-expanded');
                        
                        if(cardWrapper.classList.contains('is-expanded') && DeviceManager.colorWheelControllers[deviceId]) {
                            window.requestAnimationFrame(() => {
                                setTimeout(() => {
                                    DeviceManager.colorWheelControllers[deviceId].updateIndicatorFromState();
                                }, 80); 
                            });
                        }
                    });
                }

                if (toggleButton) {
                    toggleButton.addEventListener('click', (event) => {
                        event.stopPropagation(); 
                        DeviceManager.toggleDevicePower(deviceId);
                    });
                }

                if (sliderInput) {
                    sliderInput.addEventListener('mousedown', (e) => e.stopPropagation());
                    sliderInput.addEventListener('touchstart', (e) => e.stopPropagation(), {passive: true});
                    
                    sliderInput.addEventListener('input', (event) => {
                        event.stopPropagation();
                        const newBrightnessValue = event.target.value;
                        this.handleHighFrequencySliderDrag(deviceId, newBrightnessValue);
                    });

                    sliderInput.addEventListener('change', (event) => {
                        event.stopPropagation();
                        const finalBrightnessValue = event.target.value;
                        DeviceManager.handleBrightnessChangeIntent(deviceId, finalBrightnessValue);
                    });
                }
            }

            handleHighFrequencySliderDrag(deviceId, rawValue) {
                const integerValue = parseInt(rawValue, 10);
                const targetDeviceIds = this.isDevicesLinked ? TUYA_DEVICES.map(d => d.id) : [deviceId];

                targetDeviceIds.forEach(id => {
                    if (DeviceManager.devicesState[id].on === false) {
                        DeviceManager.devicesState[id].on = true;
                        this.updateDeviceCardRender(id);
                    }

                    DeviceManager.devicesState[id].brightness = integerValue;
                    
                    const fillLayer = document.getElementById(`slider-fill-layer-${id}`);
                    const statusLabel = document.getElementById(`status-label-${id}`);
                    const nativeSlider = document.getElementById(`native-slider-input-${id}`);
                    
                    if (fillLayer) fillLayer.style.setProperty('--current-fill-percentage', `${integerValue}%`);

                    if (DeviceManager.devicesState[id].on && statusLabel && nativeSlider) {
                        statusLabel.innerText = `${integerValue}%`;
                        nativeSlider.value = integerValue; 
                        nativeSlider.setAttribute('aria-valuenow', integerValue);
                        nativeSlider.setAttribute('aria-valuetext', `${integerValue} percent`);
                    }
                });
            }

            updateDeviceCardRender(deviceId) {
                const stateObject = DeviceManager.devicesState[deviceId];
                const cardWrapper = document.getElementById(`device-card-wrapper-${deviceId}`);
                const statusLabel = document.getElementById(`status-label-${deviceId}`);
                const fillLayer = document.getElementById(`slider-fill-layer-${deviceId}`);
                const nativeSlider = document.getElementById(`native-slider-input-${deviceId}`);
                const toggleBtn = document.getElementById(`toggle-btn-${deviceId}`);

                if (!cardWrapper || !statusLabel || !fillLayer || !nativeSlider || !toggleBtn) return;

                if (stateObject.on === true) {
                    cardWrapper.classList.add('state-is-on');
                    statusLabel.innerText = `${stateObject.brightness}%`;
                    toggleBtn.setAttribute('aria-pressed', 'true');
                    nativeSlider.disabled = false;
                } else {
                    cardWrapper.classList.remove('state-is-on');
                    statusLabel.innerText = 'Off';
                    toggleBtn.setAttribute('aria-pressed', 'false');
                    nativeSlider.disabled = true;
                    
                    if (cardWrapper.classList.contains('is-expanded')) {
                        cardWrapper.classList.remove('is-expanded');
                    }
                }

                nativeSlider.value = stateObject.brightness;
                nativeSlider.setAttribute('aria-valuenow', stateObject.brightness);
                nativeSlider.setAttribute('aria-valuetext', `${stateObject.brightness} percent`);
                fillLayer.style.setProperty('--current-fill-percentage', `${stateObject.brightness}%`);
            }
            
            setDeviceConnectingState(deviceId, isConnecting) {
                const cardWrapper = document.getElementById(`device-card-wrapper-${deviceId}`);
                if (cardWrapper) {
                    if (isConnecting) cardWrapper.classList.add('is-connecting');
                    else cardWrapper.classList.remove('is-connecting');
                }
            }

            openSettingsModal() {
                this.setLayoutMode(localStorage.getItem(STORAGE_KEYS.LAYOUT_MODE) || 'portrait');
                if (this.inputWorkerUrl) this.inputWorkerUrl.value = DeviceManager.workerApiUrl;
                
                this.renderAgendaEditorSettings();
                
                if (this.settingsModalBackdrop) {
                    this.settingsModalBackdrop.classList.add('is-visible-active');
                    this.settingsModalBackdrop.setAttribute('aria-hidden', 'false');
                }
            }

            handleSettingsCancel() {
                const memoryLayout = localStorage.getItem(STORAGE_KEYS.LAYOUT_MODE) || 'portrait';
                this.setLayoutMode(memoryLayout);
                if (this.settingsModalBackdrop) {
                    this.settingsModalBackdrop.classList.remove('is-visible-active');
                    this.settingsModalBackdrop.setAttribute('aria-hidden', 'true');
                }
            }

            handleSettingsSave() {
                if (!this.inputWorkerUrl) return;
                const inputString = this.inputWorkerUrl.value.trim();
                if (inputString === '') return GlobalToast.show("Error: Web URL cannot be empty.");
                
                DeviceManager.setApiUrl(inputString);
                localStorage.setItem(STORAGE_KEYS.LAYOUT_MODE, this.layoutMode);
                this.applyLayoutModeToBody();

                if (this.settingsModalBackdrop) {
                    this.settingsModalBackdrop.classList.remove('is-visible-active');
                    this.settingsModalBackdrop.setAttribute('aria-hidden', 'true');
                }

                GlobalToast.show("Configuration saved. Connecting...");
                DeviceManager.synchronizeAllDevices();
                
                this.evaluateAndRenderActiveRoutine();
            }
        }

        const ApplicationUI = new UserInterfaceController();
        
        // Expose explicit functions to global namespace for HTML inline event handlers
        AgendaSystem.handleCreateNewRoutine = () => {
            const titleEl = document.getElementById('agenda-new-routine-title');
            const startEl = document.getElementById('agenda-new-routine-start');
            const endEl = document.getElementById('agenda-new-routine-end');
            
            if(titleEl && startEl && endEl && titleEl.value.trim() !== '') {
                AgendaSystem.addRoutine(titleEl.value, startEl.value, endEl.value);
                titleEl.value = '';
                ApplicationUI.renderAgendaEditorSettings();
                ApplicationUI.evaluateAndRenderActiveRoutine();
                GlobalToast.show("Routine Created");
            } else {
                GlobalToast.show("Please provide a name for the routine.");
            }
        };

        /* ==========================================================================
           BOOTSTRAPPING & LIFECYCLE MANAGEMENT
           ========================================================================== */
        
        document.addEventListener('DOMContentLoaded', () => {
            ApplicationUI.initialize();
            triggerEntryAnimations();
            LiveClock.start();

            if (!DeviceManager.isConfigured()) {
                setTimeout(() => {
                    ApplicationUI.openSettingsModal();
                }, 1200);
            } else {
                DeviceManager.synchronizeAllDevices();
            }
        });

    </script>
</body>
</html>
